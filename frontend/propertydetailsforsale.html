<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>
      Rezident Homes | Buy Premium Estates - Nigeria's Finest Real Estate
    </title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />
    <!-- Lucide + Tailwind -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
      }
      .font-headline {
        font-family: "Manrope", system-ui, sans-serif;
      }
      .hover-lift {
        transition:
          transform 0.25s ease,
          box-shadow 0.3s ease;
      }
      .hover-lift:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
      }
      .lucide {
        width: 1.25rem;
        height: 1.25rem;
        stroke-width: 1.75;
      }
      html {
        scroll-behavior: smooth;
      }
      .fade-up {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1),
          transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .fade-up.revealed {
        opacity: 1;
        transform: translateY(0);
      }
      .bg-surface {
        background-color: #f9f9fc;
      }
      .text-primary {
        color: #001c4a;
      }
      .border-tertiary {
        border-color: #c5aa23;
      }
      .bg-tertiary-container {
        background-color: #c5aa23;
      }
      .hover\:bg-tertiary-fixed:hover {
        background-color: #ffe260;
      }
      .text-tertiary {
        color: #6e5d00;
      }
      /* gallery thumb active */
      .thumb-active {
        border-color: #c5aa23;
        opacity: 1;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #c5aa23;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        cursor: pointer;
      }
      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }
      .close-modal {
        position: absolute;
        top: 20px;
        right: 35px;
        color: #fff;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="bg-surface text-[#1a1c1e] antialiased">
    <!-- Navigation (consistent with rent page) -->
    <header
      class="sticky top-0 w-full z-50 bg-white/90 backdrop-blur-xl shadow-sm border-b border-[#eeeef0]"
    >
      <div class="max-w-7xl mx-auto px-5 md:px-8">
        <div class="flex items-center justify-between h-16 lg:h-20">
          <a href="index.html" class="flex-shrink-0">
            <img
              src="images/logo.png"
              alt="Rezident Homes Logo"
              class="h-9 lg:h-11 w-auto object-contain"
              onerror="
                this.style.display = 'none';
                this.parentElement.innerHTML =
                  '<span class=\'text-xl font-black tracking-tighter text-primary\'>REZIDENT HOMES</span>';
              "
            />
          </a>
        </div>
      </div>
    </header>

    <main>
      <!-- Loading State -->
      <div id="loadingState" class="py-40 text-center">
        <div class="loader"></div>
        <p class="text-slate-500 mt-5 text-sm">Loading property details...</p>
      </div>

      <!-- Error State -->
      <div
        id="errorState"
        class="hidden max-w-3xl mx-auto mt-20 bg-red-50/70 text-red-800 p-10 rounded-3xl text-center shadow-sm border border-red-100/60"
      ></div>

      <!-- Property Content (injected dynamically) -->
      <div id="propertyContent" class="hidden"></div>
    </main>

    <!-- Modal for fullscreen gallery -->
    <div id="imageModal" class="modal">
      <span class="close-modal">&times;</span>
      <img
        class="modal-img"
        id="modalImage"
        src=""
        alt="Full size property image"
      />
    </div>

    <!-- Simple Payment Confirmation Modal -->
    <div
      id="paymentModal"
      class="modal"
      style="background-color: rgba(0, 0, 0, 0.8); z-index: 1100"
    >
      <div
        class="bg-white rounded-2xl max-w-md w-full p-6 relative mx-4"
        style="animation: fadeIn 0.2s ease"
        onclick="event.stopPropagation()"
      >
        <button
          onclick="closePaymentModal()"
          class="absolute top-3 right-4 text-gray-500 hover:text-gray-800 text-2xl"
        >
          &times;
        </button>
        <div class="text-center mb-4">
          <div
            class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3"
          >
            <i data-lucide="credit-card" class="w-8 h-8 text-tertiary"></i>
          </div>
          <h3 class="text-xl font-headline font-extrabold text-primary">
            Secure Payment Portal
          </h3>
          <p class="text-sm text-gray-500 mt-1">
            You're about to reserve this property
          </p>
        </div>
        <div
          id="paymentPropertyDetails"
          class="bg-gray-50 p-3 rounded-lg text-sm mb-4"
        ></div>
        <div class="space-y-3">
          <div class="flex justify-between text-sm font-medium">
            <span>Total Amount (Reservation fee)</span>
            <span class="font-bold text-primary" id="paymentAmount">₦0</span>
          </div>
          <p class="text-[11px] text-gray-400 text-center">
            *Refundable holding deposit to secure viewing & due diligence
          </p>
          <button
            id="confirmPaymentBtn"
            class="w-full bg-[#c5aa23] hover:bg-[#b3971a] text-[#001c4a] font-bold py-3 rounded-xl transition flex items-center justify-center gap-2 text-sm"
          >
            <i data-lucide="lock" class="w-4 h-4"></i> Pay with Card / Transfer
          </button>
          <button
            onclick="closePaymentModal()"
            class="w-full text-gray-500 text-sm py-2"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import { getHouseById } from "./slices/houseService.js";
      import { getHouses } from "./slices/houseService.js";

      // ---------- HELPERS ----------
      function formatNaira(amount) {
        if (!amount && amount !== 0) return "₦0";
        return new Intl.NumberFormat("en-NG", {
          style: "currency",
          currency: "NGN",
          minimumFractionDigits: 0,
        }).format(amount);
      }

      function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      // ---------- DOM REFS ----------
      const loadingState = document.getElementById("loadingState");
      const errorState = document.getElementById("errorState");
      const propertyContent = document.getElementById("propertyContent");

      // ---------- GET PROPERTY ID FROM URL ----------
      const urlParams = new URLSearchParams(window.location.search);
      const propertyId = urlParams.get("id");

      if (!propertyId) {
        loadingState.classList.add("hidden");
        errorState.innerHTML = `
          <div class="flex items-center justify-center gap-2 text-sm">
            <i data-lucide="alert-triangle" class="w-5 h-5"></i>
            <span>No property ID provided.</span>
          </div>`;
        errorState.classList.remove("hidden");
        lucide.createIcons();
        throw new Error("No property ID in URL");
      }

      // ---------- GALLERY MODAL ----------
      window.openModal = function (imgSrc) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        if (modal && modalImg) {
          modalImg.src = imgSrc;
          modal.classList.add("active");
        }
      };

      function closeModal() {
        const modal = document.getElementById("imageModal");
        if (modal) modal.classList.remove("active");
      }

      // ---------- PAYMENT MODAL ----------
      function openPaymentModal(house) {
        const modal = document.getElementById("paymentModal");
        const detailsContainer = document.getElementById(
          "paymentPropertyDetails",
        );
        const amountSpan = document.getElementById("paymentAmount");
        if (!modal || !detailsContainer) return;

        const reservationFee = Math.round((house.price || 0) * 0.02);
        const formattedFee = formatNaira(reservationFee);
        amountSpan.innerText = formattedFee;

        detailsContainer.innerHTML = `
          <div class="flex justify-between items-center border-b pb-2 mb-2">
            <span class="font-semibold text-sm">Property:</span>
            <span class="text-right text-sm">${escapeHtml(house.title || "Property")}</span>
          </div>
          <div class="flex justify-between items-center text-xs text-gray-600">
            <span>Location:</span>
            <span>${escapeHtml(house.lga || "")}, ${escapeHtml(house.state || "")}</span>
          </div>
          <div class="flex justify-between items-center text-xs text-gray-600 mt-1">
            <span>Full price:</span>
            <span>${formatNaira(house.price)}</span>
          </div>
          <div class="flex justify-between items-center text-xs font-medium text-tertiary mt-2 pt-1 border-t">
            <span>Reservation deposit (2%):</span>
            <span>${formattedFee}</span>
          </div>
        `;

        modal.classList.add("active");
        setTimeout(() => {
          if (window.lucide) lucide.createIcons();
        }, 50);
      }

      function closePaymentModal() {
        const modal = document.getElementById("paymentModal");
        if (modal) modal.classList.remove("active");
      }

      function setupPaymentListener(house) {
        const confirmBtn = document.getElementById("confirmPaymentBtn");
        if (confirmBtn) {
          const newBtn = confirmBtn.cloneNode(true);
          confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
          newBtn.addEventListener("click", (e) => {
            e.preventDefault();
            alert(
              `✅ Payment initiated for ${escapeHtml(house.title || "this property")} (Reservation deposit). A secure payment link has been sent to your email. Our concierge will finalize the transaction.`,
            );
            closePaymentModal();
          });
        }
      }

      // ---------- FETCH & RENDER ----------
      async function renderProperty() {
        try {
          const house = await getHouseById(propertyId);
          if (!house) throw new Error("Property not found");

          const mainImage = house.images?.[0]?.url || "images/hero.avif";
          const galleryImages = house.images || [];
          const features = house.features || [];
          const seller = house.user || {};

          document.title = `${house.title || "Property"} | Rezident Homes`;

          // Fetch 3 most recent houses for sale (excluding current) for the "Similar Listings" section
          let similarHtml = "";
          try {
            const similarData = await getHouses({
              listingType: "sale",
              status: "published",
              limit: 4,
              sort: "-createdAt",
            });
            const similarHouses = (similarData.houses || [])
              .filter((h) => h._id !== house._id)
              .slice(0, 3);

            if (similarHouses.length > 0) {
              similarHtml = `
                <div class="max-w-7xl mx-auto px-5 md:px-8 mt-16 fade-up">
                  <div class="flex items-center justify-between mb-6">
                    <h2 class="font-headline text-2xl font-extrabold text-primary">
                      Similar Luxury Homes
                    </h2>
                    <a
                      href="forsale.html"
                      class="text-sm text-tertiary font-bold flex items-center gap-1"
                      >View all <i data-lucide="arrow-right" class="w-3 h-3"></i
                    ></a>
                  </div>
                  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${similarHouses
                      .map(
                        (sh) => `
                      <div class="bg-white rounded-xl overflow-hidden shadow hover-lift transition cursor-pointer" onclick="window.location.href='propertydetailsforsale.html?id=${sh._id}'">
                        <img
                          src="${sh.images?.[0]?.url || "images/hero.avif"}"
                          class="h-48 w-full object-cover"
                          alt="${escapeHtml(sh.title || "")}"
                          onerror="this.src='images/hero.avif'"
                        />
                        <div class="p-4">
                          <div class="text-xs text-[#7b7f8d] flex items-center gap-1">
                            <i data-lucide="map-pin" class="w-3 h-3"></i> ${escapeHtml(sh.lga || "")}, ${escapeHtml(sh.state || "")}
                          </div>
                          <h3 class="font-bold text-primary text-sm mt-1">
                            ${escapeHtml(sh.title || "Property")}
                          </h3>
                          <div class="flex justify-between items-center mt-2">
                            <span class="font-bold text-primary text-base"
                              >${formatNaira(sh.price)}</span
                            ><button
                              class="similar-sale-btn text-xs bg-tertiary-container/20 text-primary px-3 py-1 rounded-full font-bold"
                              onclick="event.stopPropagation(); window.location.href='propertydetailsforsale.html?id=${sh._id}'"
                            >
                              Inquire
                            </button>
                          </div>
                        </div>
                      </div>
                    `,
                      )
                      .join("")}
                  </div>
                </div>`;
            } else {
              similarHtml = `
                <div class="max-w-7xl mx-auto px-5 md:px-8 mt-16 fade-up">
                  <div class="flex items-center justify-between mb-6">
                    <h2 class="font-headline text-2xl font-extrabold text-primary">
                      Similar Luxury Homes
                    </h2>
                    <a
                      href="forsale.html"
                      class="text-sm text-tertiary font-bold flex items-center gap-1"
                      >View all <i data-lucide="arrow-right" class="w-3 h-3"></i
                    ></a>
                  </div>
                  <div class="bg-white rounded-2xl shadow-sm border border-[#eeeef0] p-10 text-center">
                    <i data-lucide="home" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                    <p class="text-sm text-on-surface-variant">No similar listings available at the moment.</p>
                    <a href="forsale.html" class="inline-block mt-3 text-sm font-bold text-tertiary hover:text-primary transition">Browse all homes for sale →</a>
                  </div>
                </div>`;
            }
          } catch (e) {
            console.warn("Could not fetch similar properties:", e);
            similarHtml = `
              <div class="max-w-7xl mx-auto px-5 md:px-8 mt-16 fade-up">
                <div class="flex items-center justify-between mb-6">
                  <h2 class="font-headline text-2xl font-extrabold text-primary">
                    Similar Luxury Homes
                  </h2>
                  <a
                    href="forsale.html"
                    class="text-sm text-tertiary font-bold flex items-center gap-1"
                    >View all <i data-lucide="arrow-right" class="w-3 h-3"></i
                  ></a>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-[#eeeef0] p-10 text-center">
                  <i data-lucide="home" class="w-12 h-12 text-gray-300 mx-auto mb-3"></i>
                  <p class="text-sm text-on-surface-variant">No similar listings available at the moment.</p>
                  <a href="forsale.html" class="inline-block mt-3 text-sm font-bold text-tertiary hover:text-primary transition">Browse all homes for sale →</a>
                </div>
              </div>`;
          }

          // Build the full HTML (UI structure 100% preserved)
          const html = `
            <!-- Hero Section -->
            <section class="relative bg-[#001c4a] text-white py-12 lg:py-16 overflow-hidden fade-up">
              <div class="absolute inset-0 opacity-20">
                <img
                  src="${mainImage}"
                  alt="Luxury interior"
                  class="w-full h-full object-cover"
                />
              </div>
              <div class="relative z-10 max-w-7xl mx-auto px-5 md:px-8">
                <div class="flex items-center gap-2 text-sm text-white/70 mb-3">
                  <a
                    href="forsale.html"
                    class="hover:text-tertiary-container transition"
                    >← Back to Sale Listings</a
                  >
                </div>
                <h1
                  class="font-headline text-3xl md:text-4xl lg:text-5xl font-extrabold mb-2"
                >
                  ${escapeHtml(house.title || "Luxury Home")}
                </h1>
                <div
                  class="flex flex-wrap items-center gap-x-6 gap-y-2 text-white/80 text-sm"
                >
                  <span class="flex items-center gap-1"
                    ><i data-lucide="map-pin" class="w-4 h-4"></i> ${escapeHtml(house.lga || "")}, ${escapeHtml(house.state || "")}</span
                  >
                  <span class="flex items-center gap-1"
                    ><i
                      data-lucide="badge-check"
                      class="w-4 h-4 text-tertiary-container"
                    ></i>
                    Premium Listing</span
                  >
                </div>
              </div>
            </section>

            <!-- Main Content -->
            <div class="max-w-7xl mx-auto px-5 md:px-8 -mt-8 mb-16 fade-up">
              <div class="grid lg:grid-cols-3 gap-8">
                <!-- Left column: Gallery + details -->
                <div class="lg:col-span-2">
                  <!-- Main Image Carousel / Gallery -->
                  <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
                    <div class="relative">
                      <img
                        id="mainGalleryImg"
                        src="${mainImage}"
                        alt="Main property view"
                        class="w-full h-[360px] lg:h-[420px] object-cover cursor-pointer"
                        onclick="openModal('${mainImage}')"
                      />
                    </div>
                    ${
                      galleryImages.length > 1
                        ? `
                    <div class="flex gap-2 p-3 border-t border-[#eeeef0]">
                      ${galleryImages
                        .map(
                          (img, idx) => `
                        <img
                          data-gallery="${img.url}"
                          src="${img.url}?w=120&h=80&fit=crop"
                          class="w-20 h-16 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-tertiary transition-all ${idx === 0 ? "thumb-active border-tertiary" : ""}"
                          alt="thumb${idx + 1}"
                        />
                      `,
                        )
                        .join("")}
                    </div>`
                        : ""
                    }
                  </div>

                  <!-- Description & Features -->
                  <div class="bg-white rounded-2xl p-6 mt-6 shadow-sm">
                    <h2 class="font-headline text-2xl font-extrabold text-primary mb-3">
                      About this property
                    </h2>
                    <p class="text-[#3a3e4a] text-sm leading-relaxed mb-5">
                      ${escapeHtml(house.description || "No description provided.")}
                    </p>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 py-3 border-y border-[#eeeef0]">
                      <div>
                        <span class="block text-xs text-[#6b6f7e]">Property Type</span
                        ><span class="font-semibold text-primary text-sm">${escapeHtml(house.propertyType || "N/A")}</span>
                      </div>
                      <div>
                        <span class="block text-xs text-[#6b6f7e]">Year Built</span
                        ><span class="font-semibold text-primary text-sm">${house.yearBuilt || "N/A"}</span>
                      </div>
                      <div>
                        <span class="block text-xs text-[#6b6f7e]">Ownership</span
                        ><span class="font-semibold text-primary text-sm">${escapeHtml(house.ownershipType || "Freehold")}</span>
                      </div>
                      <div>
                        <span class="block text-xs text-[#6b6f7e]">Status</span
                        ><span class="font-semibold text-primary text-sm">${house.status === "published" ? "Available" : escapeHtml(house.status || "N/A")}</span>
                      </div>
                    </div>

                    ${
                      features.length
                        ? `
                    <div class="mt-6">
                      <h3 class="font-bold text-primary text-lg mb-3">
                        Key Features
                      </h3>
                      <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        ${features
                          .map(
                            (f) => `
                          <span class="flex items-center gap-2 text-sm"
                            ><i data-lucide="check-circle" class="w-4 h-4 text-tertiary"></i>
                            ${escapeHtml(f)}</span
                          >
                        `,
                          )
                          .join("")}
                      </div>
                    </div>`
                        : ""
                    }
                  </div>

                  <!-- Purchase Terms -->
                  <div class="bg-white rounded-2xl p-6 mt-6 shadow-sm">
                    <h3 class="font-headline font-bold text-primary text-xl mb-3">
                      Purchase &amp; Terms
                    </h3>
                    <ul class="space-y-2 text-sm text-[#2f3340] list-disc pl-5">
                      <li>
                        Asking price:
                        <strong class="text-primary">${formatNaira(house.price)}</strong>
                      </li>
                      <li>Title documents: C of O / Governor's Consent available</li>
                      <li>Early possession: available upon full payment</li>
                      <li>Mortgage financing: partner banks available</li>
                      <li>Legal fees: 5% + VAT (buyer covers)</li>
                    </ul>
                    <div class="mt-5 bg-[#f6f7fb] p-4 rounded-xl flex items-start gap-3">
                      <i data-lucide="clock" class="w-5 h-5 text-tertiary shrink-0 mt-0.5"></i>
                      <p class="text-xs text-[#4e5468]">
                        Flexible payment plans available. Contact our sales team for bespoke arrangements.
                      </p>
                    </div>
                  </div>
                </div>

                <!-- Right Column: Price Summary + Inquiry Form -->
                <div class="lg:col-span-1">
                  <div
                    class="bg-white rounded-2xl shadow-lg p-6 sticky top-24 border border-[#eceef2] fade-up"
                  >
                    <div class="mb-4 pb-3 border-b border-dashed border-[#e0e2e8]">
                      <span
                        class="text-tertiary text-xs font-bold uppercase tracking-wide"
                        >Sale Price</span
                      >
                      <div
                        class="text-3xl font-headline font-extrabold text-primary mt-1"
                      >
                        ${formatNaira(house.price)}
                      </div>
                    </div>
                    <div class="space-y-3 mb-5">
                      <div class="flex justify-between text-sm">
                        <span>Bedrooms</span><span class="font-semibold">${house.bedrooms || "?"}</span>
                      </div>
                      <div class="flex justify-between text-sm">
                        <span>Bathrooms</span><span class="font-semibold">${house.bathrooms || "?"}</span>
                      </div>
                      <div class="flex justify-between text-sm">
                        <span>Living Area</span
                        ><span class="font-semibold">${house.size || "?"} m²</span>
                      </div>
                    </div>

                    <!-- Inquiry Form -->
                    <form id="inquiryForm" class="space-y-4 mb-5">
                      <div>
                        <label class="block text-xs font-bold text-primary mb-1"
                          >Full Name *</label
                        >
                        <input
                          type="text"
                          required
                          class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                          placeholder="John Doe"
                        />
                      </div>
                      <div>
                        <label class="block text-xs font-bold text-primary mb-1"
                          >Email Address *</label
                        >
                        <input
                          type="email"
                          required
                          class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                          placeholder="john@example.com"
                        />
                      </div>
                      <div>
                        <label class="block text-xs font-bold text-primary mb-1"
                          >Phone Number *</label
                        >
                        <input
                          type="tel"
                          required
                          class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                          placeholder="+234 812 345 6789"
                        />
                      </div>
                      <div>
                        <label class="block text-xs font-bold text-primary mb-1"
                          >Message (Optional)</label
                        >
                        <textarea
                          rows="2"
                          class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                          placeholder="I'm interested in this property..."
                        ></textarea>
                      </div>
                      <button
                        type="submit"
                        class="w-full bg-[#001c4a] text-white py-3 rounded-xl font-bold text-sm hover:bg-[#0d316d] transition flex items-center justify-center gap-2"
                      >
                        Send Inquiry <i data-lucide="send" class="w-4 h-4"></i>
                      </button>
                    </form>

                    <!-- Ready to Buy Text -->
                    <div class="text-center mb-3">
                      <p class="text-sm font-bold text-[#c5aa23]">
                        Ready to own this home?
                      </p>
                    </div>

                    <button
                      id="proceedToPaymentBtn"
                      class="w-full bg-gradient-to-r from-[#c5aa23] to-[#e6c844] text-primary py-3 rounded-xl font-bold text-sm hover:from-[#b89a1f] hover:to-[#d4b83a] transition flex items-center justify-center gap-2 shadow-md"
                    >
                      Proceed to Payment
                      <i data-lucide="credit-card" class="w-4 h-4"></i>
                    </button>

                    <div class="mt-6 pt-4 border-t border-[#edf0f5]">
                      <div class="flex items-center gap-2 mb-2">
                        <i data-lucide="user-check" class="w-5 h-5 text-tertiary"></i>
                        <span class="text-sm font-bold text-primary"
                          >Sales Agent</span
                        >
                      </div>
                      <p class="text-xs text-[#4a4f62]">
                        ${escapeHtml(seller.name || "Agent")}: Senior Sales Consultant
                      </p>
                      <p class="text-xs text-[#4a4f62] mt-1">
                        ✉️ ${escapeHtml(seller.email || "contact@rezidenthomes.com")} | 📞 ${escapeHtml(seller.phone || "+234 800 000 0000")}
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              ${similarHtml}
            </div>

            <!-- CTA Consultation -->
            <section class="py-16 lg:py-20 px-5 md:px-8 bg-[#001c4a] text-white fade-up">
              <div class="max-w-4xl mx-auto text-center">
                <i
                  data-lucide="phone-call"
                  class="w-10 h-10 text-tertiary-container mx-auto mb-4"
                ></i>
                <h2 class="text-2xl md:text-3xl font-headline font-bold mb-3">
                  Need a custom purchase solution?
                </h2>
                <p class="text-white/70 text-sm mb-6 max-w-lg mx-auto">
                  Our team finds off-market luxury homes matching your budget and lifestyle, from flexible payment plans to mortgage assistance.
                </p>
                <button
                  id="consultSaleExpert"
                  class="bg-tertiary-container text-primary px-6 py-3 rounded-full font-bold hover:bg-[#ffe260] transition shadow-md text-sm"
                >
                  Talk to a Sales Expert
                </button>
              </div>
            </section>
          `;

          propertyContent.innerHTML = html;
          loadingState.classList.add("hidden");
          propertyContent.classList.remove("hidden");
          lucide.createIcons();

          // ---------- EVENT LISTENERS ----------

          // Gallery thumbnail switching
          const mainImg = document.getElementById("mainGalleryImg");
          const thumbs = document.querySelectorAll("[data-gallery]");
          thumbs.forEach((thumb) => {
            thumb.addEventListener("click", function () {
              const fullSrc = this.getAttribute("data-gallery");
              if (fullSrc && mainImg) mainImg.src = fullSrc;
              thumbs.forEach((t) =>
                t.classList.remove("thumb-active", "border-tertiary"),
              );
              this.classList.add("thumb-active", "border-tertiary");
              this.style.borderWidth = "2px";
            });
          });

          // Gallery modal close
          const imageModal = document.getElementById("imageModal");
          const closeBtn = document.querySelector(".close-modal");
          if (closeBtn) closeBtn.onclick = closeModal;
          if (imageModal) {
            imageModal.onclick = (e) => {
              if (e.target === imageModal) closeModal();
            };
          }

          // Payment modal close
          const paymentModal = document.getElementById("paymentModal");
          if (paymentModal) {
            paymentModal.onclick = (e) => {
              if (e.target === paymentModal) closePaymentModal();
            };
          }

          // Inquiry form
          const inquiryForm = document.getElementById("inquiryForm");
          if (inquiryForm) {
            inquiryForm.addEventListener("submit", (e) => {
              e.preventDefault();
              alert(
                `Thank you! Your inquiry for ${escapeHtml(house.title || "this property")} has been sent. A sales agent will contact you shortly.`,
              );
              inquiryForm.reset();
            });
          }

          // Proceed to Payment
          const paymentBtn = document.getElementById("proceedToPaymentBtn");
          if (paymentBtn) {
            paymentBtn.addEventListener("click", (e) => {
              e.preventDefault();
              openPaymentModal(house);
              setupPaymentListener(house);
            });
          }

          // Consult expert
          const consultExpert = document.getElementById("consultSaleExpert");
          if (consultExpert) {
            consultExpert.addEventListener("click", () => {
              alert(
                "Connect with our luxury sales concierge: +234 (0) 800 000 0000 or sales@rezidenthomes.com",
              );
            });
          }

          // Fade-up observer
          const fadeElements = document.querySelectorAll(".fade-up");
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                if (entry.isIntersecting)
                  entry.target.classList.add("revealed");
              });
            },
            { threshold: 0.1 },
          );
          fadeElements.forEach((el) => observer.observe(el));
        } catch (err) {
          console.error(err);
          loadingState.classList.add("hidden");
          errorState.innerHTML = `
            <div class="flex flex-col items-center gap-3">
              <i data-lucide="alert-circle" class="w-8 h-8 text-red-500"></i>
              <p class="font-bold text-sm">${err.message || "Failed to load property details."}</p>
              <button onclick="window.location.href='forsale.html'" class="text-sm text-red-600 underline font-bold">Back to Sale Listings</button>
            </div>`;
          errorState.classList.remove("hidden");
          lucide.createIcons();
        }
      }

      // ---------- START ----------
      renderProperty();
    </script>
  </body>
</html>
