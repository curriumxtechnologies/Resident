    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
      }
      .font-headline {
        font-family: "Manrope", system-ui, sans-serif;
      }
      .hover-lift {
        transition:
          transform 0.25s ease,
          box-shadow 0.3s ease;
      }
      .hover-lift:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.15);
      }
      .lucide {
        width: 1.25rem;
        height: 1.25rem;
        stroke-width: 1.75;
      }
      html {
        scroll-behavior: smooth;
      }
      .fade-up {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1),
          transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .fade-up.revealed {
        opacity: 1;
        transform: translateY(0);
      }
      .bg-surface {
        background-color: #f9f9fc;
      }
      .text-primary {
        color: #001c4a;
      }
      .border-tertiary {
        border-color: #c5aa23;
      }
      .bg-tertiary-container {
        background-color: #c5aa23;
      }
      .hover\:bg-tertiary-fixed:hover {
        background-color: #ffe260;
      }
      .text-tertiary {
        color: #6e5d00;
      }
      /* gallery thumb active */
      .thumb-active {
        border-color: #c5aa23;
        opacity: 1;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }
      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        cursor: pointer;
      }
      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }
      .close-modal {
        position: absolute;
        top: 20px;
        right: 35px;
        color: #fff;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
      }
    </style>
  </head>

        style="animation: fadeIn 0.2s ease"

          </div>
          <h3 class="text-xl font-headline font-bold text-primary">
            Secure Payment Portal
          </h3>
          <p class="text-sm text-gray-500 mt-1">
            You're about to reserve this property
          </p>
        </div>
        <div
          id="paymentPropertyDetails"
          class="bg-gray-50 p-3 rounded-lg text-sm mb-4"

        <div class="space-y-3">

          >

          <button

      // Helper to get property from URL param or from sessionStorage
      function getSelectedProperty() {
        const urlParams = new URLSearchParams(window.location.search);
        const propertyName = urlParams.get("property");
        if (propertyName && propertiesDB[decodeURIComponent(propertyName)]) {
          return propertiesDB[decodeURIComponent(propertyName)];
        }
        const stored = sessionStorage.getItem("selectedProperty");
        if (stored && propertiesDB[stored]) {
          return propertiesDB[stored];
        }
        return propertiesDB["The Pearl Haven"];
      }

      let currentProperty = null;

      function openPaymentModal(property) {
        const modal = document.getElementById("paymentModal");
        const detailsContainer = document.getElementById(
          "paymentPropertyDetails",
        );
        const amountSpan = document.getElementById("paymentAmount");
        if (!modal || !detailsContainer) return;

        const reservationFee = Math.round(property.priceValue * 0.02);
        const formattedFee = new Intl.NumberFormat("en-NG", {
          style: "currency",
          currency: "NGN",
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
        }).format(reservationFee);
        amountSpan.innerText = formattedFee;

        detailsContainer.innerHTML = `
          <div class="flex justify-between items-center border-b pb-2 mb-2">
            <span class="font-semibold">Property:</span>
            <span class="text-right">${property.name}</span>
          </div>
          <div class="flex justify-between items-center text-xs text-gray-600">
            <span>Location:</span>
            <span>${property.location}</span>
          </div>
          <div class="flex justify-between items-center text-xs text-gray-600 mt-1">
            <span>Full price:</span>
            <span>${property.price}</span>
          </div>
          <div class="flex justify-between items-center text-xs font-medium text-tertiary mt-2 pt-1 border-t">
            <span>Reservation deposit (2%):</span>
            <span>${formattedFee}</span>
          </div>
        `;

        modal.classList.add("active");
        setTimeout(() => {
          if (window.lucide) lucide.createIcons();
        }, 50);
      }

      function closePaymentModal() {
        const modal = document.getElementById("paymentModal");
        if (modal) modal.classList.remove("active");
      }

      function setupPaymentListener(property) {
        const confirmBtn = document.getElementById("confirmPaymentBtn");
        if (confirmBtn) {
          const newBtn = confirmBtn.cloneNode(true);
          confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
          newBtn.addEventListener("click", (e) => {
            e.preventDefault();
            alert(
              `✅ Payment initiated for ${property.name} (Reservation deposit). A secure payment link has been sent to your email. Our concierge will finalize the transaction.`,
            );
            closePaymentModal();
          });
        }
      }

                    Purchase &amp; Terms
                  </h3>
                  <ul class="space-y-2 text-sm text-[#2f3340] list-disc pl-5">
                    <li>
                      Asking price:
                      <strong class="text-primary">${property.price}</strong>
                    </li>
                    <li>Title documents: C of O / Governor's Consent available</li>
                    <li>Early possession: available upon full payment</li>
                    <li>Mortgage financing: partner banks available</li>
                    <li>Legal fees: 5% + VAT (buyer covers)</li>
                  </ul>
                  <div
                    class="mt-5 bg-[#f6f7fb] p-4 rounded-xl flex items-start gap-3"
                  >
                    <i
                      data-lucide="clock"
                      class="w-5 h-5 text-tertiary shrink-0 mt-0.5"
                    ></i>
                    <p class="text-xs text-[#4e5468]">
                      Flexible payment plans available. Contact our sales team for bespoke arrangements.
                    </p>
                  </div>
                </div>
              </div>

              <!-- Right Column: Price Summary + Inquiry Form -->
              <div class="lg:col-span-1">
                <div
                  class="bg-white rounded-2xl shadow-lg p-6 sticky top-24 border border-[#eceef2] fade-up"
                >
                  <div class="mb-4 pb-3 border-b border-dashed border-[#e0e2e8]">
                    <span
                      class="text-tertiary text-xs font-semibold uppercase tracking-wide"
                      >Sale Price</span
                    >
                    <div
                      class="text-3xl font-headline font-black text-primary mt-1"
                    >
                      ${property.price}
                    </div>
                  </div>
                  <div class="space-y-3 mb-5">
                    <div class="flex justify-between text-sm">
                      <span>Bedrooms</span><span class="font-semibold">${property.beds}</span>
                    </div>
                    <div class="flex justify-between text-sm">
                      <span>Bathrooms</span><span class="font-semibold">${property.baths}</span>
                    </div>
                    <div class="flex justify-between text-sm">
                      <span>Living Area</span
                      ><span class="font-semibold">${property.sqm} m²</span>
                    </div>
                  </div>

                  <!-- Inquiry Form -->
                  <form id="inquiryForm" class="space-y-4 mb-5">
                    <div>
                      <label class="block text-xs font-semibold text-primary mb-1"
                        >Full Name *</label
                      >
                      <input
                        type="text"
                        required
                        class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                        placeholder="John Doe"
                      />
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-primary mb-1"
                        >Email Address *</label
                      >
                      <input
                        type="email"
                        required
                        class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                        placeholder="john@example.com"
                      />
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-primary mb-1"
                        >Phone Number *</label
                      >
                      <input
                        type="tel"
                        required
                        class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                        placeholder="+234 812 345 6789"
                      />
                    </div>
                    <div>
                      <label class="block text-xs font-semibold text-primary mb-1"
                        >Message (Optional)</label
                      >
                      <textarea
                        rows="2"
                        class="w-full px-3 py-2 border border-[#e0e2e8] rounded-lg text-sm focus:outline-none focus:border-tertiary focus:ring-1 focus:ring-tertiary"
                        placeholder="I'm interested in this property..."
                      ></textarea>
                    </div>
                    <button
                      type="submit"
                      class="w-full bg-[#001c4a] text-white py-3 rounded-xl font-bold hover:bg-[#0d316d] transition flex items-center justify-center gap-2"
                    >
                      Send Inquiry <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                  </form>

                  <!-- Ready to Buy Text -->
                  <div class="text-center mb-3">
                    <p class="text-sm font-semibold text-[#c5aa23]">
                      Ready to own this home?
                    </p>
                  </div>

                  <button
                    id="proceedToPaymentBtn"
                    class="w-full bg-gradient-to-r from-[#c5aa23] to-[#e6c844] text-primary py-3 rounded-xl font-bold hover:from-[#b89a1f] hover:to-[#d4b83a] transition flex items-center justify-center gap-2 shadow-md"
                  >
                    Proceed to Payment
                    <i data-lucide="credit-card" class="w-4 h-4"></i>
                  </button>

                  <div class="mt-6 pt-4 border-t border-[#edf0f5]">
                    <div class="flex items-center gap-2 mb-2">
                      <i data-lucide="user-check" class="w-5 h-5 text-tertiary"></i>
                      <span class="text-sm font-bold text-primary"
                        >Sales Agent</span
                      >
                    </div>
                    <p class="text-xs text-[#4a4f62]">
                      ${property.agent.name}: Senior Sales Consultant
                    </p>
                    <p class="text-xs text-[#4a4f62] mt-1">
                      ✉️ ${property.agent.email} | 📞 ${property.agent.phone}
                    </p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;

        container.innerHTML = heroHtml + mainContentHtml;
        lucide.createIcons();

        // Gallery thumbnail switching
        const mainImg = document.getElementById("mainGalleryImg");
        const thumbs = document.querySelectorAll("[data-gallery]");
        thumbs.forEach((thumb) => {
          thumb.addEventListener("click", function () {
            const fullSrc = this.getAttribute("data-gallery");
            if (fullSrc && mainImg) mainImg.src = fullSrc;
            thumbs.forEach((t) =>
              t.classList.remove("thumb-active", "border-tertiary"),
            );
            this.classList.add("thumb-active", "border-tertiary");
            this.style.borderWidth = "2px";
          });
          if (thumb === thumbs[0])
            thumb.classList.add("thumb-active", "border-tertiary");
        });

        // Form handler
        const form = document.getElementById("inquiryForm");
        if (form) {
          form.addEventListener("submit", (e) => {
            e.preventDefault();
            alert(
              `Thank you! Your inquiry for ${property.name} has been sent. A sales agent will contact you shortly.`,
            );
            form.reset();
          });
        }

        // Payment button
        const paymentBtn = document.getElementById("proceedToPaymentBtn");
        if (paymentBtn) {
          const newPaymentBtn = paymentBtn.cloneNode(true);
          paymentBtn.parentNode.replaceChild(newPaymentBtn, paymentBtn);
          newPaymentBtn.addEventListener("click", (e) => {
            e.preventDefault();
            openPaymentModal(property);
            setupPaymentListener(property);
          });
        }
      }

      // Modal functions
      window.openModal = function (imgSrc) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        if (modal && modalImg) {
          modalImg.src = imgSrc;
          modal.classList.add("active");
        }
      };

      function closeModal() {
        const modal = document.getElementById("imageModal");
        if (modal) modal.classList.remove("active");
      }

      function init() {
        const property = getSelectedProperty();
        renderPropertyDetails(property);
        document.title = `${property.name} | Buy Premium Estates - Resident`;

        // Modal events
        const modal = document.getElementById("imageModal");
        const closeBtn = document.querySelector(".close-modal");
        if (closeBtn) closeBtn.onclick = closeModal;
        if (modal)
          modal.onclick = (e) => {
            if (e.target === modal) closeModal();
          };

        const paymentModal = document.getElementById("paymentModal");
        if (paymentModal) {
          paymentModal.onclick = (e) => {
            if (e.target === paymentModal) closePaymentModal();
          };
        }

        // Fade-up observer
        const fadeElements = document.querySelectorAll(".fade-up");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) entry.target.classList.add("revealed");
            });
          },
          { threshold: 0.1 },
        );
        fadeElements.forEach((el) => observer.observe(el));
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
