<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Admin Dashboard | Rezident Homes</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
            animation: {
              float: "float 3s ease-in-out infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "scale(1)", opacity: "0.8" },
                "50%": { transform: "scale(1.1)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      .lucide {
        width: 1.2rem;
        height: 1.2rem;
        stroke-width: 1.8;
      }

      /* Loading overlay styles */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(249, 249, 252, 0.95);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition:
          opacity 0.5s ease-out,
          visibility 0.5s ease-out;
      }

      .loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loading-content {
        text-align: center;
      }

      .loading-logo {
        width: 120px;
        height: auto;
        animation: float 3s ease-in-out infinite;
      }

      .loading-text {
        margin-top: 1.5rem;
        color: #001c4a;
        font-family: "Manrope", system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.875rem;
        letter-spacing: 0.05em;
        animation: pulse-text 1.5s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) scale(1);
          opacity: 0.8;
        }
        50% {
          transform: translateY(-15px) scale(1.05);
          opacity: 1;
        }
      }

      @keyframes pulse-text {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      /* Toast notification styles */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        color: #ffffff;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        pointer-events: auto;
        transform: translateY(100px);
        opacity: 0;
        transition:
          transform 0.35s cubic-bezier(0.21, 1.02, 0.73, 1),
          opacity 0.3s ease-out;
        max-width: 420px;
        word-break: break-word;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .toast.hide {
        transform: translateY(20px);
        opacity: 0;
        transition:
          transform 0.25s ease-in,
          opacity 0.25s ease-in;
      }

      .toast--success {
        background: #065f46;
      }

      .toast--error {
        background: #991b1b;
      }

      .toast--info {
        background: #001c4a;
      }

      .toast-icon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toast-icon svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2;
      }

      .toast-message {
        flex: 1;
      }

      .toast-close {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.7;
        transition: opacity 0.2s;
        background: none;
        border: none;
        padding: 0;
        color: inherit;
      }

      .toast-close:hover {
        opacity: 1;
      }

      .toast-close svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body antialiased">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-content">
        <img
          src="images/logo.png"
          alt="Rezident Homes Logo"
          class="loading-logo"
        />
      </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div id="navbar-container"></div>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <div class="mb-8">
          <h1 class="font-headline text-3xl font-extrabold text-primary">
            Dashboard
          </h1>
          <p class="text-on-surface-variant mt-1">
            Welcome back, <span id="adminName">Admin</span>
          </p>
        </div>

        <!-- Stats Cards (placeholders) -->
        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
          <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-outline/10"
          >
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-on-surface-variant">Total Users</p>
                <p
                  id="totalUsers"
                  class="text-3xl font-extrabold text-primary mt-1"
                >
                  -
                </p>
              </div>
              <i data-lucide="users" class="w-8 h-8 text-tertiary"></i>
            </div>
          </div>
          <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-outline/10"
          >
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-on-surface-variant">
                  Seller Applications
                </p>
                <p
                  id="totalApps"
                  class="text-3xl font-extrabold text-primary mt-1"
                >
                  -
                </p>
              </div>
              <i data-lucide="briefcase" class="w-8 h-8 text-tertiary"></i>
            </div>
          </div>
          <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-outline/10"
          >
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-on-surface-variant">Listings</p>
                <p
                  id="totalListings"
                  class="text-3xl font-extrabold text-primary mt-1"
                >
                  -
                </p>
              </div>
              <i data-lucide="home" class="w-8 h-8 text-tertiary"></i>
            </div>
          </div>
          <div
            class="bg-white rounded-2xl p-6 shadow-sm border border-outline/10"
          >
            <div class="flex items-center justify-between">
              <div>
                <p class="text-sm text-on-surface-variant">Pending Reviews</p>
                <p
                  id="pendingReviews"
                  class="text-3xl font-extrabold text-primary mt-1"
                >
                  -
                </p>
              </div>
              <i data-lucide="clock" class="w-8 h-8 text-tertiary"></i>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div
          class="bg-white rounded-2xl shadow-sm border border-outline/10 p-6"
        >
          <h2 class="font-headline text-xl font-extrabold text-primary mb-4">
            Quick Actions
          </h2>
          <div class="flex flex-wrap gap-4">
            <a
              href="admin-applications.html"
              class="bg-primary/10 text-primary px-4 py-2 rounded-xl font-bold text-sm hover:bg-primary hover:text-white transition"
              >Review Seller Applications</a
            >
            <a
              href="admin-users.html"
              class="bg-primary/10 text-primary px-4 py-2 rounded-xl font-bold text-sm hover:bg-primary hover:text-white transition"
              >Manage Users</a
            >
            <a
              href="admin-houses.html"
              class="bg-primary/10 text-primary px-4 py-2 rounded-xl font-bold text-sm hover:bg-primary hover:text-white transition"
              >Manage Listings</a
            >
          </div>
        </div>
      </div>
    </main>

    <script>
      lucide.createIcons();
    </script>

    <script type="module">
      import { renderAdminNavbar } from "./js/adminNavbar.js";
      import {
        getStoredToken,
        getStoredUser,
        clearAuthData,
      } from "./js/tokenStorage.js";
      import { getUsers } from "./slices/userService.js";
      import { getSellerApplications } from "./slices/sellerService.js";
      import { getHouses } from "./slices/houseService.js";

      // ========== Toast notification function ==========
      function showToast(message, type = "info", duration = 4000) {
        const container = document.getElementById("toastContainer");

        const iconPaths = {
          success:
            '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',
          error:
            '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',
          info: '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>',
        };

        const toast = document.createElement("div");
        toast.className = `toast toast--${type}`;
        toast.innerHTML = `
          <span class="toast-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              ${iconPaths[type]}
            </svg>
          </span>
          <span class="toast-message">${message}</span>
          <button class="toast-close" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        `;
        container.appendChild(toast);

        requestAnimationFrame(() => {
          toast.classList.add("show");
        });

        const closeBtn = toast.querySelector(".toast-close");
        closeBtn.addEventListener("click", () => removeToast(toast));

        const timer = setTimeout(() => removeToast(toast), duration);

        function removeToast(toastEl) {
          clearTimeout(timer);
          toastEl.classList.add("hide");
          toastEl.addEventListener("transitionend", () => {
            if (toastEl.parentNode) {
              toastEl.parentNode.removeChild(toastEl);
            }
          });
        }
      }

      // Loading overlay
      const loadingOverlay = document.getElementById("loadingOverlay");

      // Check admin access
      const token = getStoredToken();
      const user = getStoredUser();
      if (!token || !user || user.role !== "admin") {
        showToast("Admin access required", "error");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      }

      // Insert navbar
      const navbarContainer = document.getElementById("navbar-container");
      navbarContainer.appendChild(renderAdminNavbar("dashboard"));

      async function loadStats() {
        try {
          const usersData = await getUsers({ limit: 1 });
          document.getElementById("totalUsers").textContent =
            usersData.total || 0;

          const applicationsResponse = await getSellerApplications();
          const applications =
            applicationsResponse.data ||
            applicationsResponse.applications ||
            applicationsResponse;

          if (!Array.isArray(applications)) {
            console.error("Applications is not an array:", applications);
            return;
          }

          const pendingApps = applications.filter(
            (app) => app.status === "pending",
          ).length;
          document.getElementById("totalApps").textContent =
            applications.length;
          document.getElementById("pendingReviews").textContent = pendingApps;

          const housesData = await getHouses({ limit: 1 });
          document.getElementById("totalListings").textContent =
            housesData.total || 0;
        } catch (err) {
          console.error("Failed to load stats:", err);
        } finally {
          setTimeout(() => {
            loadingOverlay.classList.add("hidden");
          }, 500);
        }
      }

      document.getElementById("adminName").textContent = user.name || "Admin";
      loadStats();
    </script>
  </body>
</html>
