<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Seller Applications | Admin | Resident</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="images/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="images/android-chrome-512x512.png" />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      .lucide { width: 1.2rem; height: 1.2rem; stroke-width: 1.8; }
      .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #c5aa23;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .input-field {
        padding: 0.65rem 1rem;
        border-radius: 0.75rem;
        background: white;
        border: 1px solid rgba(116,119,129,0.25);
        outline: none;
        font-size: 0.875rem;
      }
      .input-field:focus {
        border-color: #001c4a;
        box-shadow: 0 0 0 3px rgba(0,28,74,0.14);
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: bold;
      }
      .status-pending { background: #fef3c7; color: #92400e; }
      .status-approved { background: #d1fae5; color: #065f46; }
      .status-rejected { background: #fee2e2; color: #991b1b; }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body antialiased">
    <div id="navbar-container"></div>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
          <div>
            <h1 class="font-headline text-3xl font-extrabold text-primary">Seller Applications</h1>
            <p class="text-on-surface-variant mt-1">Review and approve/ reject landlord & agency applications.</p>
          </div>
          <select id="statusFilter" class="input-field w-48">
            <option value="">All Applications</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <!-- Loading & Error -->
        <div id="loadingOverlay" class="hidden py-10"><div class="loader"></div></div>
        <div id="errorMsg" class="hidden bg-red-50 text-red-700 p-4 rounded-xl mb-6"></div>

        <!-- Applications List -->
        <div id="applicationsContainer" class="space-y-6">
          <!-- Cards will be injected here -->
        </div>
      </div>
    </main>

    <!-- Modal for review (approve/reject with note) -->
    <div id="reviewModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
      <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6">
        <h2 class="font-headline text-xl font-extrabold text-primary mb-4">Review Application</h2>
        <p class="text-sm text-on-surface-variant mb-4">Applicant: <span id="modalApplicantName"></span></p>
        <div class="mb-4">
          <label class="block text-sm font-bold text-primary mb-2">Decision</label>
          <select id="modalStatus" class="input-field w-full">
            <option value="approved">Approve</option>
            <option value="rejected">Reject</option>
          </select>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-bold text-primary mb-2">Admin Note (optional)</label>
          <textarea id="modalNote" rows="3" class="input-field w-full resize-none" placeholder="Reason for approval/rejection..."></textarea>
        </div>
        <div class="flex gap-3">
          <button id="modalConfirmBtn" class="bg-tertiary-container text-primary px-4 py-2 rounded-xl font-bold flex-1">Confirm</button>
          <button id="modalCancelBtn" class="border border-outline/25 text-on-surface-variant px-4 py-2 rounded-xl font-bold flex-1">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>

    <script type="module">
      import { renderAdminNavbar } from "./js/adminNavbar.js";
      import { getStoredToken, getStoredUser } from "./js/tokenStorage.js";
      import { getSellerApplications, reviewSellerApplication } from "./slices/sellerService.js";

      // Admin check
      const token = getStoredToken();
      const currentUser = getStoredUser();
      if (!token || !currentUser || currentUser.role !== "admin") {
        alert("Admin access required");
        window.location.href = "login.html";
      }

      // Insert navbar
      document.getElementById("navbar-container").appendChild(renderAdminNavbar("applications"));

      // State
      let applications = [];
      let statusFilter = "";
      let selectedAppId = null;

      const container = document.getElementById("applicationsContainer");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const errorMsgDiv = document.getElementById("errorMsg");
      const statusFilterSelect = document.getElementById("statusFilter");
      const modal = document.getElementById("reviewModal");
      const modalApplicantName = document.getElementById("modalApplicantName");
      const modalStatus = document.getElementById("modalStatus");
      const modalNote = document.getElementById("modalNote");
      const modalConfirmBtn = document.getElementById("modalConfirmBtn");
      const modalCancelBtn = document.getElementById("modalCancelBtn");

      function showLoading(show) {
        loadingOverlay.classList.toggle("hidden", !show);
      }

      function showError(msg) {
        errorMsgDiv.textContent = msg;
        errorMsgDiv.classList.remove("hidden");
        setTimeout(() => errorMsgDiv.classList.add("hidden"), 5000);
      }

      async function fetchApplications() {
        showLoading(true);
        try {
          const data = await getSellerApplications(statusFilter);
          applications = data;
          renderApplications();
        } catch (err) {
          console.error(err);
          showError("Failed to load applications: " + err.message);
          container.innerHTML = `<div class="text-center py-8 text-red-600">Error loading applications</div>`;
        } finally {
          showLoading(false);
        }
      }

      function formatDate(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function renderApplications() {
        if (!applications.length) {
          container.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl shadow-sm border border-outline/10 text-on-surface-variant">No applications found</div>`;
          return;
        }

        container.innerHTML = applications.map(app => {
          const isLandlord = app.sellerType === 'landlord';
          const statusClass = `status-${app.status}`;
          let detailsHtml = '';
          if (isLandlord) {
            detailsHtml = `
              <div class="grid md:grid-cols-2 gap-3 text-sm">
                <div><span class="font-bold">Address:</span> ${escapeHtml(app.address || 'N/A')}</div>
                <div><span class="font-bold">Proof of Address:</span> <a href="${app.proofOfAddressUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
                <div><span class="font-bold">NIN Card:</span> <a href="${app.ninCardUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
              </div>
            `;
          } else {
            detailsHtml = `
              <div class="grid md:grid-cols-2 gap-3 text-sm">
                <div><span class="font-bold">Business Name:</span> ${escapeHtml(app.businessName || 'N/A')}</div>
                <div><span class="font-bold">Owner Name:</span> ${escapeHtml(app.ownerName || 'N/A')}</div>
                <div><span class="font-bold">Office Address:</span> ${escapeHtml(app.officeAddress || 'N/A')}</div>
                <div><span class="font-bold">TIN:</span> ${escapeHtml(app.tin || 'Not provided')}</div>
                <div><span class="font-bold">CAC Certificate:</span> <a href="${app.cacCertificateUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
                <div><span class="font-bold">Proof of Address:</span> <a href="${app.proofOfAddressUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
              </div>
            `;
          }
          return `
            <div class="bg-white rounded-2xl shadow-sm border border-outline/10 overflow-hidden" data-app-id="${app._id}">
              <div class="p-6">
                <div class="flex flex-wrap items-start justify-between gap-4 mb-4">
                  <div>
                    <h3 class="font-headline text-xl font-extrabold text-primary">${escapeHtml(app.fullName)}</h3>
                    <p class="text-sm text-on-surface-variant">${escapeHtml(app.email)} · ${app.phone || 'No phone'}</p>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="status-badge ${statusClass}">${app.status.toUpperCase()}</span>
                    ${app.status === 'pending' ? `<button class="review-btn bg-tertiary-container text-primary px-4 py-2 rounded-xl text-sm font-bold" data-app-id="${app._id}">Review</button>` : ''}
                  </div>
                </div>
                <div class="border-t border-outline/10 pt-4 mt-2">
                  <p class="text-xs font-bold text-on-surface-variant uppercase mb-2">${isLandlord ? 'Landlord' : 'Agency'} Details</p>
                  ${detailsHtml}
                  ${app.adminNote ? `<div class="mt-3 p-3 bg-surface-container-low rounded-lg text-sm"><span class="font-bold">Admin Note:</span> ${escapeHtml(app.adminNote)}</div>` : ''}
                  <div class="mt-3 text-xs text-on-surface-variant">Submitted: ${formatDate(app.createdAt)}</div>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Attach review button listeners
        document.querySelectorAll('.review-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const appId = btn.dataset.appId;
            const app = applications.find(a => a._id === appId);
            if (app) {
              selectedAppId = appId;
              modalApplicantName.textContent = app.fullName;
              modalStatus.value = 'approved';
              modalNote.value = '';
              modal.classList.remove('hidden');
              modal.classList.add('flex');
            }
          });
        });
      }

      async function submitReview() {
        if (!selectedAppId) return;
        const status = modalStatus.value;
        const adminNote = modalNote.value;
        try {
          showLoading(true);
          await reviewSellerApplication(selectedAppId, status, adminNote);
          showError(`Application ${status} successfully`);
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          await fetchApplications();
        } catch (err) {
          showError(err.message);
        } finally {
          showLoading(false);
        }
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }

      // Event listeners
      statusFilterSelect.addEventListener('change', (e) => {
        statusFilter = e.target.value;
        fetchApplications();
      });
      modalConfirmBtn.addEventListener('click', submitReview);
      modalCancelBtn.addEventListener('click', () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        selectedAppId = null;
      });
      // Close modal on outside click
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          selectedAppId = null;
        }
      });

      // Initial fetch
      fetchApplications();
    </script>
  </body>
</html>
