<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Seller Applications | Admin | Resident</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <link rel="icon" href="images/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="images/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="images/android-chrome-512x512.png" />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      .lucide { width: 1.2rem; height: 1.2rem; stroke-width: 1.8; }
      .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #c5aa23;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .input-field {
        padding: 0.65rem 1rem;
        border-radius: 0.75rem;
        background: white;
        border: 1px solid rgba(116,119,129,0.25);
        outline: none;
        font-size: 0.875rem;
      }
      .input-field:focus {
        border-color: #001c4a;
        box-shadow: 0 0 0 3px rgba(0,28,74,0.14);
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: bold;
      }
      .status-pending { background: #fef3c7; color: #92400e; }
      .status-approved { background: #d1fae5; color: #065f46; }
      .status-rejected { background: #fee2e2; color: #991b1b; }
      .badge-verified { background: #dbeafe; color: #1e40af; }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body antialiased">
    <div id="navbar-container"></div>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
          <div>
            <h1 class="font-headline text-3xl font-extrabold text-primary">Seller Applications</h1>
            <p class="text-on-surface-variant mt-1">Review applications, manage sellers, grant verification badges, and handle suspensions.</p>
          </div>
          <select id="statusFilter" class="input-field w-48">
            <option value="">All Applications</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>

        <div id="loadingOverlay" class="hidden py-10"><div class="loader"></div></div>
        <div id="errorMsg" class="hidden bg-red-50 text-red-700 p-4 rounded-xl mb-6"></div>
        <div id="applicationsContainer" class="space-y-6"></div>
      </div>
    </main>

    <!-- Review Application Modal -->
    <div id="reviewModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
      <div class="bg-white rounded-2xl max-w-md w-full mx-4 p-6">
        <h2 class="font-headline text-xl font-extrabold text-primary mb-4">Review Application</h2>
        <p class="text-sm text-on-surface-variant mb-4">Applicant: <span id="modalApplicantName"></span></p>
        <div class="mb-4">
          <label class="block text-sm font-bold text-primary mb-2">Decision</label>
          <select id="modalStatus" class="input-field w-full">
            <option value="approved">Approve</option>
            <option value="rejected">Reject</option>
          </select>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-bold text-primary mb-2">Admin Note (optional)</label>
          <textarea id="modalNote" rows="3" class="input-field w-full resize-none" placeholder="Reason for approval/rejection..."></textarea>
        </div>
        <div class="flex gap-3">
          <button id="modalConfirmBtn" class="bg-tertiary-container text-primary px-4 py-2 rounded-xl font-bold flex-1">Confirm</button>
          <button id="modalCancelBtn" class="border border-outline/25 text-on-surface-variant px-4 py-2 rounded-xl font-bold flex-1">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Manage Seller Modal (for approved sellers) -->
    <div id="manageSellerModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
      <div class="bg-white rounded-2xl max-w-lg w-full mx-4 p-6">
        <h2 class="font-headline text-xl font-extrabold text-primary mb-4">Manage Seller</h2>
        <p class="text-sm text-on-surface-variant mb-2">Seller: <span id="manageSellerName"></span></p>
        <div class="space-y-4">
          <div class="flex items-center justify-between border-b pb-2">
            <span class="font-bold">Verification Badge</span>
            <div class="flex gap-2">
              <button id="grantBadgeBtn" class="bg-green-100 text-green-800 px-3 py-1 rounded-lg text-sm font-bold">Grant</button>
              <button id="revokeBadgeBtn" class="bg-red-100 text-red-800 px-3 py-1 rounded-lg text-sm font-bold">Revoke</button>
            </div>
          </div>
          <div class="flex items-center justify-between border-b pb-2">
            <span class="font-bold">Account Status</span>
            <div class="flex gap-2">
              <button id="suspendBtn" class="bg-orange-100 text-orange-800 px-3 py-1 rounded-lg text-sm font-bold">Suspend</button>
              <button id="unsuspendBtn" class="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg text-sm font-bold">Unsuspend</button>
            </div>
          </div>
          <div>
            <button id="viewReportsBtn" class="w-full bg-primary/10 text-primary py-2 rounded-xl font-bold text-sm">View Reports</button>
          </div>
        </div>
        <div class="mt-6">
          <button id="closeManageModal" class="w-full border border-outline/25 text-on-surface-variant py-2 rounded-xl font-bold">Close</button>
        </div>
      </div>
    </div>

    <!-- Reports Modal -->
    <div id="reportsModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
      <div class="bg-white rounded-2xl max-w-2xl w-full mx-4 p-6 max-h-[80vh] overflow-y-auto">
        <h2 class="font-headline text-xl font-extrabold text-primary mb-4">Seller Reports</h2>
        <div id="reportsList" class="space-y-3"></div>
        <div class="mt-6">
          <button id="closeReportsModal" class="w-full border border-outline/25 text-on-surface-variant py-2 rounded-xl font-bold">Close</button>
        </div>
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>

    <script type="module">
      import { renderAdminNavbar } from "./js/adminNavbar.js";
      import { getStoredToken, getStoredUser } from "./js/tokenStorage.js";
      import { 
        getSellerApplications, 
        reviewSellerApplication,
        grantVerificationBadge,
        suspendSeller,
        getReports,
        resolveReport
      } from "./slices/sellerService.js";

      // ========== Admin check ==========
      const token = getStoredToken();
      const currentUser = getStoredUser();
      if (!token || !currentUser || currentUser.role !== "admin") {
        alert("Admin access required");
        window.location.href = "login.html";
      }

      // ========== Insert navbar ==========
      const navContainer = document.getElementById("navbar-container");
      if (navContainer) navContainer.appendChild(renderAdminNavbar("applications"));

      // ========== DOM elements ==========
      const container = document.getElementById("applicationsContainer");
      const loadingOverlay = document.getElementById("loadingOverlay");
      const errorMsgDiv = document.getElementById("errorMsg");
      const statusFilterSelect = document.getElementById("statusFilter");

      // Modals
      const reviewModal = document.getElementById("reviewModal");
      const modalApplicantName = document.getElementById("modalApplicantName");
      const modalStatus = document.getElementById("modalStatus");
      const modalNote = document.getElementById("modalNote");
      const modalConfirmBtn = document.getElementById("modalConfirmBtn");
      const modalCancelBtn = document.getElementById("modalCancelBtn");

      const manageModal = document.getElementById("manageSellerModal");
      const manageSellerName = document.getElementById("manageSellerName");
      const grantBadgeBtn = document.getElementById("grantBadgeBtn");
      const revokeBadgeBtn = document.getElementById("revokeBadgeBtn");
      const suspendBtn = document.getElementById("suspendBtn");
      const unsuspendBtn = document.getElementById("unsuspendBtn");
      const viewReportsBtn = document.getElementById("viewReportsBtn");
      const closeManageModal = document.getElementById("closeManageModal");

      const reportsModal = document.getElementById("reportsModal");
      const reportsList = document.getElementById("reportsList");
      const closeReportsModal = document.getElementById("closeReportsModal");

      // ========== State ==========
      let applications = [];          // will hold the array of applications
      let statusFilter = "";
      let selectedAppId = null;
      let currentSellerId = null;

      // ========== Helpers ==========
      function showLoading(show) {
        loadingOverlay.classList.toggle("hidden", !show);
      }

      function showError(msg) {
        errorMsgDiv.textContent = msg;
        errorMsgDiv.classList.remove("hidden");
        setTimeout(() => errorMsgDiv.classList.add("hidden"), 5000);
      }

      function formatDate(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }

      // ========== Render applications ==========
      function renderApplications() {
        if (!applications || applications.length === 0) {
          container.innerHTML = `<div class="text-center py-12 bg-white rounded-2xl shadow-sm border border-outline/10 text-on-surface-variant">No applications found</div>`;
          return;
        }

        container.innerHTML = applications.map(app => {
          const isLandlord = app.sellerType === 'landlord';
          const statusClass = `status-${app.status}`;
          let logoHtml = '';
          if (!isLandlord && app.logoUrl) {
            logoHtml = `<img src="${app.logoUrl}" class="w-12 h-12 object-contain rounded-lg border border-outline/20" />`;
          }
          let detailsHtml = '';
          if (isLandlord) {
            detailsHtml = `
              <div class="grid md:grid-cols-2 gap-3 text-sm">
                <div><span class="font-bold">Address:</span> ${escapeHtml(app.address || 'N/A')}</div>
                <div><span class="font-bold">Proof of Address:</span> <a href="${app.proofOfAddressUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
                <div><span class="font-bold">NIN Card:</span> <a href="${app.ninCardUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
              </div>
            `;
          } else {
            detailsHtml = `
              <div class="grid md:grid-cols-2 gap-3 text-sm">
                <div><span class="font-bold">Business Name:</span> ${escapeHtml(app.businessName || 'N/A')}</div>
                <div><span class="font-bold">Owner Name:</span> ${escapeHtml(app.ownerName || 'N/A')}</div>
                <div><span class="font-bold">Office Address:</span> ${escapeHtml(app.officeAddress || 'N/A')}</div>
                <div><span class="font-bold">TIN:</span> ${escapeHtml(app.tin || 'Not provided')}</div>
                <div><span class="font-bold">CAC Certificate:</span> <a href="${app.cacCertificateUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
                <div><span class="font-bold">Proof of Address:</span> <a href="${app.proofOfAddressUrl}" target="_blank" class="text-tertiary hover:underline">View Document</a></div>
              </div>
            `;
          }
          const userBadge = (app.user && app.user.verificationBadge) ? '✓ Verified' : '';
          return `
            <div class="bg-white rounded-2xl shadow-sm border border-outline/10 overflow-hidden" data-app-id="${app._id}">
              <div class="p-6">
                <div class="flex flex-wrap items-start justify-between gap-4 mb-4">
                  <div class="flex gap-3">
                    ${logoHtml}
                    <div>
                      <h3 class="font-headline text-xl font-extrabold text-primary">${escapeHtml(app.fullName)}</h3>
                      <p class="text-sm text-on-surface-variant">${escapeHtml(app.email)} · ${app.phone || 'No phone'} ${userBadge ? `<span class="badge-verified inline-block ml-2 text-xs">${userBadge}</span>` : ''}</p>
                    </div>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="status-badge ${statusClass}">${app.status.toUpperCase()}</span>
                    ${app.status === 'pending' ? `<button class="review-btn bg-tertiary-container text-primary px-4 py-2 rounded-xl text-sm font-bold" data-app-id="${app._id}">Review</button>` : ''}
                    ${app.status === 'approved' ? `<button class="manage-seller-btn bg-primary/10 text-primary px-4 py-2 rounded-xl text-sm font-bold" data-user-id="${app.user?._id}" data-user-name="${escapeHtml(app.user?.name || app.fullName)}">Manage Seller</button>` : ''}
                  </div>
                </div>
                <div class="border-t border-outline/10 pt-4 mt-2">
                  <p class="text-xs font-bold text-on-surface-variant uppercase mb-2">${isLandlord ? 'Landlord' : 'Agency'} Details</p>
                  ${detailsHtml}
                  ${app.adminNote ? `<div class="mt-3 p-3 bg-surface-container-low rounded-lg text-sm"><span class="font-bold">Admin Note:</span> ${escapeHtml(app.adminNote)}</div>` : ''}
                  <div class="mt-3 text-xs text-on-surface-variant">Submitted: ${formatDate(app.createdAt)}</div>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Attach review buttons
        document.querySelectorAll('.review-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const appId = btn.dataset.appId;
            const app = applications.find(a => a._id === appId);
            if (app) {
              selectedAppId = appId;
              modalApplicantName.textContent = app.fullName;
              modalStatus.value = 'approved';
              modalNote.value = '';
              reviewModal.classList.remove('hidden');
              reviewModal.classList.add('flex');
            }
          });
        });

        // Attach manage seller buttons
        document.querySelectorAll('.manage-seller-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const userId = btn.dataset.userId;
            const userName = btn.dataset.userName;
            currentSellerId = userId;
            manageSellerName.textContent = userName;
            manageModal.classList.remove('hidden');
            manageModal.classList.add('flex');
          });
        });
      }

      // ========== Fetch applications ==========
      async function fetchApplications() {
        showLoading(true);
        try {
          const response = await getSellerApplications(statusFilter);
          // 🔥 CRITICAL: extract the 'applications' array from the response
          applications = response.applications || [];
          renderApplications();
        } catch (err) {
          console.error(err);
          showError("Failed to load applications: " + err.message);
          container.innerHTML = `<div class="text-center py-8 text-red-600">Error loading applications</div>`;
        } finally {
          showLoading(false);
        }
      }

      // ========== Review submission ==========
      async function submitReview() {
        if (!selectedAppId) return;
        const status = modalStatus.value;
        const adminNote = modalNote.value;
        try {
          showLoading(true);
          await reviewSellerApplication(selectedAppId, status, adminNote);
          showError(`Application ${status} successfully`);
          reviewModal.classList.add('hidden');
          reviewModal.classList.remove('flex');
          await fetchApplications();
        } catch (err) {
          showError(err.message);
        } finally {
          showLoading(false);
        }
      }

      // ========== Manage seller actions ==========
      async function handleGrantBadge() {
        if (!currentSellerId) return;
        try {
          showLoading(true);
          await grantVerificationBadge(currentSellerId, true);
          showError("Verification badge granted");
          await fetchApplications();
        } catch (err) {
          showError(err.message);
        } finally {
          showLoading(false);
        }
      }

      async function handleRevokeBadge() {
        if (!currentSellerId) return;
        try {
          showLoading(true);
          await grantVerificationBadge(currentSellerId, false);
          showError("Verification badge revoked");
          await fetchApplications();
        } catch (err) {
          showError(err.message);
        } finally {
          showLoading(false);
        }
      }

      async function handleSuspend() {
        if (!currentSellerId) return;
        const reason = prompt("Reason for suspension (optional):");
        try {
          showLoading(true);
          await suspendSeller(currentSellerId, true, reason || "Suspended by admin");
          showError("Seller suspended");
          await fetchApplications();
        } catch (err) {
          showError(err.message);
        } finally {
          showLoading(false);
        }
      }

      async function handleUnsuspend() {
        if (!currentSellerId) return;
        try {
          showLoading(true);
          await suspendSeller(currentSellerId, false, "");
          showError("Seller unsuspended");
          await fetchApplications();
        } catch (err) {
          showError(err.message);
        } finally {
          showLoading(false);
        }
      }

      async function handleViewReports() {
        if (!currentSellerId) return;
        try {
          showLoading(true);
          const reportsData = await getReports();
          const sellerReports = reportsData.reports ? reportsData.reports.filter(r => r.reportedSeller?._id === currentSellerId) : [];
          if (sellerReports.length === 0) {
            reportsList.innerHTML = '<p class="text-center text-on-surface-variant">No reports found for this seller.</p>';
          } else {
            reportsList.innerHTML = sellerReports.map(r => `
              <div class="border-b pb-3 mb-3">
                <p class="text-sm"><span class="font-bold">Reason:</span> ${escapeHtml(r.reason)}</p>
                <p class="text-xs text-on-surface-variant">Reported by: ${r.reportedBy?.name || 'Unknown'} on ${formatDate(r.createdAt)}</p>
                <p class="text-xs"><span class="font-bold">Status:</span> ${r.status}</p>
                ${r.adminNote ? `<p class="text-xs mt-1"><span class="font-bold">Admin Note:</span> ${escapeHtml(r.adminNote)}</p>` : ''}
              </div>
            `).join('');
          }
          reportsModal.classList.remove('hidden');
          reportsModal.classList.add('flex');
        } catch (err) {
          showError(err.message);
        } finally {
          showLoading(false);
        }
      }

      // ========== Event listeners ==========
      statusFilterSelect.addEventListener('change', (e) => {
        statusFilter = e.target.value;
        fetchApplications();
      });

      modalConfirmBtn.addEventListener('click', submitReview);
      modalCancelBtn.addEventListener('click', () => {
        reviewModal.classList.add('hidden');
        reviewModal.classList.remove('flex');
        selectedAppId = null;
      });
      reviewModal.addEventListener('click', (e) => {
        if (e.target === reviewModal) {
          reviewModal.classList.add('hidden');
          reviewModal.classList.remove('flex');
          selectedAppId = null;
        }
      });

      grantBadgeBtn.addEventListener('click', handleGrantBadge);
      revokeBadgeBtn.addEventListener('click', handleRevokeBadge);
      suspendBtn.addEventListener('click', handleSuspend);
      unsuspendBtn.addEventListener('click', handleUnsuspend);
      viewReportsBtn.addEventListener('click', handleViewReports);
      closeManageModal.addEventListener('click', () => {
        manageModal.classList.add('hidden');
        manageModal.classList.remove('flex');
        currentSellerId = null;
      });
      manageModal.addEventListener('click', (e) => {
        if (e.target === manageModal) {
          manageModal.classList.add('hidden');
          manageModal.classList.remove('flex');
          currentSellerId = null;
        }
      });
      closeReportsModal.addEventListener('click', () => {
        reportsModal.classList.add('hidden');
        reportsModal.classList.remove('flex');
      });
      reportsModal.addEventListener('click', (e) => {
        if (e.target === reportsModal) {
          reportsModal.classList.add('hidden');
          reportsModal.classList.remove('flex');
        }
      });

      // ========== Start ==========
      fetchApplications();
    </script>
  </body>
</html>
