      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />

      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />

    <!-- PNG Favicons -->
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />

    <!-- Apple Touch Icon (iPhone/iPad) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />

    <!-- Android / Chrome Icons -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />

    <!-- Web App Manifest -->
    <link rel="manifest" href="images/site.webmanifest" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
      }
      .font-headline {
        font-family: "Manrope", system-ui, sans-serif;
      }
      .lucide {
        width: 1.25rem;
        height: 1.25rem;
        stroke-width: 1.75;
      }
      .bg-surface {
        background-color: #f9f9fc;
      }
      .text-primary {
        color: #001c4a;
      }
      .bg-tertiary-container {
        background-color: #c5aa23;
      }
      .text-tertiary {
        color: #6e5d00;
      }
      .fade-up {
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1),
          transform 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      }
      .fade-up.revealed {
        opacity: 1;
        transform: translateY(0);
      }
      .gallery-thumb {
        transition: all 0.2s ease;
      }
      .gallery-thumb:hover {
        opacity: 0.8;
        transform: scale(1.02);
      }
      .active-thumb {
        border: 2px solid #c5aa23;
        opacity: 1;
      }
      /* Modal styles */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        cursor: pointer;
      }
      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }
      .close-modal {
        position: absolute;
        top: 20px;
        right: 35px;
        color: #fff;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
      }
      /* custom pulse animation for payment button */
      @keyframes subtlePulse {
        0% {
          box-shadow: 0 0 0 0 rgba(197, 170, 35, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(197, 170, 35, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(197, 170, 35, 0);
        }
      }
      .payment-pulse {
        animation: subtlePulse 1.8s infinite;
      }
    </style>
  </head>

          <button

      // Helper to get property from URL param or from sessionStorage (for cross-page navigation)
      function getSelectedProperty() {
        const urlParams = new URLSearchParams(window.location.search);
        const propertyName = urlParams.get("property");
        if (propertyName && propertiesDB[decodeURIComponent(propertyName)]) {
          return propertiesDB[decodeURIComponent(propertyName)];
        }
        // Fallback: check sessionStorage (set when clicking from listings page)
        const stored = sessionStorage.getItem("selectedProperty");
        if (stored && propertiesDB[stored]) {
          return propertiesDB[stored];
        }
        // Default to first property if none selected
        return propertiesDB["The Pearl Haven"];
      }

      // Global current property reference

      // Payment modal controls
      function openPaymentModal(property) {
        const modal = document.getElementById("paymentModal");
        const detailsContainer = document.getElementById(
          "paymentPropertyDetails",
        );
        const amountSpan = document.getElementById("paymentAmount");
        if (!modal || !detailsContainer) return;

        // Display reservation fee (2% of property price, rounded, for showcase)
        const reservationFee = Math.round(property.priceValue * 0.02);
        const formattedFee = new Intl.NumberFormat("en-NG", {
          style: "currency",
          currency: "NGN",
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
        }).format(reservationFee);
        amountSpan.innerText = formattedFee;

        detailsContainer.innerHTML = `
          <div class="flex justify-between items-center border-b pb-2 mb-2">
            <span class="font-semibold">Property:</span>
            <span class="text-right">${property.name}</span>
          </div>
          <div class="flex justify-between items-center text-xs text-gray-600">
            <span>Location:</span>
            <span>${property.location}</span>
          </div>
          <div class="flex justify-between items-center text-xs text-gray-600 mt-1">
            <span>Full price:</span>
            <span>${property.price}</span>
          </div>
          <div class="flex justify-between items-center text-xs font-medium text-tertiary mt-2 pt-1 border-t">
            <span>Reservation deposit (2%):</span>
            <span>${formattedFee}</span>
          </div>
        `;

        modal.classList.add("active");
        // reinit icons if needed
        setTimeout(() => {
          if (window.lucide) lucide.createIcons();
        }, 50);
      }

      function closePaymentModal() {
        const modal = document.getElementById("paymentModal");
        if (modal) modal.classList.remove("active");
      }

      // handle confirm payment
      function setupPaymentListener(property) {
        const confirmBtn = document.getElementById("confirmPaymentBtn");
        if (confirmBtn) {
          // remove previous listener to avoid duplicates
          const newBtn = confirmBtn.cloneNode(true);
          confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
          newBtn.addEventListener("click", (e) => {
            e.preventDefault();
            // simulate payment processing
            alert(
              `✅ Payment initiated for ${property.name} (Reservation deposit). A secure payment link has been sent to your email. Our concierge will finalize the transaction.`,
            );
            closePaymentModal();
            // additional: you could redirect to a dummy checkout page
          });
        }
      }

                  <div class="flex items-center gap-2"><i data-lucide="mail" class="w-4 h-4 text-tertiary"></i> ${property.agent.email}</div>
                </div>
                <h4 class="font-semibold text-primary mb-3 text-sm">Request a Viewing</h4>
                <form id="contactAgentForm">
                  <input type="text" placeholder="Full Name" required class="w-full mb-3 px-4 py-2 bg-[#f3f3f6] border-none rounded-xl text-sm focus:ring-1 focus:ring-tertiary">
                  <input type="email" placeholder="Email Address" required class="w-full mb-3 px-4 py-2 bg-[#f3f3f6] border-none rounded-xl text-sm focus:ring-1 focus:ring-tertiary">
                  <input type="tel" placeholder="Phone Number" required class="w-full mb-3 px-4 py-2 bg-[#f3f3f6] border-none rounded-xl text-sm focus:ring-1 focus:ring-tertiary">
                  <textarea rows="3" placeholder="Message (e.g., preferred viewing date)" class="w-full mb-4 px-4 py-2 bg-[#f3f3f6] border-none rounded-xl text-sm focus:ring-1 focus:ring-tertiary"></textarea>
                  <button type="submit" class="w-full bg-[#001c4a] text-white py-3 rounded-xl font-semibold hover:bg-[#0d316d] transition flex items-center justify-center gap-2">
                    Send Inquiry <i data-lucide="send" class="w-4 h-4"></i>
                  </button>
                </form>
                <p class="text-[10px] text-center text-gray-400 mt-3">We'll respond within 24 hours</p>
              </div>
            </div>
          </div>
          
          <!-- PROCEED TO PAYMENT BUTTON SECTION (full width bottom) -->
          <div class="mt-12 pt-6 border-t border-gray-200 fade-up">
            <div class="bg-gradient-to-r from-gray-50 to-white rounded-2xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-between gap-5">
              <div class="flex items-center gap-3">
                <div class="bg-tertiary/20 p-3 rounded-full">
                  <i data-lucide="wallet" class="w-6 h-6 text-tertiary"></i>
                </div>
                <div>
                  <h3 class="font-headline font-bold text-primary text-lg">Ready to own this home?</h3>
                </div>
              </div>
              <button id="proceedToPaymentBtn" class="payment-pulse bg-[#c5aa23] hover:bg-[#b3971a] text-[#001c4a] font-bold px-8 py-4 rounded-xl text-base md:text-lg flex items-center gap-3 shadow-lg transition-all duration-300 transform hover:scale-105">
                <i data-lucide="credit-card" class="w-5 h-5"></i> 
                Proceed to Payment
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
        `;

        container.innerHTML = galleryHtml + detailsHtml;
        lucide.createIcons();

        // Add form handler for contact agent
        const form = document.getElementById("contactAgentForm");
        if (form) {
          form.addEventListener("submit", (e) => {
            e.preventDefault();
            alert(
              `Thank you! Your inquiry for ${property.name} has been sent to ${property.agent.name}. We'll contact you shortly.`,
            );
            form.reset();
          });
        }

        // Attach payment button event
        const paymentBtn = document.getElementById("proceedToPaymentBtn");
        if (paymentBtn) {
          // remove any previous listener
          const newPaymentBtn = paymentBtn.cloneNode(true);
          paymentBtn.parentNode.replaceChild(newPaymentBtn, paymentBtn);
          newPaymentBtn.addEventListener("click", (e) => {
            e.preventDefault();
            openPaymentModal(property);
            setupPaymentListener(property);
          });
        }
      }

      // Global functions for gallery
      window.changeMainImage = function (imgSrc, thumbElement) {
        const mainImg = document.getElementById("mainGalleryImg");
        if (mainImg) {
          mainImg.src = imgSrc;
          document.querySelectorAll(".gallery-thumb").forEach((thumb) => {
            thumb.classList.remove("active-thumb");
            thumb.classList.add("border-transparent");
          });
          thumbElement.classList.add("active-thumb");
          thumbElement.classList.remove("border-transparent");
        }
      };

      window.openModal = function (imgSrc) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImage");
        if (modal && modalImg) {
          modalImg.src = imgSrc;
          modal.classList.add("active");
        }
      };

      // Modal close handlers
      function closeModal() {
        const modal = document.getElementById("imageModal");
        if (modal) modal.classList.remove("active");
      }

      function init() {
        const property = getSelectedProperty();
        renderPropertyDetails(property);
        document.title = `${property.name} | Resident Luxury Estate`;

        // Modal events
        const modal = document.getElementById("imageModal");
        const closeBtn = document.querySelector(".close-modal");
        if (closeBtn) closeBtn.onclick = closeModal;
        if (modal)
          modal.onclick = (e) => {
            if (e.target === modal) closeModal();
          };

        // Close payment modal on backdrop click
        const paymentModal = document.getElementById("paymentModal");
        if (paymentModal) {
          paymentModal.onclick = (e) => {
            if (e.target === paymentModal) closePaymentModal();
          };
        }

        // Fade-up observer
        const fadeElements = document.querySelectorAll(".fade-up");
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) entry.target.classList.add("revealed");
            });
          },
          { threshold: 0.1 },
        );
        fadeElements.forEach((el) => observer.observe(el));
      }

      window.addEventListener("DOMContentLoaded", init);
    </script>

    <style>
      .gallery-thumb {
        transition: all 0.2s;
        cursor: pointer;
      }
      .active-thumb {
        border-color: #c5aa23 !important;
        opacity: 1;
      }
      .modal.active {
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      #paymentModal .modal.active {
        display: flex;
      }
    </style>
  </body>
</html>
