<!doctype html>
<html class="scroll-smooth" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Resident</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }

      .hero-radial-mask {
        background: radial-gradient(
          circle at 70% 30%,
          rgba(0, 28, 74, 0.25) 0%,
          rgba(0, 28, 74, 0.75) 75%,
          #001c4a 100%
        );
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .lucide {
        width: 1.2rem;
        height: 1.2rem;
        stroke-width: 1.8;
      }
    </style>
  </head>

  <body class="bg-surface text-on-surface font-body antialiased">
    <main
      class="min-h-screen relative flex items-center justify-center px-5 py-10 overflow-hidden"
    >
      <div class="absolute inset-0 z-0">
        <img
          src="images/hero.avif"
          alt="Luxury residence"
          class="w-full h-full object-cover brightness-[0.58] saturate-110"
        />
        <div class="absolute inset-0 hero-radial-mask mix-blend-multiply"></div>
      </div>

      <section class="relative z-10 w-full max-w-md">
        <div class="glass-card rounded-2xl shadow-2xl p-6 sm:p-8">
          <div class="text-center mb-8">
            <img
              src="images/logo.png"
              alt="Resident"
              class="h-10 mx-auto mb-5 object-contain"
              onerror="
                this.style.display = 'none';
                this.parentElement.innerHTML =
                  '<h1 class=\'text-2xl font-black tracking-tighter text-primary mb-5\'>RESIDENT</h1>' +
                  this.parentElement.innerHTML;
              "
            />

            <h1 class="font-headline text-3xl font-extrabold text-primary">
              Welcome Back
            </h1>
            <p class="text-sm text-on-surface-variant mt-2">
              Login to continue your Resident property experience.
            </p>
          </div>

          <button
            type="button"
            class="w-full flex items-center justify-center gap-3 border border-outline/30 bg-white text-primary rounded-xl py-3 font-bold text-sm hover:bg-surface transition shadow-sm"
          >
            <svg class="w-5 h-5" viewBox="0 0 48 48">
              <path
                fill="#FFC107"
                d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"
              />
              <path
                fill="#FF3D00"
                d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
              />
              <path
                fill="#4CAF50"
                d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.3 35.1 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"
              />
              <path
                fill="#1976D2"
                d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.1 5.6l6.2 5.2C36.9 39.3 44 34 44 24c0-1.3-.1-2.4-.4-3.5z"
              />
            </svg>
            Continue with Google
          </button>

          <div class="flex items-center gap-4 my-6">
            <div class="h-px bg-outline/20 flex-1"></div>
            <span class="text-xs text-on-surface-variant font-semibold"
              >OR</span
            >
            <div class="h-px bg-outline/20 flex-1"></div>
          </div>

          <form action="#" method="POST" class="space-y-5">
            <div>
              <label
                for="email"
                class="block text-sm font-bold text-primary mb-2"
              >
                Email Address
              </label>
              <div class="relative">
                <i
                  data-lucide="mail"
                  class="absolute left-4 top-1/2 -translate-y-1/2 text-outline w-5 h-5"
                ></i>
                <input
                  id="email"
                  type="email"
                  name="email"
                  placeholder="you@example.com"
                  required
                  class="w-full pl-12 pr-4 py-3 rounded-xl bg-white border border-outline/25 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none text-sm font-medium transition"
                />
              </div>
            </div>

            <div>
              <div class="flex items-center justify-between mb-2">
                <label
                  for="password"
                  class="block text-sm font-bold text-primary"
                >
                  Password
                </label>
                <a
                  href="#"
                  class="text-xs font-bold text-tertiary hover:text-primary transition"
                >
                  Forgot password?
                </a>
              </div>

              <div class="relative">
                <i
                  data-lucide="lock"
                  class="absolute left-4 top-1/2 -translate-y-1/2 text-outline w-5 h-5"
                ></i>
                <input
                  id="password"
                  type="password"
                  name="password"
                  placeholder="Enter your password"
                  required
                  class="w-full pl-12 pr-12 py-3 rounded-xl bg-white border border-outline/25 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none text-sm font-medium transition"
                />
                <button
                  type="button"
                  id="togglePassword"
                  class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition"
                >
                  <i data-lucide="eye" class="w-5 h-5"></i>
                </button>
              </div>
            </div>

            <div class="flex items-center justify-between">
              <label
                class="flex items-center gap-2 text-sm text-on-surface-variant"
              >
                <input
                  type="checkbox"
                  class="rounded border-outline/40 text-primary focus:ring-primary"
                />
                Remember me
              </label>
            </div>

            <button
              type="submit"
              class="w-full bg-tertiary-container text-primary py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition shadow-md flex items-center justify-center gap-2"
            >
              Login
              <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
          </form>

          <p class="text-center text-sm text-on-surface-variant mt-7">
            Don’t have an account?
            <a
              href="register.html"
              class="font-bold text-primary hover:text-tertiary transition"
            >
              Create account
            </a>
          </p>
        </div>

        <p class="text-center text-white/70 text-xs mt-6">
          © 2026 Resident Luxury. All rights reserved.
        </p>
      </section>
    </main>

    <script>
      lucide.createIcons();

      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";

        togglePassword.innerHTML = isPassword
          ? '<i data-lucide="eye-off" class="w-5 h-5"></i>'
          : '<i data-lucide="eye" class="w-5 h-5"></i>';

        lucide.createIcons();
      });
    </script>
  </body>
</html>
