<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"
    />
    <title>Login | Rezident Homes</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
            animation: {
              "fade-slide-up":
                "fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards",
              "toast-in": "toastIn 0.25s ease-out forwards",
              "toast-out": "toastOut 0.2s ease-in forwards",
            },
            keyframes: {
              fadeSlideUp: {
                "0%": { opacity: "0", transform: "translateY(14px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              toastIn: {
                "0%": { opacity: "0", transform: "translateX(30px)" },
                "100%": { opacity: "1", transform: "translateX(0)" },
              },
              toastOut: {
                "0%": { opacity: "1", transform: "translateX(0)" },
                "100%": { opacity: "0", transform: "translateX(40px)" },
              },
            },
          },
        },
      };
    </script>
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      .hero-radial-mask {
        background: radial-gradient(
          circle at 70% 30%,
          rgba(0, 28, 74, 0.25) 0%,
          rgba(0, 28, 74, 0.75) 75%,
          #001c4a 100%
        );
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      button:active {
        transform: scale(0.97);
      }
      .btn-loading {
        pointer-events: none;
        opacity: 0.8;
      }
      .toast-container {
        position: fixed;
        bottom: 24px;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 1000;
        pointer-events: none;
      }
      .toast-message {
        pointer-events: auto;
        max-width: 90%;
        width: 360px;
        background: #1f2937;
        backdrop-filter: blur(12px);
        color: white;
        border-radius: 60px;
        padding: 12px 20px;
        font-weight: 500;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 12px;
        border-left: 4px solid;
      }
      .toast-success {
        background: #0a2f1f;
        border-left-color: #4ade80;
      }
      .toast-error {
        background: #4a1a1f;
        border-left-color: #f87171;
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-radius: 50%;
        border-top-color: currentColor;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .otp-digit:focus {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body antialiased relative">
    <main
      class="min-h-screen relative flex items-center justify-center px-5 py-10 overflow-hidden"
    >
      <div class="absolute inset-0 z-0">
        <img
          src="images/hero.avif"
          alt="Luxury residence"
          class="w-full h-full object-cover brightness-[0.58] saturate-110"
        />
        <div class="absolute inset-0 hero-radial-mask mix-blend-multiply"></div>
      </div>

      <section class="relative z-10 w-full max-w-md">
        <div class="glass-card rounded-2xl shadow-2xl p-6 sm:p-8">
          <!-- Step 1: Email + Send OTP -->
          <div id="loginStep1">
            <div class="text-center mb-8">
              <a href="index.html">
                <img
                  src="images/logo.png"
                  alt="Rezident Homes Logo"
                  class="h-10 mx-auto mb-5 object-contain"
                  onerror="
                    this.style.display = 'none';
                    this.parentElement.insertAdjacentHTML(
                      'afterbegin',
                      '<h1 class=\'text-2xl font-black tracking-tighter text-primary mb-5\'>REZIDENT HOMES</h1>',
                    );
                  "
                />
              </a>
              <h1 class="font-headline text-3xl font-extrabold text-primary">
                Welcome Back
              </h1>
              <p class="text-sm text-on-surface-variant mt-2">
                Login to continue your Rezident Homes experience.
              </p>
            </div>

            <!-- Google One-Tap Button (rendered by Google SDK) -->
            <div id="googleButtonWrapper" class="w-full"></div>

            <div class="flex items-center gap-4 my-6">
              <div class="h-px bg-outline/20 flex-1"></div>
              <span class="text-xs text-on-surface-variant font-semibold"
                >OR</span
              >
              <div class="h-px bg-outline/20 flex-1"></div>
            </div>

            <form id="loginEmailForm" class="space-y-5">
              <div>
                <label
                  for="email"
                  class="block text-sm font-bold text-primary mb-2"
                  >Email Address</label
                >
                <div class="relative">
                  <i
                    data-lucide="mail"
                    class="absolute left-4 top-1/2 -translate-y-1/2 text-outline w-5 h-5"
                  ></i>
                  <input
                    id="email"
                    type="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                    class="w-full pl-12 pr-4 py-3 rounded-xl bg-white border border-outline/25 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none text-sm font-medium transition"
                    autocomplete="email"
                  />
                </div>
              </div>
              <button
                type="submit"
                id="sendCodeBtn"
                class="w-full bg-tertiary-container text-primary py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition shadow-md flex items-center justify-center gap-2 active:scale-[0.98]"
              >
                <span>Send Login Code</span>
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
              </button>
            </form>

            <p class="text-center text-sm text-on-surface-variant mt-7">
              Don’t have an account?
              <a
                href="register.html"
                class="font-bold text-primary hover:text-tertiary transition"
                >Create account</a
              >
            </p>
          </div>

          <!-- Step 2: OTP verification -->
          <div id="loginStep2" class="hidden">
            <div class="text-center mb-7">
              <span
                class="inline-flex items-center gap-2 bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide mb-4"
              >
                <i data-lucide="smartphone" class="w-4 h-4"></i>
                Verify Login
              </span>
              <h1 class="font-headline text-3xl font-extrabold text-primary">
                Check Your Email
              </h1>
              <p class="text-sm text-on-surface-variant mt-2">
                We’ve sent a 6‑digit code to
                <span
                  id="otpEmailDisplay"
                  class="font-bold text-primary"
                ></span>
              </p>
            </div>
            <div
              id="otpInputGroup"
              class="flex justify-center gap-3 my-8 flex-wrap"
            ></div>
            <button
              id="verifyOtpBtn"
              class="w-full bg-tertiary-container text-primary py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition shadow-md flex items-center justify-center gap-2 active:scale-[0.98]"
            >
              <span>Login</span>
              <i data-lucide="log-in" class="w-4 h-4"></i>
            </button>
            <div class="text-center mt-6 text-sm">
              <p class="text-on-surface-variant">
                Didn’t receive the code?
                <button
                  id="resendOtpBtn"
                  class="font-bold text-primary hover:text-tertiary transition disabled:opacity-50"
                >
                  Resend OTP
                </button>
              </p>
              <button
                id="backToLogin"
                class="text-outline hover:text-primary mt-2 inline-block font-medium transition"
              >
                ← Back to login
              </button>
            </div>
          </div>
        </div>
        <p class="text-center text-white/70 text-xs mt-6">
          © 2026 Rezident Homes. All rights reserved.
        </p>
      </section>
    </main>

    <div id="toastRoot" class="toast-container"></div>

    <script type="module">
      import { authService } from "./js/authService.js";

      const GOOGLE_CLIENT_ID =
        "139378208657-e640gtpqqljkrve8u7ho82q5v90k6jfl.apps.googleusercontent.com";

      const step1 = document.getElementById("loginStep1");
      const step2 = document.getElementById("loginStep2");
      const loginForm = document.getElementById("loginEmailForm");
      const emailInput = document.getElementById("email");
      const sendCodeBtn = document.getElementById("sendCodeBtn");
      const otpEmailDisplay = document.getElementById("otpEmailDisplay");
      const otpInputGroup = document.getElementById("otpInputGroup");
      const verifyBtn = document.getElementById("verifyOtpBtn");
      const resendBtn = document.getElementById("resendOtpBtn");
      const backBtn = document.getElementById("backToLogin");

      let currentUserId = null;
      let currentEmail = null;

      // ----- Toast system -----
      const toastContainer = document.getElementById("toastRoot");
      function showToast(message, type = "info", duration = 3500) {
        const toast = document.createElement("div");
        toast.className = `toast-message toast-${type}`;
        toast.innerHTML = `<span class="text-base">${type === "success" ? "✓" : type === "error" ? "⚠️" : "ℹ️"}</span><span class="flex-1">${message}</span>`;
        toast.style.animation = "toastIn 0.25s ease-out forwards";
        toastContainer.appendChild(toast);
        setTimeout(() => {
          toast.style.animation = "toastOut 0.2s ease-in forwards";
          setTimeout(() => toast.remove(), 220);
        }, duration);
      }

      // Loading states for buttons
      function setEmailButtonLoading(loading) {
        if (loading) {
          sendCodeBtn.disabled = true;
          sendCodeBtn.innerHTML = `<span class="spinner border-current mr-2"></span> Sending code...`;
        } else {
          sendCodeBtn.disabled = false;
          sendCodeBtn.innerHTML = `<span>Send Login Code</span><i data-lucide="arrow-right" class="w-4 h-4"></i>`;
          lucide.createIcons();
        }
      }
      function setVerifyButtonLoading(loading) {
        if (loading) {
          verifyBtn.disabled = true;
          verifyBtn.innerHTML = `<span class="spinner border-current mr-2"></span> Verifying...`;
        } else {
          verifyBtn.disabled = false;
          verifyBtn.innerHTML = `<span>Login</span><i data-lucide="log-in" class="w-4 h-4"></i>`;
          lucide.createIcons();
        }
      }
      function setResendButtonLoading(loading) {
        if (loading) {
          resendBtn.disabled = true;
          resendBtn.innerHTML = `<span class="spinner inline-block w-3 h-3 border-2 border-primary/40 border-t-primary rounded-full mr-1"></span> Sending...`;
        } else {
          resendBtn.disabled = false;
          resendBtn.innerHTML = `Resend OTP`;
        }
      }

      // OTP inputs management
      function createOTPInputs() {
        otpInputGroup.innerHTML = "";
        const inputs = [];
        for (let i = 0; i < 6; i++) {
          const input = document.createElement("input");
          input.type = "text";
          input.maxLength = 1;
          input.inputMode = "numeric";
          input.autocomplete = "one-time-code";
          input.className =
            "otp-digit w-12 h-14 text-center text-xl font-bold rounded-xl bg-white border border-outline/25 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all";
          otpInputGroup.appendChild(input);
          inputs.push(input);
        }
        inputs.forEach((inp, idx) => {
          inp.addEventListener("input", (e) => {
            let val = e.target.value.replace(/\D/g, "");
            if (val.length > 1) val = val[0];
            inp.value = val;
            if (val && idx < 5) inputs[idx + 1].focus();
          });
          inp.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !inp.value && idx > 0)
              inputs[idx - 1].focus();
          });
        });
        inputs[0]?.addEventListener("paste", (e) => {
          e.preventDefault();
          const paste = (e.clipboardData || window.clipboardData).getData(
            "text",
          );
          const digits = paste.replace(/\D/g, "").slice(0, 6).split("");
          digits.forEach((digit, idx) => {
            if (inputs[idx]) inputs[idx].value = digit;
          });
          if (digits.length < 6 && inputs[digits.length])
            inputs[digits.length].focus();
          else if (digits.length >= 6) inputs[5]?.focus();
        });
        setTimeout(() => inputs[0]?.focus(), 100);
      }
      function getOtpValue() {
        return Array.from(otpInputGroup.querySelectorAll("input"))
          .map((i) => i.value)
          .join("");
      }
      function clearOtpFields() {
        const inputs = otpInputGroup.querySelectorAll("input");
        inputs.forEach((inp) => (inp.value = ""));
        if (inputs[0]) inputs[0].focus();
      }

      function showStep(stepElement) {
        step1.classList.add("hidden");
        step2.classList.add("hidden");
        stepElement.classList.remove("hidden");
        stepElement.style.animation = "fadeSlideUp 0.35s ease-out forwards";
        lucide.createIcons();
      }

      // ---- Email login handlers ----
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        if (!email || !email.includes("@")) {
          showToast("Please enter a valid email address", "error");
          return;
        }
        setEmailButtonLoading(true);
        try {
          const data = await authService.sendSigninOTP({ email });
          currentUserId = data.userId;
          currentEmail = email;
          otpEmailDisplay.textContent = email;
          createOTPInputs();
          showToast(`✨ Verification code sent to ${email}!`, "success", 4000);
          showStep(step2);
        } catch (err) {
          showToast(err.message || "Failed to send code.", "error");
        } finally {
          setEmailButtonLoading(false);
        }
      });

      verifyBtn.addEventListener("click", async () => {
        const otp = getOtpValue();
        if (otp.length !== 6) {
          showToast("Enter the full 6-digit code", "error");
          return;
        }
        setVerifyButtonLoading(true);
        try {
          await authService.verifySigninOTP({ userId: currentUserId, otp });
          showToast("Login successful! Redirecting...", "success", 1500);
          setTimeout(() => {
            window.location.href = "home.html";
          }, 500);
        } catch (err) {
          showToast(err.message || "Invalid verification code", "error");
          setVerifyButtonLoading(false);
        }
      });

      resendBtn.addEventListener("click", async () => {
        if (!currentUserId) {
          showToast("Session expired. Please go back.", "error");
          return;
        }
        setResendButtonLoading(true);
        try {
          await authService.resendOTP({ userId: currentUserId });
          showToast("📬 New code sent! Check your email.", "success", 4000);
          clearOtpFields();
        } catch (err) {
          showToast(err.message || "Resend failed. Try again.", "error");
        } finally {
          setResendButtonLoading(false);
        }
      });

      backBtn.addEventListener("click", () => {
        currentUserId = null;
        currentEmail = null;
        showStep(step1);
        emailInput.value = "";
        setEmailButtonLoading(false);
      });

      // ---------- GOOGLE ONE-TAP / BUTTON (Option 2) ----------
      function initGoogleLogin() {
        if (!window.google || !window.google.accounts) {
          setTimeout(initGoogleLogin, 100);
          return;
        }

        window.google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: async (response) => {
            const idToken = response.credential;
            if (!idToken) {
              showToast("Google sign-in failed: no token received", "error");
              return;
            }
            // Show loading inside the button wrapper
            const wrapper = document.getElementById("googleButtonWrapper");
            const originalHTML = wrapper.innerHTML;
            wrapper.innerHTML = `<div class="flex items-center justify-center gap-2 py-3"><span class="spinner border-primary/60 mr-2"></span> Signing in...</div>`;
            try {
              await authService.googleAuth(idToken);
              showToast("Google sign-in successful! Redirecting...", "success");
              setTimeout(() => {
                window.location.href = "home.html";
              }, 800);
            } catch (err) {
              showToast(
                err.message ||
                  "Google authentication failed. Please try again.",
                "error",
              );
              wrapper.innerHTML = originalHTML;
              // Re-render the button
              window.google.accounts.id.renderButton(wrapper, {
                theme: "outline",
                size: "large",
                width: "100%",
                text: "signin_with",
                shape: "rectangular",
              });
            }
          },
        });

        const wrapper = document.getElementById("googleButtonWrapper");
        window.google.accounts.id.renderButton(wrapper, {
          theme: "outline",
          size: "large",
          width: "100%",
          text: "signin_with", // "signin_with" shows "Sign in with Google"
          shape: "rectangular",
          logo_alignment: "left",
        });

        // Optional: also prompt One-Tap if user is already signed into Google
        window.google.accounts.id.prompt();
      }

      window.addEventListener("load", () => {
        initGoogleLogin();
      });

      // Initial icon render
      lucide.createIcons();
    </script>
  </body>
</html>
