<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"
    />
    <title>Login | Rezident Homes</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
            animation: {
              "fade-slide-up":
                "fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards",
            },
            keyframes: {
              fadeSlideUp: {
                "0%": { opacity: "0", transform: "translateY(14px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
          },
        },
      };
    </script>
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      .hero-radial-mask {
        background: radial-gradient(
          circle at 70% 30%,
          rgba(0, 28, 74, 0.25) 0%,
          rgba(0, 28, 74, 0.75) 75%,
          #001c4a 100%
        );
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
      }
      button:active {
        transform: scale(0.97);
      }
      .btn-loading {
        pointer-events: none;
        opacity: 0.8;
      }

      /* Toast notification styles */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        color: #ffffff;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        pointer-events: auto;
        transform: translateY(100px);
        opacity: 0;
        transition:
          transform 0.35s cubic-bezier(0.21, 1.02, 0.73, 1),
          opacity 0.3s ease-out;
        max-width: 420px;
        word-break: break-word;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .toast.hide {
        transform: translateY(20px);
        opacity: 0;
        transition:
          transform 0.25s ease-in,
          opacity 0.25s ease-in;
      }

      .toast--success {
        background: #065f46;
      }

      .toast--error {
        background: #991b1b;
      }

      .toast--info {
        background: #001c4a;
      }

      .toast-icon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toast-icon svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2;
      }

      .toast-message {
        flex: 1;
      }

      .toast-close {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.7;
        transition: opacity 0.2s;
        background: none;
        border: none;
        padding: 0;
        color: inherit;
      }

      .toast-close:hover {
        opacity: 1;
      }

      .toast-close svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-radius: 50%;
        border-top-color: currentColor;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .otp-digit:focus {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.2);
      }
      /* Google Button Styling */
      #googleButtonWrapper {
        width: 100%;
        min-width: 100%;
        max-width: 100%;
      }

      #googleButtonWrapper > div {
        width: 100% !important;
        min-width: 100% !important;
        max-width: 100% !important;
        border-radius: 12px !important;
        overflow: hidden !important;
        height: 52px !important;
        min-height: 52px !important;
        max-height: 52px !important;
      }

      #googleButtonWrapper iframe {
        width: 100% !important;
        min-width: 100% !important;
        max-width: 100% !important;
        border-radius: 12px !important;
        height: 52px !important;
        min-height: 52px !important;
        max-height: 52px !important;
      }

      #googleButtonWrapper [role="button"] {
        border-radius: 12px !important;
        font-weight: 700 !important;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif !important;
        font-size: 14px !important;
        color: #001c4a !important;
        border: 1px solid #e2e8f0 !important;
        background: white !important;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05) !important;
        height: 52px !important;
        min-height: 52px !important;
        max-height: 52px !important;
        width: 100% !important;
        min-width: 100% !important;
        max-width: 100% !important;
        transition: none !important;
        transform: none !important;
        box-sizing: border-box !important;
      }

      #googleButtonWrapper [role="button"]:hover {
        background: white !important;
        border-color: #e2e8f0 !important;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05) !important;
        transform: none !important;
        height: 52px !important;
      }

      #googleButtonWrapper [role="button"] span {
        font-weight: 700 !important;
        color: #001c4a !important;
        font-size: 14px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
      }

      .google-signin-container,
      #googleButtonWrapper {
        width: 100%;
        height: 52px;
        display: block;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body antialiased relative">
    <main
      class="min-h-screen relative flex items-center justify-center px-5 py-10 overflow-hidden"
    >
      <div class="absolute inset-0 z-0">
        <img
          src="images/hero.avif"
          alt="Luxury residence"
          class="w-full h-full object-cover brightness-[0.58] saturate-110"
        />
        <div class="absolute inset-0 hero-radial-mask mix-blend-multiply"></div>
      </div>

      <section class="relative z-10 w-full max-w-md">
        <div class="glass-card rounded-2xl shadow-2xl p-6 sm:p-8">
          <!-- Step 1: Email + Send OTP -->
          <div id="loginStep1">
            <div class="text-center mb-8">
              <a href="index.html">
                <img
                  src="images/logo.png"
                  alt="Rezident Homes Logo"
                  class="h-10 mx-auto mb-5 object-contain"
                  onerror="
                    this.style.display = 'none';
                    this.parentElement.insertAdjacentHTML(
                      'afterbegin',
                      '<h1 class=\'text-2xl font-black tracking-tighter text-primary mb-5\'>REZIDENT HOMES</h1>',
                    );
                  "
                />
              </a>
              <h1 class="font-headline text-3xl font-extrabold text-primary">
                Welcome Back
              </h1>
              <p class="text-sm text-on-surface-variant mt-2">
                Login to continue your Rezident Homes experience.
              </p>
            </div>

            <!-- Google One-Tap Button -->
            <div id="googleButtonWrapper" class="w-full"></div>

            <div class="flex items-center gap-4 my-6">
              <div class="h-px bg-outline/20 flex-1"></div>
              <span class="text-xs text-on-surface-variant font-semibold"
                >OR</span
              >
              <div class="h-px bg-outline/20 flex-1"></div>
            </div>

            <form id="loginEmailForm" class="space-y-5">
              <div>
                <label
                  for="email"
                  class="block text-sm font-bold text-primary mb-2"
                  >Email Address</label
                >
                <div class="relative">
                  <i
                    data-lucide="mail"
                    class="absolute left-4 top-1/2 -translate-y-1/2 text-outline w-5 h-5"
                  ></i>
                  <input
                    id="email"
                    type="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                    class="w-full pl-12 pr-4 py-3 rounded-xl bg-white border border-outline/25 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none text-sm font-medium transition"
                    autocomplete="email"
                  />
                </div>
              </div>
              <button
                type="submit"
                id="sendCodeBtn"
                class="w-full bg-tertiary-container text-primary py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition shadow-md flex items-center justify-center gap-2 active:scale-[0.98]"
              >
                <span>Send Login Code</span>

            </form>

            <p class="text-center text-sm text-on-surface-variant mt-7">
              Don't have an account?
              <a
                href="register.html"
                class="font-bold text-primary hover:text-tertiary transition"
                >Create account</a
              >
            </p>
          </div>

          <!-- Step 2: OTP verification -->
          <div id="loginStep2" class="hidden">
            <div class="text-center mb-7">
              <span
                class="inline-flex items-center gap-2 bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide mb-4"
              >
                <i data-lucide="smartphone" class="w-4 h-4"></i>
                Verify Login
              </span>
              <h1 class="font-headline text-3xl font-extrabold text-primary">
                Check Your Email
              </h1>
              <p class="text-sm text-on-surface-variant mt-2">
                We've sent a 6‑digit code to
                <span
                  id="otpEmailDisplay"

              </p>
            </div>
            <div
              id="otpInputGroup"
              class="flex justify-center gap-3 my-8 flex-wrap"

            <button
              id="verifyOtpBtn"
              class="w-full bg-tertiary-container text-primary py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition shadow-md flex items-center justify-center gap-2 active:scale-[0.98]"
            >
              <span>Login</span>

            <div class="text-center mt-6 text-sm">
              <p class="text-on-surface-variant">
                Didn't receive the code?
                <button
                  id="resendOtpBtn"
                  class="font-bold text-primary hover:text-tertiary transition disabled:opacity-50"

                  Resend OTP

              </p>
              <button
                id="backToLogin"

        <p class="text-center text-white/70 text-xs mt-6">
          © 2026 Rezident Homes. All rights reserved.
        </p>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module">
      import { authService } from "./js/authService.js";
      import { getStoredUser } from "./js/tokenStorage.js";

      const GOOGLE_CLIENT_ID =
        "139378208657-e640gtpqqljkrve8u7ho82q5v90k6jfl.apps.googleusercontent.com";

      const step1 = document.getElementById("loginStep1");
      const step2 = document.getElementById("loginStep2");
      const loginForm = document.getElementById("loginEmailForm");
      const emailInput = document.getElementById("email");
      const sendCodeBtn = document.getElementById("sendCodeBtn");
      const otpEmailDisplay = document.getElementById("otpEmailDisplay");
      const otpInputGroup = document.getElementById("otpInputGroup");
      const verifyBtn = document.getElementById("verifyOtpBtn");
      const resendBtn = document.getElementById("resendOtpBtn");
      const backBtn = document.getElementById("backToLogin");

      let currentUserId = null;
      let currentEmail = null;

      // ========== Toast notification function ==========
      function showToast(message, type = "info", duration = 4000) {
        const container = document.getElementById("toastContainer");

        const iconPaths = {
          success:
            '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',
          error:
            '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',
          info: '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>',
        };

        const toast = document.createElement("div");
        toast.className = `toast toast--${type}`;
        toast.innerHTML = `
          <span class="toast-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              ${iconPaths[type]}
            </svg>
          </span>
          <span class="toast-message">${message}</span>
          <button class="toast-close" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        `;
        container.appendChild(toast);

        requestAnimationFrame(() => {
          toast.classList.add("show");
        });

        const closeBtn = toast.querySelector(".toast-close");
        closeBtn.addEventListener("click", () => removeToast(toast));

        const timer = setTimeout(() => removeToast(toast), duration);

        function removeToast(toastEl) {
          clearTimeout(timer);
          toastEl.classList.add("hide");
          toastEl.addEventListener("transitionend", () => {
            if (toastEl.parentNode) {
              toastEl.parentNode.removeChild(toastEl);
            }
          });
        }
      }

      // ----- Helper: Get redirect URL after login -----
      async function getRedirectUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const returnTo = urlParams.get("returnTo");

        if (returnTo) {
          const decodedUrl = decodeURIComponent(returnTo);

          if (decodedUrl.includes("seller-register.html")) {
            let userData = null;
            for (let i = 0; i < 20; i++) {
              const userDataStr = localStorage.getItem("auth_user");
              console.log(
                `Attempt ${i + 1}: auth_user =`,
                userDataStr ? "found" : "not yet",
              );

              if (userDataStr) {
                try {
                  userData = JSON.parse(userDataStr);
                  console.log("User data found:", userData);
                  break;
                } catch (e) {
                  console.log("Parse error:", e);
                }
              }
              await new Promise((resolve) => setTimeout(resolve, 200));
            }

            if (userData && userData.role === "seller") {
              console.log("User is a seller, redirecting to profile.html");
              return decodedUrl.replace("seller-register.html", "profile.html");
            } else {
              console.log(
                "Not a seller or no data, staying with seller-register.html",
              );
            }
          }

          return decodedUrl;
        }

        return "home.html";
      }

      // Loading states for buttons
      function setEmailButtonLoading(loading) {
        if (loading) {
          sendCodeBtn.disabled = true;
          sendCodeBtn.innerHTML = `<span class="spinner border-current mr-2"></span> Sending code...`;
        } else {
          sendCodeBtn.disabled = false;
          sendCodeBtn.innerHTML = `<span>Send Login Code</span><i data-lucide="arrow-right" class="w-4 h-4"></i>`;
          lucide.createIcons();
        }
      }
      function setVerifyButtonLoading(loading) {
        if (loading) {
          verifyBtn.disabled = true;
          verifyBtn.innerHTML = `<span class="spinner border-current mr-2"></span> Verifying...`;
        } else {
          verifyBtn.disabled = false;
          verifyBtn.innerHTML = `<span>Login</span><i data-lucide="log-in" class="w-4 h-4"></i>`;
          lucide.createIcons();
        }
      }
      function setResendButtonLoading(loading) {
        if (loading) {
          resendBtn.disabled = true;
          resendBtn.innerHTML = `<span class="spinner inline-block w-3 h-3 border-2 border-primary/40 border-t-primary rounded-full mr-1"></span> Sending...`;
        } else {
          resendBtn.disabled = false;
          resendBtn.innerHTML = `Resend OTP`;
        }
      }

      // OTP inputs management
      function createOTPInputs() {
        otpInputGroup.innerHTML = "";
        const inputs = [];
        for (let i = 0; i < 6; i++) {
          const input = document.createElement("input");
          input.type = "text";
          input.maxLength = 1;
          input.inputMode = "numeric";
          input.autocomplete = "one-time-code";
          input.className =
            "otp-digit w-12 h-14 text-center text-xl font-bold rounded-xl bg-white border border-outline/25 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all";
          otpInputGroup.appendChild(input);
          inputs.push(input);
        }
        inputs.forEach((inp, idx) => {
          inp.addEventListener("input", (e) => {
            let val = e.target.value.replace(/\D/g, "");
            if (val.length > 1) val = val[0];
            inp.value = val;
            if (val && idx < 5) inputs[idx + 1].focus();
          });
          inp.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !inp.value && idx > 0)
              inputs[idx - 1].focus();
          });
        });
        inputs[0]?.addEventListener("paste", (e) => {
          e.preventDefault();
          const paste = (e.clipboardData || window.clipboardData).getData(
            "text",
          );
          const digits = paste.replace(/\D/g, "").slice(0, 6).split("");
          digits.forEach((digit, idx) => {
            if (inputs[idx]) inputs[idx].value = digit;
          });
          if (digits.length < 6 && inputs[digits.length])
            inputs[digits.length].focus();
          else if (digits.length >= 6) inputs[5]?.focus();
        });
        setTimeout(() => inputs[0]?.focus(), 100);
      }
      function getOtpValue() {
        return Array.from(otpInputGroup.querySelectorAll("input"))
          .map((i) => i.value)
          .join("");
      }
      function clearOtpFields() {
        const inputs = otpInputGroup.querySelectorAll("input");
        inputs.forEach((inp) => (inp.value = ""));
        if (inputs[0]) inputs[0].focus();
      }

      function showStep(stepElement) {
        step1.classList.add("hidden");
        step2.classList.add("hidden");
        stepElement.classList.remove("hidden");
        stepElement.style.animation = "fadeSlideUp 0.35s ease-out forwards";
        lucide.createIcons();
      }

      // ---- Email login handlers ----
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        if (!email || !email.includes("@")) {
          showToast("Please enter a valid email address", "error");
          return;
        }
        setEmailButtonLoading(true);
        try {
          const data = await authService.sendSigninOTP({ email });
          currentUserId = data.userId;
          currentEmail = email;
          otpEmailDisplay.textContent = email;
          createOTPInputs();
          showToast(`Verification code sent to ${email}!`, "success", 4000);
          showStep(step2);
        } catch (err) {
          showToast(err.message || "Failed to send code.", "error");
        } finally {
          setEmailButtonLoading(false);
        }
      });

      verifyBtn.addEventListener("click", async () => {
        const otp = getOtpValue();
        if (otp.length !== 6) {
          showToast("Enter the full 6-digit code", "error");
          return;
        }
        setVerifyButtonLoading(true);
        try {
          const data = await authService.verifySigninOTP({
            userId: currentUserId,
            otp,
          });

          localStorage.setItem(
            "DEBUG_LOGIN_DATA",
            JSON.stringify({
              fullData: data,
              role: data.role,
              typeOfRole: typeof data.role,
              allKeys: Object.keys(data),
              auth_token: localStorage.getItem("auth_token"),
              auth_user: localStorage.getItem("auth_user"),
              urlParams: window.location.search,
              returnTo: new URLSearchParams(window.location.search).get(
                "returnTo",
              ),
            }),
          );

          showToast("Login successful! Redirecting...", "success", 1500);

          setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const returnTo = urlParams.get("returnTo");
            let redirectUrl = "home.html";

            if (returnTo) {
              redirectUrl = decodeURIComponent(returnTo);
              if (
                redirectUrl.includes("seller-register.html") &&
                data.role === "seller"
              ) {
                redirectUrl = redirectUrl.replace(
                  "seller-register.html",
                  "profile.html",
                );
              }
            }

            window.location.href = redirectUrl;
          }, 500);
        } catch (err) {
          showToast(err.message || "Invalid verification code", "error");
          setVerifyButtonLoading(false);
        }
      });

      resendBtn.addEventListener("click", async () => {
        if (!currentUserId) {
          showToast("Session expired. Please go back.", "error");
          return;
        }
        setResendButtonLoading(true);
        try {
          await authService.resendOTP({ userId: currentUserId });
          showToast("New code sent! Check your email.", "success", 4000);
          clearOtpFields();
        } catch (err) {
          showToast(err.message || "Resend failed. Try again.", "error");
        } finally {
          setResendButtonLoading(false);
        }
      });

      backBtn.addEventListener("click", () => {
        currentUserId = null;
        currentEmail = null;
        showStep(step1);
        emailInput.value = "";
        setEmailButtonLoading(false);
      });

      // ---------- GOOGLE ONE-TAP / BUTTON ----------
      function initGoogleLogin() {
        if (!window.google || !window.google.accounts) {
          setTimeout(initGoogleLogin, 100);
          return;
        }

        window.google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: async (response) => {
            const idToken = response.credential;
            if (!idToken) {
              showToast("Google sign-in failed: no token received", "error");
              return;
            }
            const wrapper = document.getElementById("googleButtonWrapper");
            const originalHTML = wrapper.innerHTML;
            wrapper.innerHTML = `<div class="flex items-center justify-center gap-2 py-3"><span class="spinner border-primary/60 mr-2"></span> Signing in...</div>`;
            try {
              const data = await authService.googleAuth(idToken);
              showToast("Google sign-in successful! Redirecting...", "success");

              const urlParams = new URLSearchParams(window.location.search);
              const returnTo = urlParams.get("returnTo");

              let redirectUrl = "home.html";

              if (returnTo) {
                redirectUrl = decodeURIComponent(returnTo);

                if (
                  redirectUrl.includes("seller-register.html") &&
                  data.role === "seller"
                ) {
                  redirectUrl = redirectUrl.replace(
                    "seller-register.html",
                    "profile.html",
                  );
                }
              }

              console.log("Redirecting to:", redirectUrl);
              window.location.href = redirectUrl;
            } catch (err) {
              showToast(
                err.message ||
                  "Google authentication failed. Please try again.",
                "error",
              );
              wrapper.innerHTML = originalHTML;
              window.google.accounts.id.renderButton(wrapper, {
                theme: "outline",
                size: "large",
                width: "100%",
                text: "signin_with",
                shape: "rectangular",
              });
            }
          },
        });

        const wrapper = document.getElementById("googleButtonWrapper");
        window.google.accounts.id.renderButton(wrapper, {
          theme: "outline",
          size: "large",
          width: "100%",
          text: "signin_with",
          shape: "rectangular",
          logo_alignment: "left",
        });

        window.google.accounts.id.prompt();
      }

      window.addEventListener("load", () => {
        initGoogleLogin();
      });

      // Initial icon render
      lucide.createIcons();
    </script>
  </body>
</html>
