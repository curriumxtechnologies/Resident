<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Property Details | Rezident Homes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #faf9f7;
        color: #1a1a1a;
      }
      .font-headline {
        font-family: "Manrope", system-ui, sans-serif;
      }
      .lucide {
        width: 1.15rem;
        height: 1.15rem;
        stroke-width: 1.8;
      }
      .loader {
        border: 3px solid #eae5df;
        border-top: 3px solid #1a1a1a;
        border-radius: 50%;
        width: 44px;
        height: 44px;
        animation: spin 0.7s linear infinite;
        margin: 24px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      .toast-stack {
        position: fixed;
        top: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
        z-index: 1200;
        pointer-events: none;
        max-width: 420px;
      }
      .toast-message {
        pointer-events: auto;
        width: 100%;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(24px);
        color: #1a1a1a;
        border-radius: 20px;
        padding: 16px 20px;
        font-weight: 500;
        font-size: 0.875rem;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        box-shadow:
          0 25px 30px -12px rgba(0, 0, 0, 0.08),
          0 0 0 1px rgba(0, 0, 0, 0.03);
        border-left: 4px solid;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        animation: slideIn 0.3s ease forwards;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      .toast-success {
        border-left-color: #2b6b4f;
        background: #f0f7f4;
      }
      .toast-error {
        border-left-color: #b23b3b;
        background: #fef5f5;
      }
      .toast-info {
        border-left-color: #3a5a7c;
        background: #f4f8fc;
      }

      .gallery-thumb {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 16px;
        opacity: 0.85;
      }
      .gallery-thumb:hover {
        transform: scale(1.04);
        border-color: #1a1a1a;
        opacity: 1;
        box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.15);
      }
      .gallery-thumb.active {
        border-color: #1a1a1a;
        opacity: 1;
        box-shadow: 0 8px 16px -8px rgba(0, 0, 0, 0.2);
      }

      .modal-backdrop {
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(6px);
      }
      .modal-content {
        background: #ffffff;
        border-radius: 32px;
        padding: 2rem;
        max-width: 480px;
        width: 100%;
        box-shadow:
          0 30px 50px -15px rgba(0, 0, 0, 0.2),
          0 0 0 1px rgba(0, 0, 0, 0.04);
        animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: scale(0.96) translateY(12px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      .star-btn {
        transition: all 0.2s ease;
        font-size: 2.5rem;
        line-height: 1;
      }
      .star-btn:hover {
        transform: scale(1.15);
      }
      .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: white;
        animation: spin 0.6s linear infinite;
      }
      .premium-card {
        background: #ffffff;
        border-radius: 28px;
        box-shadow:
          0 4px 20px rgba(0, 0, 0, 0.02),
          0 1px 3px rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(0, 0, 0, 0.04);
        transition: box-shadow 0.2s ease;
      }
      .premium-card:hover {
        box-shadow:
          0 15px 30px -10px rgba(0, 0, 0, 0.06),
          0 0 0 1px rgba(0, 0, 0, 0.03);
      }
      button:active {
        transform: scale(0.97);
      }
      .highlight-ring:focus-visible {
        outline: 2px solid #1a1a1a;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body class="text-slate-800 antialiased bg-[#faf9f7]">
    <div id="toastStack" class="toast-stack"></div>
    <div
      id="loadingOverlay"
      class="hidden fixed inset-0 bg-white/95 backdrop-blur-sm z-50 flex items-center justify-center"
    >
      <div class="text-center">
        <div class="loader"></div>
        <p class="text-slate-500 mt-5 text-sm font-medium tracking-wide">
          Loading...
        </p>
      </div>
    </div>

    <header
      class="sticky top-0 w-full z-40 bg-[#faf9f7]/80 backdrop-blur-2xl border-b border-white/50 shadow-sm"
    >
      <div class="max-w-7xl mx-auto px-5 md:px-8">
        <div class="flex items-center justify-between h-16 lg:h-20">
          <a href="home.html" class="flex-shrink-0">
            <img
              src="images/logo.png"
              alt="Rezident Homes Logo"
              class="h-9 lg:h-11 w-auto object-contain opacity-90 hover:opacity-100 transition-opacity"
            />
          </a>
          <div class="flex items-center gap-5">
            <span
              id="userNameDisplay"
              class="hidden md:inline-block text-sm font-medium text-slate-600 tracking-wide"
              >Guest</span
            >
            <a
              href="profile.html"
              id="userAvatar"
              class="w-10 h-10 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center font-semibold shadow-sm hover:shadow-md transition-all overflow-hidden border border-white"
            >
              <span id="avatarInitials">G</span>
              <img
                id="avatarImage"
                class="hidden w-full h-full object-cover"
                alt="Profile"
              />
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <div id="loadingState" class="py-40 text-center">
          <div class="loader"></div>
          <p class="text-slate-500 mt-5 text-sm tracking-wide">
            Loading property details...
          </p>
        </div>
        <div
          id="errorState"
          class="hidden bg-red-50/70 text-red-800 p-10 rounded-3xl text-center shadow-sm border border-red-100/60"
        ></div>
        <div id="propertyContent" class="hidden"></div>
      </div>
    </main>

    <!-- Report Modal -->
    <div
      id="reportModal"
      class="hidden fixed inset-0 z-[999] modal-backdrop px-5 flex items-center justify-center"
    >
      <div class="modal-content">
        <div class="flex items-center justify-between mb-7">
          <h2 class="font-headline text-xl font-extrabold text-slate-900">
            Report Listing
          </h2>
          <button
            id="closeReportModal"
            class="text-slate-400 hover:text-slate-800 transition-colors p-2 rounded-xl hover:bg-slate-100"
          >
            <i data-lucide="x"></i>
          </button>
        </div>
        <form id="reportForm" class="space-y-5">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2"
              >Reason for report</label
            >
            <select
              id="reportReason"
              class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/80 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition"
            >
              <option value="Fake property listing">
                Fake property listing
              </option>
              <option value="Wrong property information">
                Wrong property information
              </option>
              <option value="Suspicious payment request">
                Suspicious payment request
              </option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2"
              >Additional details (optional)</label
            >
            <textarea
              id="reportMessage"
              rows="3"
              class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/80 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition resize-none"
              placeholder="Please describe the issue..."
            ></textarea>
          </div>
          <button
            type="submit"
            class="w-full bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-bold transition-colors shadow-sm flex items-center justify-center gap-2 text-sm"
          >
            <i data-lucide="flag"></i> Submit Report
          </button>
        </form>
      </div>
    </div>

    <!-- Payment Modal -->
    <div
      id="paymentModal"
      class="hidden fixed inset-0 z-[999] modal-backdrop px-5 flex items-center justify-center"
    >
      <div class="modal-content">
        <div class="flex items-center justify-between mb-7">
          <h2 class="font-headline text-xl font-extrabold text-slate-900">
            Secure Payment
          </h2>
          <button
            id="closePaymentModal"
            class="text-slate-400 hover:text-slate-800 transition-colors p-2 rounded-xl hover:bg-slate-100"
          >
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="bg-slate-50/80 rounded-2xl p-6 mb-6">
          <div class="flex justify-between items-center">
            <span class="text-sm text-slate-600">Transaction type</span>
            <span
              id="paymentActionText"
              class="font-bold capitalize bg-white px-4 py-1.5 rounded-full text-sm shadow-sm"
              >rent</span
            >
          </div>
          <div
            class="flex justify-between items-center mt-5 pt-5 border-t border-slate-200/70"
          >
            <span class="text-sm text-slate-600">Amount</span>
            <span
              id="paymentAmount"
              class="text-2xl font-extrabold text-slate-900"
            ></span>
          </div>
        </div>
        <div class="mb-6">
          <label class="block text-sm font-bold text-slate-700 mb-2"
            >Email address for receipt</label
          >
          <input
            type="email"
            id="paymentEmail"
            class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/80 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition text-sm"
            placeholder="your@email.com"
          />
        </div>
        <div class="flex gap-4">
          <button
            id="confirmPaymentBtn"
            class="flex-1 bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-2xl font-bold transition-colors shadow-sm flex items-center justify-center text-sm"
          >
            <span id="payButtonText">Pay Now</span>
            <span
              id="payButtonSpinner"

            ></span>

          <button

            class="flex-1 border border-slate-200 hover:bg-slate-50 text-slate-700 py-4 rounded-2xl font-bold transition-colors text-sm"
          >
            Cancel
          </button>
        </div>
        <p
          class="text-xs text-slate-400 text-center mt-5 flex items-center justify-center gap-1.5"
        >
          <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Secured by
          Paystack · SSL encrypted
        </p>
      </div>
    </div>

    <!-- Review Modal -->
    <div
      id="reviewModal"
      class="hidden fixed inset-0 z-[999] modal-backdrop px-5 flex items-center justify-center"
    >
      <div class="modal-content">
        <div class="flex items-center justify-between mb-7">
          <h2 class="font-headline text-xl font-extrabold text-slate-900">
            Write a Review
          </h2>
          <button
            id="closeReviewModal"
            class="text-slate-400 hover:text-slate-800 transition-colors p-2 rounded-xl hover:bg-slate-100"
          >
            <i data-lucide="x"></i>
          </button>
        </div>
        <form id="reviewForm" class="space-y-5">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-3"
              >Your rating</label
            >
            <div class="flex gap-2" id="starRating">
              <button
                type="button"
                data-value="1"
                class="star-btn text-slate-300 hover:text-amber-500 transition-all"
              >
                ★
              </button>
              <button
                type="button"
                data-value="2"
                class="star-btn text-slate-300 hover:text-amber-500 transition-all"
              >
                ★
              </button>
              <button
                type="button"
                data-value="3"
                class="star-btn text-slate-300 hover:text-amber-500 transition-all"
              >
                ★
              </button>
              <button
                type="button"
                data-value="4"
                class="star-btn text-slate-300 hover:text-amber-500 transition-all"
              >
                ★
              </button>
              <button
                type="button"
                data-value="5"
                class="star-btn text-slate-300 hover:text-amber-500 transition-all"
              >
                ★
              </button>
            </div>
            <input type="hidden" id="reviewRating" value="0" />
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2"
              >Your review</label
            >
            <textarea
              id="reviewComment"
              rows="4"
              class="w-full px-5 py-3.5 rounded-2xl border border-slate-200 bg-slate-50/80 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent transition resize-none text-sm"
              placeholder="Share your experience with this seller..."

            <p class="text-xs text-slate-400 mt-1.5">
              Character count: <span id="charCount">0</span>/500
            </p>
          </div>
          <button
            type="submit"
            class="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-2xl font-bold transition-colors shadow-sm flex items-center justify-center gap-2 text-sm"

    <script type="module">
      import { getBaseURL, apiRequest } from "./js/apiConfig.js";
      import { getStoredUser, getStoredToken } from "./js/tokenStorage.js";
      import { reportSeller, addSellerReview } from "./slices/sellerService.js";

      const toastStack = document.getElementById("toastStack");

      function showToast(message, type = "info", duration = 4500) {
        const icons = {
          success: "check-circle",
          error: "alert-circle",
          info: "info",
        };
        const toast = document.createElement("div");
        toast.className = `toast-message toast-${type}`;
        toast.innerHTML = `
          <i data-lucide="${icons[type] || "info"}" class="w-5 h-5 flex-shrink-0 ${
            type === "success"
              ? "text-emerald-700"
              : type === "error"
                ? "text-red-700"
                : "text-blue-700"
          }"></i>
          <span class="flex-1 text-sm">${message}</span>
          <button class="text-slate-400 hover:text-slate-600 transition-colors flex-shrink-0" onclick="this.parentElement.remove()">
            <i data-lucide="x" class="w-4 h-4"></i>
          </button>
        `;
        toastStack.appendChild(toast);
        lucide.createIcons({ nodes: [toast] });
        setTimeout(() => {
          if (toast.parentElement) {
            toast.style.opacity = "0";
            toast.style.transform = "translateX(30px)";
            toast.style.transition = "all 0.3s ease";
            setTimeout(() => {
              if (toast.parentElement) toast.remove();
            }, 300);
          }
        }, duration);
      }

      function formatNaira(amount) {
        if (!amount && amount !== 0) return "₦0";
        return new Intl.NumberFormat("en-NG", {
          style: "currency",
          currency: "NGN",
          minimumFractionDigits: 0,
        }).format(amount);
      }

      function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const propertyId = urlParams.get("id");

      if (!propertyId) {
        document.getElementById("errorState").innerHTML = `
          <div class="flex items-center justify-center gap-2 text-sm"><i data-lucide="alert-triangle" class="w-5 h-5"></i><span>No property ID provided.</span></div>`;
        document.getElementById("errorState").classList.remove("hidden");
        document.getElementById("loadingState").classList.add("hidden");
        lucide.createIcons();
      }

      const loadingState = document.getElementById("loadingState");
      const errorState = document.getElementById("errorState");
      const propertyContent = document.getElementById("propertyContent");
      const loadingOverlay = document.getElementById("loadingOverlay");

      async function fetchProperty() {
        try {
          const data = await apiRequest(`/houses/${propertyId}`);
          return data.house;
        } catch (err) {
          throw new Error(err.message || "Property not found");
        }
      }

      async function renderProperty() {
        loadingState.classList.remove("hidden");
        errorState.classList.add("hidden");
        propertyContent.classList.add("hidden");

        try {
          const house = await fetchProperty();
          if (!house) throw new Error("Property not found");
          const seller = house.user || {};
          const isRent = house.listingType === "rent";

          const sellerLogo = seller.profile || "images/icon.png";
          const sellerBadge = seller.verificationBadge
            ? `<span class="ml-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200/60">
                <i data-lucide="badge-check" class="w-3.5 h-3.5 mr-1"></i>Verified
              </span>`
            : "";

          const mainImage = house.images?.[0]?.url || "images/hero.avif";
          const galleryImages = house.images?.slice(1) || [];

          let reviewsHtml =
            '<p class="text-slate-500 text-center py-10 italic text-sm">No reviews yet. Be the first to review!</p>';
          let avgRating = 0;
          let reviewsList = [];
          try {
            const sellerDetails = await apiRequest(`/sellers/${seller._id}`);
            if (sellerDetails?.reviews?.list?.length) {
              reviewsList = sellerDetails.reviews.list;
              avgRating = sellerDetails.reviews.averageRating || 0;
              reviewsHtml = reviewsList
                .slice(0, 5)
                .map(
                  (r) => `
                <div class="border-b border-slate-100 pb-6 last:border-0 last:pb-0">
                  <div class="flex justify-between items-start">
                    <div>
                      <p class="font-bold text-slate-800 text-sm">${escapeHtml(r.reviewer?.name || "Anonymous")}</p>
                      <p class="text-xs text-slate-400 mt-1">${new Date(r.createdAt).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" })}</p>
                    </div>
                    <div class="flex text-amber-500 text-sm">${"★".repeat(Math.floor(r.rating))}<span class="text-slate-200">${"★".repeat(5 - Math.floor(r.rating))}</span></div>
                  </div>
                  ${r.comment ? `<p class="text-sm text-slate-600 mt-3 leading-relaxed">${escapeHtml(r.comment)}</p>` : ""}
                </div>
              `,
                )
                .join("");
            }
          } catch (e) {
            console.warn("Could not fetch reviews:", e);
          }

          const html = `
          <div class="grid lg:grid-cols-3 gap-8 lg:gap-10">
            <div class="lg:col-span-2 space-y-8">
              <div class="premium-card overflow-hidden">
                <div class="relative">
                  <img src="${mainImage}" class="w-full h-80 md:h-[30rem] object-cover" id="mainImage" alt="Property image" onerror="this.src='images/hero.avif'" />
                </div>
                ${
                  galleryImages.length
                    ? `
                <div class="p-5 flex gap-4 overflow-x-auto scrollbar-hide">
                  ${galleryImages
                    .map(
                      (img, idx) => `
                    <img src="${img.url}" class="w-20 h-20 object-cover rounded-2xl gallery-thumb shadow-sm flex-shrink-0" data-img="${img.url}" alt="View ${idx + 1}" onerror="this.style.display='none'" />
                  `,
                    )
                    .join("")}
                </div>`
                    : ""
                }
              </div>

              <div class="premium-card p-7 md:p-9">
                <div class="flex flex-wrap justify-between items-start gap-4 mb-6">
                  <div>
                    <h1 class="font-headline text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight leading-tight">${escapeHtml(house.title || "Beautiful Property")}</h1>
                    <p class="text-slate-500 flex items-center gap-2 mt-3 text-sm"><i data-lucide="map-pin" class="w-4 h-4"></i>${escapeHtml(house.address || `${house.lga || ""}, ${house.state || ""}`)}</p>
                  </div>
                </div>
                <div class="flex items-baseline gap-2 mb-8"><span class="text-3xl font-extrabold text-slate-900">${formatNaira(house.price)}</span>${isRent ? '<span class="text-slate-500 font-medium text-sm">/year</span>' : ""}</div>
                
                <!-- Small feature indicators -->
                <div class="flex flex-wrap items-center gap-6 mb-8 text-slate-600">
                  <div class="flex items-center gap-2 text-xs font-medium"><i data-lucide="bed" class="w-4 h-4"></i> ${house.bedrooms || "?"} Beds</div>
                  <div class="flex items-center gap-2 text-xs font-medium"><i data-lucide="bath" class="w-4 h-4"></i> ${house.bathrooms || "?"} Baths</div>
                  <div class="flex items-center gap-2 text-xs font-medium"><i data-lucide="maximize" class="w-4 h-4"></i> ${house.size || "?"} m²</div>
                </div>

                <div class="prose prose-slate max-w-none"><h3 class="font-headline text-xl font-bold mb-4">About this property</h3><p class="text-slate-600 leading-relaxed text-sm">${escapeHtml(house.description || "No description provided.")}</p></div>
                <hr class="my-8 border-slate-100" />
                <div class="grid sm:grid-cols-2 gap-3 text-sm">
                  <div class="flex justify-between py-3 border-b border-slate-50"><span class="text-slate-500 text-xs">Property Type</span><span class="font-semibold text-sm">${escapeHtml(house.propertyType || "N/A")}</span></div>
                  <div class="flex justify-between py-3 border-b border-slate-50"><span class="text-slate-500 text-xs">Year Built</span><span class="font-semibold text-sm">${house.yearBuilt || "N/A"}</span></div>
                  ${isRent ? `<div class="flex justify-between py-3 border-b border-slate-50"><span class="text-slate-500 text-xs">Lease Term</span><span class="font-semibold text-sm">${escapeHtml(house.leaseTerm || "N/A")}</span></div><div class="flex justify-between py-3 border-b border-slate-50"><span class="text-slate-500 text-xs">Security Deposit</span><span class="font-semibold text-sm">${escapeHtml(house.securityDeposit || "N/A")}</span></div>` : `<div class="flex justify-between py-3 border-b border-slate-50"><span class="text-slate-500 text-xs">Ownership Type</span><span class="font-semibold text-sm">${escapeHtml(house.ownershipType || "N/A")}</span></div>`}
                  <div class="flex justify-between py-3 border-b border-slate-50"><span class="text-slate-500 text-xs">Listing Type</span><span class="font-semibold capitalize text-sm">${house.listingType || "N/A"}</span></div>
                </div>
              </div>

              <div class="premium-card p-7 md:p-9 flex flex-col sm:flex-row sm:items-center gap-6">
                <div class="relative flex-shrink-0"><img src="${sellerLogo}" class="w-20 h-20 rounded-full object-cover border-2 border-white shadow-md" alt="Seller" onerror="this.src='images/icon.png'" />${seller.verificationBadge ? '<span class="absolute -bottom-1 -right-1 bg-blue-600 text-white rounded-full p-1"><i data-lucide="check" class="w-3 h-3"></i></span>' : ""}</div>
                <div><h2 class="font-headline text-xl font-bold text-slate-900 flex items-center gap-2 flex-wrap">${escapeHtml(seller.name || "Property Seller")} ${sellerBadge}</h2><p class="text-xs text-slate-500">${seller.sellerType === "agency" ? "Real Estate Agency" : "Private Landlord"}</p><a href="seller-profile.html?id=${seller._id}" class="text-xs font-bold text-slate-800 hover:text-slate-600 underline underline-offset-2 mt-2 inline-block">View full profile →</a></div>
                <div class="flex flex-wrap gap-3 sm:ml-auto">
                  <button id="contactSellerBtn" class="inline-flex items-center gap-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-800 px-5 py-2.5 rounded-xl text-xs font-bold transition-colors shadow-sm"><i data-lucide="phone"></i> Contact</button>
                  <button id="reportSellerBtn" class="inline-flex items-center gap-2 border border-red-200 text-red-600 hover:bg-red-50 px-5 py-2.5 rounded-xl text-xs font-bold transition-colors"><i data-lucide="flag"></i> Report</button>
                </div>
              </div>

              <div class="premium-card p-7 md:p-9">
                <div class="flex justify-between items-center mb-6"><h2 class="font-headline text-xl font-bold">Reviews & Ratings</h2><div class="flex items-center gap-2"><span class="text-2xl font-extrabold text-slate-900">${avgRating.toFixed(1)}</span><div class="flex text-amber-500 text-lg">${"★".repeat(Math.floor(avgRating))}${avgRating % 1 >= 0.5 ? "½" : ""}</div><span class="text-xs text-slate-400">(${reviewsList.length})</span></div></div>
                <div id="reviewsContainer" class="space-y-5">${reviewsHtml}</div>
                ${getStoredUser() ? `<button id="writeReviewBtn" class="mt-7 w-full border-2 border-slate-100 hover:border-slate-900 text-slate-700 hover:text-slate-900 py-3.5 rounded-2xl font-bold text-sm transition-all">✍️ Write a Review</button>` : `<p class="mt-7 text-center text-sm text-slate-500"><a href="login.html" class="text-slate-900 font-bold underline">Sign in</a> to write a review.</p>`}
              </div>
            </div>

            <div class="lg:col-span-1">
              <div class="premium-card p-7 md:p-8 sticky top-28 space-y-5">
                <h3 class="font-headline text-xl font-bold text-slate-900">Make a Move</h3>
                <button id="actionBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-4 rounded-2xl font-bold text-sm transition-all shadow-sm flex items-center justify-center gap-2 hover:shadow-md"><i data-lucide="${isRent ? "key" : "credit-card"}"></i> ${isRent ? "Rent This Property" : "Buy This Property"}</button>
                <button id="scheduleTourBtn" class="w-full bg-white border-2 border-slate-100 hover:border-slate-900 text-slate-700 hover:text-slate-900 py-4 rounded-2xl font-bold text-sm transition-all flex items-center justify-center gap-2"><i data-lucide="calendar"></i> Schedule a Tour</button>
                <div class="pt-5 border-t border-slate-50 space-y-3"><p class="text-xs text-slate-400 text-center flex items-center justify-center gap-1"><i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Secure transaction via Paystack</p><p class="text-xs text-slate-400 text-center">100% buyer protection included</p></div>
              </div>
            </div>
          </div>`;

          propertyContent.innerHTML = html;
          propertyContent.classList.remove("hidden");
          loadingState.classList.add("hidden");
          lucide.createIcons();

          document.querySelectorAll(".gallery-thumb").forEach((thumb) => {
            thumb.addEventListener("click", () => {
              const mainImg = document.getElementById("mainImage");
              if (mainImg) {
                mainImg.src = thumb.dataset.img;
                document
                  .querySelectorAll(".gallery-thumb")
                  .forEach((t) => t.classList.remove("active"));
                thumb.classList.add("active");
              }
            });
          });

          const reportModal = document.getElementById("reportModal");
          const reportForm = document.getElementById("reportForm");
          document
            .getElementById("reportSellerBtn")
            ?.addEventListener("click", () =>
              reportModal.classList.remove("hidden"),
            );
          document
            .getElementById("closeReportModal")
            ?.addEventListener("click", () =>
              reportModal.classList.add("hidden"),
            );
          reportModal?.addEventListener("click", (e) => {
            if (e.target === reportModal) reportModal.classList.add("hidden");
          });
          reportForm?.addEventListener("submit", async (e) => {
            e.preventDefault();
            const reason = document.getElementById("reportReason").value;
            const message = document
              .getElementById("reportMessage")
              .value.trim();
            try {
              loadingOverlay.classList.remove("hidden");
              await reportSeller(
                seller._id,
                reason + (message ? ` - ${message}` : ""),
              );
              showToast("Report submitted successfully.", "success");
              reportModal.classList.add("hidden");
              reportForm.reset();
            } catch (err) {
              showToast(err.message || "Failed to submit report.", "error");
            } finally {
              loadingOverlay.classList.add("hidden");
            }
          });

          const paymentModal = document.getElementById("paymentModal");
          const paymentEmail = document.getElementById("paymentEmail");
          const confirmPaymentBtn =
            document.getElementById("confirmPaymentBtn");
          document
            .getElementById("actionBtn")
            ?.addEventListener("click", () => {
              if (!getStoredToken()) {
                showToast("Please log in to continue.", "error");
                setTimeout(() => {
                  window.location.href = `login.html?redirect=property-details.html?id=${propertyId}`;
                }, 1500);
                return;
              }
              document.getElementById("paymentActionText").textContent = isRent
                ? "rent"
                : "buy";
              document.getElementById("paymentAmount").textContent =
                formatNaira(house.price);
              paymentEmail.value = getStoredUser()?.email || "";
              paymentModal.classList.remove("hidden");
            });
          document
            .getElementById("closePaymentModal")
            ?.addEventListener("click", () =>
              paymentModal.classList.add("hidden"),
            );
          document
            .getElementById("cancelPaymentBtn")
            ?.addEventListener("click", () =>
              paymentModal.classList.add("hidden"),
            );
          paymentModal?.addEventListener("click", (e) => {
            if (e.target === paymentModal) paymentModal.classList.add("hidden");
          });
          confirmPaymentBtn?.addEventListener("click", async () => {
            const email = paymentEmail.value.trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
              showToast("Please enter a valid email.", "error");
              return;
            }
            confirmPaymentBtn.disabled = true;
            document.getElementById("payButtonText").textContent =
              "Processing...";
            document
              .getElementById("payButtonSpinner")
              .classList.remove("hidden");
            try {
              const initResponse = await apiRequest(
                "/houses/initiate-payment",
                {
                  method: "POST",
                  body: JSON.stringify({
                    houseId: house._id,
                    amount: Number(house.price),
                    email,
                    listingType: house.listingType,
                  }),
                },
              );
              if (initResponse?.authorization_url) {
                showToast("Redirecting to Paystack...", "info", 2000);
                setTimeout(() => {
                  window.location.href = initResponse.authorization_url;
                }, 1000);
              } else if (initResponse?.data?.authorization_url) {
                showToast("Redirecting...", "info", 2000);
                setTimeout(() => {
                  window.location.href = initResponse.data.authorization_url;
                }, 1000);
              } else throw new Error("Payment gateway unavailable.");
            } catch (err) {
              showToast(err.message || "Payment failed.", "error");
            } finally {
              confirmPaymentBtn.disabled = false;
              document.getElementById("payButtonText").textContent = "Pay Now";
              document
                .getElementById("payButtonSpinner")
                .classList.add("hidden");
            }
          });

          document
            .getElementById("scheduleTourBtn")
            ?.addEventListener("click", () => {
              if (!getStoredToken()) {
                showToast("Please log in to schedule a tour.", "error");
                setTimeout(() => {
                  window.location.href = `login.html?redirect=property-details.html?id=${propertyId}`;
                }, 1500);
                return;
              }
              showToast(
                "Tour request sent! The seller will contact you within 24 hours.",
                "info",
                5000,
              );
            });
          document
            .getElementById("contactSellerBtn")
            ?.addEventListener("click", () => {
              const contactInfo = [];
              if (seller.email) contactInfo.push(`Email: ${seller.email}`);
              if (seller.phone) contactInfo.push(`Phone: ${seller.phone}`);
              showToast(
                contactInfo.length
                  ? `Contact Information\n${contactInfo.join(" · ")}`
                  : "Contact info not available.",
                "info",
                6000,
              );
            });

          const reviewModal = document.getElementById("reviewModal");
          const reviewForm = document.getElementById("reviewForm");
          document
            .getElementById("writeReviewBtn")
            ?.addEventListener("click", () => {
              document.getElementById("reviewRating").value = "0";
              document.querySelectorAll(".star-btn").forEach((b) => {
                b.classList.remove("text-amber-500");
                b.classList.add("text-slate-300");
              });
              document.getElementById("reviewComment").value = "";
              document.getElementById("charCount").textContent = "0";
              reviewModal.classList.remove("hidden");
            });
          document
            .getElementById("closeReviewModal")
            ?.addEventListener("click", () =>
              reviewModal.classList.add("hidden"),
            );
          reviewModal?.addEventListener("click", (e) => {
            if (e.target === reviewModal) reviewModal.classList.add("hidden");
          });
          document
            .getElementById("starRating")
            ?.addEventListener("click", (e) => {
              if (e.target.classList.contains("star-btn")) {
                const val = parseInt(e.target.dataset.value);
                document.getElementById("reviewRating").value = val;
                document.querySelectorAll(".star-btn").forEach((btn, idx) => {
                  if (idx < val) {
                    btn.classList.add("text-amber-500");
                    btn.classList.remove("text-slate-300");
                  } else {
                    btn.classList.remove("text-amber-500");
                    btn.classList.add("text-slate-300");
                  }
                });
              }
            });
          document
            .getElementById("reviewComment")
            ?.addEventListener("input", () => {
              document.getElementById("charCount").textContent =
                document.getElementById("reviewComment").value.length;
            });
          reviewForm?.addEventListener("submit", async (e) => {
            e.preventDefault();
            const rating = parseInt(
              document.getElementById("reviewRating").value,
            );
            const comment = document
              .getElementById("reviewComment")
              .value.trim();
            if (!rating || rating < 1 || rating > 5) {
              showToast("Please select a rating.", "error");
              return;
            }
            if (!comment) {
              showToast("Please write a review.", "error");
              return;
            }
            try {
              loadingOverlay.classList.remove("hidden");
              await addSellerReview(seller._id, rating, comment, false);
              showToast("Review published!", "success");
              reviewModal.classList.add("hidden");
              setTimeout(() => location.reload(), 1500);
            } catch (err) {
              showToast(err.message || "Failed to submit review.", "error");
            } finally {
              loadingOverlay.classList.add("hidden");
            }
          });
        } catch (err) {
          errorState.innerHTML = `<div class="flex flex-col items-center gap-3"><i data-lucide="alert-circle" class="w-8 h-8 text-red-500"></i><p class="font-bold text-sm">${err.message || "Failed to load property details."}</p><button onclick="location.reload()" class="text-sm text-red-600 underline font-bold">Try again</button></div>`;
          errorState.classList.remove("hidden");
          loadingState.classList.add("hidden");
          lucide.createIcons();
        }
      }

      function initUserHeader() {
        const user = getStoredUser();
        const nameSpan = document.getElementById("userNameDisplay");
        const avatarInitials = document.getElementById("avatarInitials");
        const avatarImage = document.getElementById("avatarImage");
        if (user?.name) {
          nameSpan.textContent = user.name;
          const initials = user.name
            .split(" ")
            .map((n) => n[0])
            .join("")
            .toUpperCase()
            .substring(0, 2);
          if (user.profile && user.profile.trim() !== "") {
            avatarImage.src = user.profile;
            avatarImage.classList.remove("hidden");
            avatarInitials.classList.add("hidden");
          } else {
            avatarInitials.textContent = initials || "U";
            avatarInitials.classList.remove("hidden");
            avatarImage.classList.add("hidden");
          }
        } else {
          nameSpan.textContent = "Guest";
          avatarInitials.textContent = "G";
          avatarInitials.classList.remove("hidden");
          avatarImage.classList.add("hidden");
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          document.querySelectorAll(".fixed.z-\\[999\\]").forEach((m) => {
            if (!m.classList.contains("hidden")) m.classList.add("hidden");
          });
        }
      });
      initUserHeader();
      renderProperty();
    </script>
  </body>
</html>
