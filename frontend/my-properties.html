<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>My Property Activity | Rezident Homes</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "surface-container-low": "#f3f3f6",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
      }

      .lucide {
        width: 1.2rem;
        height: 1.2rem;
        stroke-width: 1.8;
      }

      .property-card {
        border-radius: 1rem;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: 1px solid rgba(0, 28, 74, 0.06);
      }

      .property-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 40px -12px rgba(0, 28, 74, 0.18);
        border-color: rgba(197, 170, 35, 0.2);
      }

      .property-card .line-clamp-1 {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        line-clamp: 1;
        -webkit-line-clamp: 1;
      }

      .loading-spinner {
        border: 3px solid rgba(0, 28, 74, 0.1);
        border-radius: 50%;
        border-top: 3px solid #001c4a;
        width: 40px;
        height: 40px;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body class="bg-surface text-on-surface font-body antialiased">
    <header
      class="sticky top-0 w-full z-50 bg-white/90 backdrop-blur-xl shadow-sm border-b border-outline/10"
    >
      <div class="max-w-7xl mx-auto px-5 md:px-8">
        <div class="flex items-center justify-between h-16 lg:h-20">
          <a href="home.html">
            <img
              src="images/logo.png"
              alt="Rezident Homes Logo"
              class="h-9 lg:h-11 w-auto object-contain"
            />
          </a>

          <div class="flex items-center gap-3">
            <span
              id="userNameDisplay"
              class="hidden md:inline-block text-sm font-bold text-primary"
            >
              Loading...
            </span>

            <a
              href="profile.html"
              id="userInitials"
              class="w-10 h-10 lg:w-11 lg:h-11 rounded-full bg-primary text-white flex items-center justify-center font-bold shadow-sm"
              aria-label="Profile"
            >
              U
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <!-- Hero Section -->
        <section
          class="bg-primary rounded-3xl p-6 md:p-8 text-white relative overflow-hidden mb-8"
        >
          <div class="absolute inset-0 opacity-15">
            <img
              src="images/hero.avif"
              class="w-full h-full object-cover"
              alt=""
            />
          </div>

          <div
            class="relative z-10 flex flex-col md:flex-row md:items-end md:justify-between gap-6"
          >
            <div>
              <span
                class="inline-flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full text-xs font-bold mb-4"
              >
                <i data-lucide="home" class="w-4 h-4 text-tertiary-fixed"></i>
                Property Activity
              </span>

              <h1 class="font-headline text-3xl md:text-4xl font-extrabold">
                My Houses
              </h1>

              <p class="text-white/75 text-sm mt-3 max-w-2xl">
                View houses you have rented or bought through Rezident Homes.
              </p>
            </div>

            <div class="grid grid-cols-2 gap-3 text-center">
              <div class="bg-white/10 rounded-2xl px-5 py-4">
                <p
                  id="boughtCount"
                  class="text-2xl font-extrabold text-tertiary-fixed"
                >
                  0
                </p>
                <p class="text-xs text-white/75 mt-1">Bought</p>
              </div>

              <div class="bg-white/10 rounded-2xl px-5 py-4">
                <p
                  id="rentedCount"
                  class="text-2xl font-extrabold text-tertiary-fixed"
                >
                  0
                </p>
                <p class="text-xs text-white/75 mt-1">Rented</p>
              </div>
            </div>
          </div>
        </section>

        <!-- Filters -->
        <section
          class="bg-white rounded-2xl shadow-sm border border-outline/10 p-4 md:p-5 mb-8"
        >
          <div
            class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"
          >
            <div class="flex flex-wrap gap-2">
              <button
                class="filter-btn bg-primary text-white px-4 py-2 rounded-full text-sm font-bold"
                data-filter="all"
              >
                All
              </button>
              <button
                class="filter-btn bg-surface-container-low text-primary px-4 py-2 rounded-full text-sm font-bold"
                data-filter="purchase"
              >
                Bought
              </button>
              <button
                class="filter-btn bg-surface-container-low text-primary px-4 py-2 rounded-full text-sm font-bold"
                data-filter="rental"
              >
                Rented
              </button>
            </div>

            <div class="relative w-full md:w-72">
              <i
                data-lucide="search"
                class="absolute left-4 top-1/2 -translate-y-1/2 text-outline w-4 h-4"
              ></i>
              <input
                id="searchInput"
                type="text"
                placeholder="Search property"
                class="w-full pl-11 pr-4 py-2.5 rounded-xl bg-surface-container-low border border-outline/10 text-sm focus:outline-none focus:ring-2 focus:ring-primary/15 focus:border-primary"
              />
            </div>
          </div>
        </section>

        <!-- Loading State -->
        <div id="loadingState" class="flex justify-center items-center py-20">
          <div class="text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-sm text-on-surface-variant">
              Loading your properties...
            </p>
          </div>
        </div>

        <!-- Property Grid -->
        <section
          class="grid md:grid-cols-2 lg:grid-cols-3 gap-7 lg:gap-8 hidden"
          id="propertyGrid"
        >
          <!-- Properties will be dynamically inserted here -->
        </section>

        <!-- Empty State -->
        <section
          id="emptyState"
          class="hidden bg-white rounded-2xl shadow-sm border border-outline/10 p-10 text-center mt-8"
        >
          <div
            class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mx-auto mb-4"
          >
            <i data-lucide="search-x" class="w-7 h-7"></i>
          </div>

          <h2 class="font-headline text-2xl font-extrabold text-primary">
            No property found
          </h2>

          <p class="text-sm text-on-surface-variant mt-2">
            Try another search or change the selected filter.
          </p>
        </section>

        <!-- Error State -->
        <section
          id="errorState"
          class="hidden bg-red-50 rounded-2xl shadow-sm border border-red-200 p-10 text-center mt-8"
        >
          <div
            class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"
          >
            <i data-lucide="alert-circle" class="w-7 h-7"></i>
          </div>

          <h2 class="font-headline text-2xl font-extrabold text-red-700">
            Something went wrong
          </h2>

          <p id="errorMessage" class="text-sm text-red-600 mt-2">
            Failed to load your properties. Please try again.
          </p>

          <button
            onclick="fetchUserHouses()"
            class="mt-4 bg-red-600 text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-red-700 transition"
          >
            Try Again
          </button>
        </section>
      </div>
    </main>

    <script type="module">
      import { getStoredUser, getStoredToken } from "./js/tokenStorage.js";
      import { getBaseURL } from "./js/apiConfig.js";

      let allTransactions = [];
      let currentFilter = "all";

      // Format price
      function formatPrice(price) {
        return new Intl.NumberFormat("en-NG", {
          style: "currency",
          currency: "NGN",
          minimumFractionDigits: 0,
          maximumFractionDigits: 0,
        }).format(price);
      }

      // Format date
      function formatDate(dateString) {
        const options = { year: "numeric", month: "short", day: "numeric" };
        return new Date(dateString).toLocaleDateString("en-US", options);
      }

      // Escape HTML
      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Fetch user's houses
      async function fetchUserHouses() {
        const token = getStoredToken();

        if (!token) {
          window.location.href = "login.html";
          return;
        }

        document.getElementById("loadingState").classList.remove("hidden");
        document.getElementById("propertyGrid").classList.add("hidden");
        document.getElementById("emptyState").classList.add("hidden");
        document.getElementById("errorState").classList.add("hidden");

        try {
          const response = await fetch(`${getBaseURL()}/houses/my-houses`, {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          if (!response.ok) {
            if (response.status === 401) {
              localStorage.removeItem("auth_token");
              localStorage.removeItem("user");
              window.location.href = "login.html";
              return;
            }
            throw new Error("Failed to fetch houses");
          }

          const data = await response.json();

          if (data.success) {
            allTransactions = data.transactions || [];

            document.getElementById("boughtCount").textContent =
              data.summary.bought || 0;
            document.getElementById("rentedCount").textContent =
              data.summary.rented || 0;

            renderProperties();
          }
        } catch (error) {
          console.error("Error fetching houses:", error);
          document.getElementById("errorMessage").textContent = error.message;
          document.getElementById("errorState").classList.remove("hidden");
        } finally {
          document.getElementById("loadingState").classList.add("hidden");
        }
      }

      // Update user display
      function updateUserDisplay() {
        const user = getStoredUser();
        if (user && user.name) {
          document.getElementById("userNameDisplay").textContent = user.name;
          const initials = user.name
            .split(" ")
            .map((n) => n[0])
            .join("")
            .toUpperCase()
            .substring(0, 2);
          document.getElementById("userInitials").textContent = initials;
        } else {
          document.getElementById("userNameDisplay").textContent = "Guest";
          document.getElementById("userInitials").textContent = "U";
        }
      }

      // Create property card HTML - Updated to match home page style
      function createPropertyCard(transaction) {
        const house = transaction.house;
        if (!house) return "";

        const isPurchase = transaction.type === "purchase";
        const imageUrl =
          house.images && house.images.length > 0
            ? house.images[0].url
            : "images/hero.avif";

        const listingLabel = isPurchase ? "BOUGHT" : "RENTED";
        const priceLabel = isPurchase ? "" : "/yr";
        const detailLink = isPurchase
          ? "propertydetailsforsale.html"
          : "propertydetailsforrent.html";
        const dateLabel = isPurchase ? "Bought" : "Rented";
        const transactionDate = formatDate(
          transaction.paymentDate || transaction.createdAt,
        );

        return `
          <div class="property-card relative rounded-2xl overflow-hidden shadow-lg group bg-white">
            <div class="relative h-[260px] md:h-[300px] overflow-hidden">
              <img 
                class="w-full h-full object-cover group-hover:scale-105 transition duration-700" 
                src="${imageUrl}" 
                alt="${escapeHtml(house.title || "Property")}"
                loading="lazy"
                onerror="this.src='images/hero.avif'"
              />
              <div class="absolute top-0 left-0 right-0 p-4 flex justify-between items-start">
                <span class="bg-primary/90 backdrop-blur-sm text-white text-[10px] tracking-wider px-3 py-1 rounded-md font-semibold uppercase">
                  ${listingLabel}
                </span>
                <span class="bg-white/95 backdrop-blur-sm text-primary font-bold text-sm px-3 py-1 rounded-md shadow-md">
                  ${formatPrice(house.price || 0)}${priceLabel}
                </span>
              </div>
            </div>
            <div class="p-4 md:p-5">
              <h3 class="font-headline font-bold text-primary text-sm md:text-base mb-1 line-clamp-1">${escapeHtml(house.title || "Property")}</h3>
              <p class="text-xs text-on-surface-variant/70 mb-3 flex items-center gap-1">
                <i data-lucide="map-pin" class="w-3 h-3 text-tertiary"></i>
                ${escapeHtml(house.lga || "")}, ${escapeHtml(house.state || "")}
              </p>
              
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 text-xs">
                  <span class="flex items-center gap-1 text-on-surface-variant">
                    <i data-lucide="bed-single" class="w-3.5 h-3.5 text-tertiary"></i>
                    <span class="font-semibold text-primary">${house.bedrooms || 0}</span> bed
                  </span>
                  <span class="flex items-center gap-1 text-on-surface-variant">
                    <i data-lucide="bath" class="w-3.5 h-3.5 text-tertiary"></i>
                    <span class="font-semibold text-primary">${house.bathrooms || 0}</span> bath
                  </span>
                </div>
                <a href="${detailLink}?id=${house._id}" 
                   class="text-xs font-bold text-tertiary hover:text-primary transition-colors flex items-center gap-1">
                  View <i data-lucide="arrow-up-right" class="w-3 h-3"></i>
                </a>
              </div>
              
              <div class="mt-3 pt-3 border-t border-outline/10">
                <p class="text-[11px] text-on-surface-variant/60">
                  ${dateLabel} ${transactionDate}
                </p>
              </div>
            </div>
          </div>
        `;
      }

      // Render properties with filters
      function renderProperties() {
        const grid = document.getElementById("propertyGrid");
        const emptyState = document.getElementById("emptyState");
        const searchValue = document
          .getElementById("searchInput")
          .value.trim()
          .toLowerCase();

        let filteredTransactions = allTransactions;

        if (currentFilter !== "all") {
          filteredTransactions = filteredTransactions.filter(
            (t) => t.type === currentFilter,
          );
        }

        if (searchValue) {
          filteredTransactions = filteredTransactions.filter(
            (t) => t.house && t.house.title.toLowerCase().includes(searchValue),
          );
        }

        if (filteredTransactions.length === 0) {
          grid.classList.add("hidden");
          emptyState.classList.remove("hidden");
        } else {
          emptyState.classList.add("hidden");
          grid.classList.remove("hidden");
          grid.innerHTML = filteredTransactions
            .map((t) => createPropertyCard(t))
            .join("");
          lucide.createIcons();
        }
      }

      // Filter button handlers
      document.querySelectorAll(".filter-btn").forEach((button) => {
        button.addEventListener("click", () => {
          currentFilter = button.dataset.filter;

          document.querySelectorAll(".filter-btn").forEach((btn) => {
            btn.classList.remove("bg-primary", "text-white");
            btn.classList.add("bg-surface-container-low", "text-primary");
          });

          button.classList.add("bg-primary", "text-white");
          button.classList.remove("bg-surface-container-low", "text-primary");

          renderProperties();
        });
      });

      // Search handler
      document
        .getElementById("searchInput")
        .addEventListener("input", renderProperties);

      // Initialize
      document.addEventListener("DOMContentLoaded", () => {
        lucide.createIcons();
        updateUserDisplay();
        fetchUserHouses();
      });
    </script>
  </body>
</html>
