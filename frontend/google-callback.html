<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signing in with Google...</title>
  <style>
    body { font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f9f9fc; }
    .loader { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #001c4a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .container { text-align: center; background: white; padding: 2rem; border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
<div class="container">
  <div class="loader"></div>
  <h2 style="color:#001c4a;">Signing you in with Google...</h2>
  <p style="color:#444650;">One moment please</p>
</div>
<script type="module">
  import { authService } from './js/authService.js';

  // Extract token from URL fragment (e.g., #access_token=xyz&...)
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  let token = params.get('access_token') || params.get('id_token');

  if (!token && window.location.search) {
    // fallback: check query string (rare)
    const urlParams = new URLSearchParams(window.location.search);
    token = urlParams.get('access_token') || urlParams.get('code');
  }

  if (!token) {
    document.body.innerHTML = '<div class="container"><h2 style="color:#b91c1c;">Authentication failed</h2><p>No token received from Google. <a href="register.html">Go back</a></p></div>';
    throw new Error('No Google token found');
  }

  try {
    await authService.googleAuth(token);
    window.location.href = 'home.html';
  } catch (error) {
    console.error('Google auth error:', error);
    document.body.innerHTML = `<div class="container"><h2 style="color:#b91c1c;">Sign in failed</h2><p>${error.message}</p><a href="register.html">Try again</a></div>`;
  }
</script>
</body>
</html>
