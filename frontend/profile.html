    />

    <link

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "surface-container-low": "#f3f3f6",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
          },

      };

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      .lucide {
        width: 1.2rem;
        height: 1.2rem;
        stroke-width: 1.8;
      }

      /* Wireframe skeleton animation */
      @keyframes shimmer {
        0% {
          background-position: -400px 0;
        }
        100% {
          background-position: 400px 0;
        }
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          #e0e0e0 25%,
          #f0f0f0 50%,
          #e0e0e0 75%
        );
        background-size: 800px 100%;
        animation: shimmer 1.5s infinite linear;
        border-radius: 8px;
      }

      .skeleton-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(
          90deg,
          #e0e0e0 25%,
          #f0f0f0 50%,
          #e0e0e0 75%
        );
        background-size: 800px 100%;
        animation: shimmer 1.5s infinite linear;
        flex-shrink: 0;
      }

      .skeleton-name {
        height: 36px;
        width: 200px;
        margin-bottom: 8px;
      }

      .skeleton-subtitle {
        height: 16px;
        width: 150px;
      }

      .skeleton-button {
        height: 48px;
        width: 200px;
        border-radius: 12px;
      }

      .skeleton-detail-label {
        height: 12px;
        width: 80px;
        margin-bottom: 8px;
      }

      .skeleton-detail-value {
        height: 18px;
        width: 140px;
      }

      @media (min-width: 768px) {
        .skeleton-avatar {
          width: 96px;
          height: 96px;
        }
        .skeleton-name {
          height: 40px;
          width: 250px;
        }
      }

      /* Toast notification styles */
      .toast-container {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
      }

      .toast {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        color: #ffffff;
        font-family: "Inter", system-ui, sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        pointer-events: auto;
        transform: translateY(100px);
        opacity: 0;
        transition:
          transform 0.35s cubic-bezier(0.21, 1.02, 0.73, 1),
          opacity 0.3s ease-out;
        max-width: 420px;
        word-break: break-word;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      .toast.hide {
        transform: translateY(20px);
        opacity: 0;
        transition:
          transform 0.25s ease-in,
          opacity 0.25s ease-in;
      }

      .toast--success {
        background: #065f46;
      }

      .toast--error {
        background: #991b1b;
      }

      .toast--info {
        background: #001c4a;
      }

      .toast-icon {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toast-icon svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2;
      }

      .toast-message {
        flex: 1;
      }

      .toast-close {
        flex-shrink: 0;
        width: 20px;
        height: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.7;
        transition: opacity 0.2s;
        background: none;
        border: none;
        padding: 0;
        color: inherit;
      }

      .toast-close:hover {
        opacity: 1;
      }

      .toast-close svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 2;
      }
    </style>
  </head>

    <script type="module">
      import { getUserProfile } from "./slices/userService.js";

        clearAuthData,
        storeUser,
      } from "./js/tokenStorage.js";
      import { authService } from "./js/authService.js";

      // ========== Toast notification function ==========
      function showToast(message, type = "info", duration = 4000) {
        const container = document.getElementById("toastContainer");

        const iconPaths = {
          success:
            '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',
          error:
            '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',
          info: '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line>',
        };

        const toast = document.createElement("div");
        toast.className = `toast toast--${type}`;
        toast.innerHTML = `
          <span class="toast-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              ${iconPaths[type]}
            </svg>
          </span>
          <span class="toast-message">${message}</span>
          <button class="toast-close" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        `;
        container.appendChild(toast);

        requestAnimationFrame(() => {
          toast.classList.add("show");
        });

        const closeBtn = toast.querySelector(".toast-close");
        closeBtn.addEventListener("click", () => removeToast(toast));

        const timer = setTimeout(() => removeToast(toast), duration);

        function removeToast(toastEl) {
          clearTimeout(timer);
          toastEl.classList.add("hide");
          toastEl.addEventListener("transitionend", () => {
            if (toastEl.parentNode) {
              toastEl.parentNode.removeChild(toastEl);
            }
          });
        }
      }

      function hideSkeletons() {
        document.getElementById("heroAvatarSkeleton").classList.add("hidden");
        document.getElementById("heroNameSkeleton").classList.add("hidden");
        document
          .getElementById("actionButtonsSkeleton")
          .classList.add("hidden");

        document
          .getElementById("profileImageContainer")
          .classList.remove("hidden");
        document.getElementById("profileName").classList.remove("hidden");
        document.getElementById("actionButtons").classList.remove("hidden");
        document.getElementById("actionButtons").classList.add("flex");

        document
          .getElementById("detailsHeaderSkeleton")
          .classList.add("hidden");
        document.getElementById("detailsSkeleton").classList.add("hidden");
        document.getElementById("detailsHeader").classList.remove("hidden");
        document.getElementById("detailsHeader").classList.add("flex");
        document.getElementById("detailsContent").classList.remove("hidden");
        document.getElementById("detailsContent").classList.add("grid");

        document.getElementById("activityCardSkeleton").classList.add("hidden");
        document.getElementById("activityCard").classList.remove("hidden");
        document.getElementById("activityCard").classList.add("flex");

        document.getElementById("myListingsSkeleton").classList.add("hidden");
        document.getElementById("myListingsCard").classList.remove("hidden");
        document.getElementById("myListingsCard").classList.add("flex");

        lucide.createIcons();
      }

      function renderActionButtons(user, sellerApplication) {
        const container = document.getElementById("actionButtons");
        if (!container) return;

        if (user.role === "admin") {
          container.innerHTML = `
            <a href="admin.html" class="bg-tertiary-container text-primary px-5 py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition flex items-center justify-center gap-2">
              <i data-lucide="layout-dashboard" class="w-4 h-4"></i> View Admin Dashboard
            </a>
          `;
          lucide.createIcons();
          return;
        }

        const isApprovedSeller =
          user.role === "seller" && user.sellerVerified === true;
        if (isApprovedSeller) {
          container.innerHTML = `
            <a href="upload-sale.html" class="bg-tertiary-container text-primary px-5 py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition flex items-center justify-center gap-2">
              <i data-lucide="upload-cloud" class="w-4 h-4"></i> Upload House for Sale
            </a>
            <a href="upload-rent.html" class="bg-white/10 border border-white/30 text-white px-5 py-3 rounded-xl font-extrabold text-sm hover:bg-white hover:text-primary transition flex items-center justify-center gap-2">
              <i data-lucide="home" class="w-4 h-4"></i> Upload House for Rent
            </a>
          `;
          lucide.createIcons();
          return;
        }

        if (sellerApplication && sellerApplication.status === "pending") {
          container.innerHTML = `
            <div class="bg-yellow-100 text-yellow-800 px-5 py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 border border-yellow-300">
              <i data-lucide="clock" class="w-4 h-4"></i> Pending Application – Awaiting Admin Review
            </div>
          `;
          lucide.createIcons();
          return;
        }

        container.innerHTML = `
          <a href="seller-register.html" class="bg-tertiary-container text-primary px-5 py-3 rounded-xl font-extrabold text-sm hover:bg-tertiary-fixed transition flex items-center justify-center gap-2">
            <i data-lucide="briefcase" class="w-4 h-4"></i> Apply as Seller/Landlord
          </a>
        `;
        lucide.createIcons();
      }

      function updateProfileUI(user, sellerApplication) {
        if (!user) return;

        document.getElementById("profileName").textContent =
          user.name || "User";

        const initialsSpan = document.getElementById("profileInitials");
        const profileImg = document.getElementById("profileImage");
        const container = document.getElementById("profileImageContainer");

        if (user.profile && user.profile.trim() !== "") {
          profileImg.src = user.profile;
          profileImg.classList.remove("hidden");
          initialsSpan.classList.add("hidden");
          profileImg.onerror = () => {
            profileImg.classList.add("hidden");
            initialsSpan.classList.remove("hidden");
            const initials = (user.name || "User")
              .split(" ")
              .map((n) => n[0])
              .join("")
              .toUpperCase()
              .substring(0, 2);
            initialsSpan.textContent = initials || "--";
          };
        } else {
          profileImg.classList.add("hidden");
          initialsSpan.classList.remove("hidden");
          const initials = (user.name || "User")
            .split(" ")
            .map((n) => n[0])
            .join("")
            .toUpperCase()
            .substring(0, 2);
          initialsSpan.textContent = initials || "--";
        }

        document.getElementById("detailName").textContent =
          user.name || "Not set";
        document.getElementById("detailEmail").textContent =
          user.email || "Not set";
        document.getElementById("detailPhone").textContent =
          user.phone || "Not set";
        document.getElementById("detailAltPhone").textContent =
          user.alternatePhone || "Not set";
        document.getElementById("detailUsername").textContent = user.username
          ? `@${user.username}`
          : "Not set";
        let roleText = "User";
        if (user.role === "admin") roleText = "Admin";
        else if (user.role === "seller") roleText = "Seller";
        document.getElementById("detailRole").textContent = roleText;

        storeUser({
          _id: user._id,
          name: user.name,
          email: user.email,
          username: user.username,
          phone: user.phone,
          alternatePhone: user.alternatePhone,
          role: user.role,
          profile: user.profile,
          authMethod: user.authMethod,
          isVerified: user.isVerified,
          sellerType: user.sellerType,
          sellerVerified: user.sellerVerified,
        });

        renderActionButtons(user, sellerApplication);

        hideSkeletons();
      }

      async function handleLogout() {
        try {
          await authService.logout();
        } catch (err) {
          console.warn("Logout API call failed, clearing local data anyway.");
        } finally {
          clearAuthData();
          window.location.href = "login.html";
        }
      }

      (async function init() {
        const token = getStoredToken();
        if (!token) {
          window.location.href = "login.html";
          return;
        }
        try {
          const user = await getUserProfile();
          if (!user) throw new Error("No user data");

          let sellerApplication = null;
          if (user.role !== "admin") {
            try {
              const result = await getMyApplication();
              if (result && result.application) {
                sellerApplication = result.application;
              } else if (result && result.status) {
                sellerApplication = result;
              }
            } catch (err) {
              console.warn("Could not fetch seller application:", err.message);
            }
          }

          updateProfileUI(user, sellerApplication);
        } catch (err) {
          console.error(err);
          showToast(
            "Session expired or failed to load profile. Please login again.",
            "error",
          );
          setTimeout(() => {
            clearAuthData();
            window.location.href = "login.html";
          }, 2000);
        }
        document
          .getElementById("logoutBtn")
          .addEventListener("click", handleLogout);
      })();
    </script>
  </body>
</html>
