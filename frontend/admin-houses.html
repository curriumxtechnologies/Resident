<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Manage Houses | Admin | Rezident Homes</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
            animation: {
              float: "float 3s ease-in-out infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "scale(1)", opacity: "0.8" },
                "50%": { transform: "scale(1.1)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      .lucide {
        width: 1.2rem;
        height: 1.2rem;
        stroke-width: 1.8;
      }

      /* Loading overlay styles */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(249, 249, 252, 0.95);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition:
          opacity 0.5s ease-out,
          visibility 0.5s ease-out;
      }

      .loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loading-content {
        text-align: center;
      }

      .loading-logo {
        width: 120px;
        height: auto; /* Changed from 120px to auto */
        animation: float 3s ease-in-out infinite;
      }

      .loading-text {
        margin-top: 1.5rem;
        color: #001c4a;
        font-family: "Manrope", system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.875rem;
        letter-spacing: 0.05em;
        animation: pulse-text 1.5s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) scale(1);
          opacity: 0.8;
        }
        50% {
          transform: translateY(-15px) scale(1.05);
          opacity: 1;
        }
      }

      @keyframes pulse-text {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      .input-field {
        padding: 0.65rem 1rem;
        border-radius: 0.75rem;
        background: white;
        border: 1px solid rgba(116, 119, 129, 0.25);
        outline: none;
        font-size: 0.875rem;
      }
      .input-field:focus {
        border-color: #001c4a;
        box-shadow: 0 0 0 3px rgba(0, 28, 74, 0.14);
      }
      .search-icon-btn {
        display: none;
        padding: 0.65rem;
        border-radius: 0.75rem;
        background: white;
        border: 1px solid rgba(116, 119, 129, 0.25);
        cursor: pointer;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        width: 100%;
      }
      .search-icon-btn:hover {
        background: #f3f4f6;
      }
      .search-wrapper {
        position: relative;
      }
      .search-overlay {
        position: absolute;
        top: calc(100% + 0.5rem);
        left: 0;
        width: calc(100vw - 2.5rem);
        max-width: 400px;
        background: white;
        border-radius: 0.75rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(116, 119, 129, 0.2);
        padding: 0.75rem;
        z-index: 50;
        display: none;
      }
      .search-overlay.show {
        display: block;
      }
      .search-overlay-inner {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .search-overlay input {
        flex: 1;
        min-width: 0;
      }
      .search-overlay-close {
        padding: 0.5rem;
        border-radius: 0.75rem;
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #747781;
      }
      .search-overlay-close:hover {
        background: #f3f4f6;
        color: #1a1c1e;
      }
      @media (max-width: 767px) {
        .search-icon-btn {
          display: inline-flex;
        }
        .search-input-desktop {
          display: none;
        }
      }
      /* Detail panel styles */
      .slide-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: white;
        border-radius: 1.5rem 1.5rem 0 0;
        box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.15);
        z-index: 100;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        max-height: 85vh;
        overflow-y: auto;
        padding: 1.5rem;
        will-change: transform;
      }
      .slide-panel.open {
        transform: translateY(0);
      }
      .panel-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 99;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .panel-backdrop.show {
        opacity: 1;
        pointer-events: auto;
      }
      .table-row-clickable {
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .table-row-clickable:hover {
        background: rgba(0, 28, 74, 0.04);
      }
      /* Prevent horizontal scroll on table */
      .table-container {
        overflow-x: visible;
      }
      table {
        table-layout: fixed;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body antialiased">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-content">
        <img
          src="images/logo.png"
          alt="Rezident Homes Logo"
          class="loading-logo"
        />
      </div>
    </div>

    <div id="navbar-container"></div>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col gap-4 mb-8">
          <div>
            <h1 class="font-headline text-3xl font-extrabold text-primary">
              Manage House Listings
            </h1>
            <p class="text-on-surface-variant mt-1">
              Click any row to view details and manage listing.
            </p>
          </div>
          <div class="flex gap-2 items-center">
            <div class="search-wrapper flex-1 md:flex-initial">
              <button id="searchIconBtn" class="search-icon-btn" title="Search">
                <i data-lucide="search" class="lucide"></i>
              </button>
              <div id="searchOverlay" class="search-overlay">
                <div class="search-overlay-inner">
                  <i
                    data-lucide="search"
                    class="lucide text-on-surface-variant flex-shrink-0"
                  ></i>
                  <input
                    type="text"
                    id="searchInputMobile"
                    placeholder="Search..."
                    class="input-field"
                  />
                  <button id="searchCloseBtn" class="search-overlay-close">
                    <i data-lucide="x" class="lucide"></i>
                  </button>
                </div>
              </div>
            </div>
            <input
              type="text"
              id="searchInputDesktop"
              placeholder="Search by title, address..."
              class="input-field flex-1 md:flex-initial md:w-64 search-input-desktop"
            />
            <select
              id="statusFilter"
              class="input-field flex-1 md:flex-initial md:w-40 flex-shrink-0"
            >
              <option value="">All Status</option>
              <option value="published">Published</option>
              <option value="draft">Draft</option>
              <option value="inactive">Inactive</option>
              <option value="sold">Sold</option>
              <option value="rented">Rented</option>
            </select>
            <select
              id="typeFilter"
              class="input-field flex-1 md:flex-initial md:w-40 flex-shrink-0"
            >
              <option value="">All Types</option>
              <option value="rent">Rent</option>
              <option value="sale">Sale</option>
            </select>
          </div>
        </div>

        <div
          id="errorMsg"
          class="hidden bg-red-50 text-red-700 p-4 rounded-xl mb-6"
        ></div>

        <div
          class="bg-white rounded-2xl shadow-sm border border-outline/10 overflow-hidden"
        >
          <div class="table-container">
            <table class="w-full text-left">
              <thead
                class="bg-surface-container-low border-b border-outline/10"
              >
                <tr>
                  <th
                    class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider"
                    style="width: 60%"
                  >
                    Property
                  </th>
                  <th
                    class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider"
                    style="width: 40%"
                  >
                    Type / Price
                  </th>
                </tr>
              </thead>
              <tbody id="housesTableBody">
                <tr>
                  <td
                    colspan="2"
                    class="text-center py-8 text-on-surface-variant"
                  >
                    Loading houses...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div
            class="px-6 py-4 border-t border-outline/10 flex items-center justify-between flex-wrap gap-3"
          >
            <div class="text-sm text-on-surface-variant">
              Showing <span id="pageStart">0</span> -
              <span id="pageEnd">0</span> of <span id="totalCount">0</span>
            </div>
            <div class="flex gap-2">
              <button
                id="prevPage"
                class="px-4 py-2 border rounded-lg text-sm font-bold hover:bg-primary/5 disabled:opacity-50"
                disabled
              >
                Previous
              </button>
              <button
                id="nextPage"
                class="px-4 py-2 border rounded-lg text-sm font-bold hover:bg-primary/5 disabled:opacity-50"
                disabled
              >
                Next
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Detail Slide Panel & Backdrop -->
    <div id="panelBackdrop" class="panel-backdrop"></div>
    <div id="detailPanel" class="slide-panel">
      <div class="flex items-center justify-between mb-6">
        <h2
          id="panelTitle"
          class="font-headline text-xl font-bold text-primary truncate pr-4"
        >
          House Details
        </h2>
        <button
          id="closePanelBtn"
          class="p-2 rounded-full hover:bg-gray-100 transition"
        >
          <i data-lucide="x" class="lucide"></i>
        </button>
      </div>
      <div id="panelContent" class="space-y-5">
        <!-- dynamically filled -->
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>

    <script type="module">
      import { renderAdminNavbar } from "./js/adminNavbar.js";
      import { getStoredToken, getStoredUser } from "./js/tokenStorage.js";
      import {
        getHouses,
        toggleHouseStatus,
        deleteHouse,
      } from "./slices/houseService.js";

      const token = getStoredToken();
      const currentUser = getStoredUser();
      if (!token || !currentUser || currentUser.role !== "admin") {
        alert("Admin access required");
        window.location.href = "login.html";
      }

      document
        .getElementById("navbar-container")
        .appendChild(renderAdminNavbar("houses"));

      // Loading overlay
      const loadingOverlay = document.getElementById("loadingOverlay");

      let houses = [];
      let total = 0;
      let currentPage = 1;
      const limit = 10;
      let search = "";
      let statusFilter = "";
      let typeFilter = "";

      const tableBody = document.getElementById("housesTableBody");
      const errorMsgDiv = document.getElementById("errorMsg");
      const prevBtn = document.getElementById("prevPage");
      const nextBtn = document.getElementById("nextPage");
      const pageStartSpan = document.getElementById("pageStart");
      const pageEndSpan = document.getElementById("pageEnd");
      const totalCountSpan = document.getElementById("totalCount");
      const searchInputDesktop = document.getElementById("searchInputDesktop");
      const searchInputMobile = document.getElementById("searchInputMobile");
      const searchIconBtn = document.getElementById("searchIconBtn");
      const searchOverlay = document.getElementById("searchOverlay");
      const searchCloseBtn = document.getElementById("searchCloseBtn");
      const statusFilterSelect = document.getElementById("statusFilter");
      const typeFilterSelect = document.getElementById("typeFilter");

      // Panel elements
      const detailPanel = document.getElementById("detailPanel");
      const panelBackdrop = document.getElementById("panelBackdrop");
      const panelTitle = document.getElementById("panelTitle");
      const panelContent = document.getElementById("panelContent");
      const closePanelBtn = document.getElementById("closePanelBtn");

      function closePanel() {
        detailPanel.classList.remove("open");
        panelBackdrop.classList.remove("show");
      }

      closePanelBtn.addEventListener("click", closePanel);
      panelBackdrop.addEventListener("click", closePanel);

      // Search overlay
      searchIconBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        searchOverlay.classList.toggle("show");
        if (searchOverlay.classList.contains("show")) searchInputMobile.focus();
      });
      searchCloseBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        searchOverlay.classList.remove("show");
      });
      document.addEventListener("click", (e) => {
        if (
          !searchOverlay.contains(e.target) &&
          !searchIconBtn.contains(e.target)
        ) {
          searchOverlay.classList.remove("show");
        }
      });

      function showError(msg) {
        errorMsgDiv.textContent = msg;
        errorMsgDiv.classList.remove("hidden");
        setTimeout(() => errorMsgDiv.classList.add("hidden"), 5000);
      }

      async function fetchHouses() {
        try {
          const params = {
            page: currentPage,
            limit,
            search,
            status: statusFilter,
            listingType: typeFilter,
            sort: "-createdAt",
          };
          const data = await getHouses(params);
          houses = data.houses;
          total = data.total;
          renderTable();
          updatePagination();
        } catch (err) {
          console.error(err);
          showError("Failed to load houses: " + err.message);
          tableBody.innerHTML = `<tr><td colspan="2" class="text-center py-8 text-red-600">Error loading houses</td></tr>`;
        } finally {
          // Hide loading overlay with a slight delay for smooth transition
          setTimeout(() => {
            loadingOverlay.classList.add("hidden");
          }, 500);
        }
      }

      function openDetailPanel(house) {
        panelTitle.textContent = house.title || "House Details";
        const priceDisplay =
          house.listingType === "rent"
            ? `₦${Number(house.price).toLocaleString()}/mo`
            : `₦${Number(house.price).toLocaleString()}`;

        panelContent.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div><span class="text-on-surface-variant font-medium">Address:</span> <span class="font-semibold">${escapeHtml(house.address) || "—"}</span></div>
            <div><span class="text-on-surface-variant font-medium">Price:</span> <span class="font-bold text-primary">${priceDisplay}</span></div>
            <div><span class="text-on-surface-variant font-medium">Type:</span> <span class="capitalize font-semibold">${house.listingType || "—"}</span></div>
            <div><span class="text-on-surface-variant font-medium">Status:</span> <span class="capitalize font-semibold">${house.status || "—"}</span></div>
            <div><span class="text-on-surface-variant font-medium">Bedrooms:</span> ${house.bedrooms || "?"}</div>
            <div><span class="text-on-surface-variant font-medium">Bathrooms:</span> ${house.bathrooms || "?"}</div>
            <div><span class="text-on-surface-variant font-medium">Square Feet:</span> ${house.squareFeet ? house.squareFeet.toLocaleString() : "—"}</div>
            <div><span class="text-on-surface-variant font-medium">Year Built:</span> ${house.yearBuilt || "—"}</div>
            <div class="md:col-span-2"><span class="text-on-surface-variant font-medium">Description:</span> <p class="mt-1 text-on-surface">${escapeHtml(house.description) || "No description provided."}</p></div>
            <div><span class="text-on-surface-variant font-medium">Seller:</span> ${escapeHtml(house.user?.name || "Unknown")} (${escapeHtml(house.user?.email || "")})</div>
            <div><span class="text-on-surface-variant font-medium">Created:</span> ${formatDate(house.createdAt)}</div>
          </div>
          <div class="flex flex-wrap gap-3 pt-4 border-t mt-4">
            <select id="panelStatusSelect" class="input-field flex-1 min-w-[160px]">
              <option value="published" ${house.status === "published" ? "selected" : ""}>Published</option>
              <option value="draft" ${house.status === "draft" ? "selected" : ""}>Draft</option>
              <option value="inactive" ${house.status === "inactive" ? "selected" : ""}>Inactive</option>
              <option value="sold" ${house.status === "sold" ? "selected" : ""}>Sold</option>
              <option value="rented" ${house.status === "rented" ? "selected" : ""}>Rented</option>
            </select>
            <button id="panelUpdateBtn" class="bg-tertiary-container text-primary px-5 py-2 rounded-xl font-bold text-sm hover:brightness-95 transition">Update Status</button>
            <button id="panelDeleteBtn" class="bg-red-100 text-red-700 px-5 py-2 rounded-xl font-bold text-sm hover:bg-red-200 transition">Delete Listing</button>
          </div>
        `;

        // Attach panel button listeners
        document
          .getElementById("panelUpdateBtn")
          .addEventListener("click", async () => {
            const newStatus =
              document.getElementById("panelStatusSelect").value;
            await handleStatusChange(house._id, newStatus);
          });
        document
          .getElementById("panelDeleteBtn")
          .addEventListener("click", () => {
            handleDelete(house._id);
          });

        detailPanel.classList.add("open");
        panelBackdrop.classList.add("show");
        lucide.createIcons();
      }

      async function handleStatusChange(houseId, newStatus) {
        try {
          loadingOverlay.classList.remove("hidden");
          await toggleHouseStatus(houseId, newStatus);
          showError(`Status updated to ${newStatus}`);
          closePanel();
          fetchHouses();
        } catch (err) {
          showError(err.message);
        } finally {
          setTimeout(() => {
            loadingOverlay.classList.add("hidden");
          }, 500);
        }
      }

      async function handleDelete(houseId) {
        if (
          confirm(
            "Are you sure you want to delete this listing? This action cannot be undone.",
          )
        ) {
          try {
            loadingOverlay.classList.remove("hidden");
            await deleteHouse(houseId);
            showError("Listing deleted successfully");
            closePanel();
            fetchHouses();
          } catch (err) {
            showError(err.message);
          } finally {
            setTimeout(() => {
              loadingOverlay.classList.add("hidden");
            }, 500);
          }
        }
      }

      function formatDate(dateString) {
        if (!dateString) return "N/A";
        return new Date(dateString).toLocaleDateString();
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function renderTable() {
        if (!houses.length) {
          tableBody.innerHTML = `<tr><td colspan="2" class="text-center py-8 text-on-surface-variant">No houses found</td></tr>`;
          return;
        }

        tableBody.innerHTML = houses
          .map((house) => {
            const priceDisplay =
              house.listingType === "rent"
                ? `₦${Number(house.price).toLocaleString()}/mo`
                : `₦${Number(house.price).toLocaleString()}`;
            return `
            <tr class="border-b border-outline/10 table-row-clickable" data-house-id="${house._id}">
              <td class="px-6 py-4">
                <div class="font-bold text-primary truncate">${escapeHtml(house.title)}</div>
                <div class="text-xs text-on-surface-variant truncate">${escapeHtml(house.address)}</div>
              </td>
              <td class="px-6 py-4 text-sm">
                <span class="inline-block px-2 py-0.5 rounded text-xs font-bold bg-primary/10 text-primary mb-1">${house.listingType === "rent" ? "Rent" : "Sale"}</span>
                <div class="font-bold text-primary">${priceDisplay}</div>
              </td>
            </tr>
          `;
          })
          .join("");

        // Attach click listeners to rows
        document.querySelectorAll(".table-row-clickable").forEach((row) => {
          row.addEventListener("click", (e) => {
            const houseId = row.dataset.houseId;
            const house = houses.find((h) => h._id === houseId);
            if (house) openDetailPanel(house);
          });
        });
      }

      function updatePagination() {
        const totalPages = Math.ceil(total / limit);
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages || total === 0;
        const start = total === 0 ? 0 : (currentPage - 1) * limit + 1;
        const end = Math.min(currentPage * limit, total);
        pageStartSpan.textContent = start;
        pageEndSpan.textContent = end;
        totalCountSpan.textContent = total;
      }

      searchInputDesktop.addEventListener("input", (e) => {
        search = e.target.value;
        currentPage = 1;
        loadingOverlay.classList.remove("hidden");
        fetchHouses();
      });
      searchInputMobile.addEventListener("input", (e) => {
        search = e.target.value;
        currentPage = 1;
        loadingOverlay.classList.remove("hidden");
        fetchHouses();
      });
      statusFilterSelect.addEventListener("change", (e) => {
        statusFilter = e.target.value;
        currentPage = 1;
        loadingOverlay.classList.remove("hidden");
        fetchHouses();
      });
      typeFilterSelect.addEventListener("change", (e) => {
        typeFilter = e.target.value;
        currentPage = 1;
        loadingOverlay.classList.remove("hidden");
        fetchHouses();
      });
      prevBtn.addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage--;
          loadingOverlay.classList.remove("hidden");
          fetchHouses();
        }
      });
      nextBtn.addEventListener("click", () => {
        currentPage++;
        loadingOverlay.classList.remove("hidden");
        fetchHouses();
      });

      fetchHouses();
      lucide.createIcons();
    </script>
  </body>
</html>
