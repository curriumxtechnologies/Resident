<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Manage Users | Admin | Rezident Homes</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
            animation: {
              float: "float 3s ease-in-out infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "scale(1)", opacity: "0.8" },
                "50%": { transform: "scale(1.1)", opacity: "1" },
              },
            },
          },
        },
      };
    </script>

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }
      .lucide {
        width: 1.2rem;
        height: 1.2rem;
        stroke-width: 1.8;
      }

      /* Loading overlay styles */
      .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(249, 249, 252, 0.95);
        backdrop-filter: blur(10px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition:
          opacity 0.5s ease-out,
          visibility 0.5s ease-out;
      }

      .loading-overlay.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loading-content {
        text-align: center;
      }

      .loading-logo {
        width: 120px;
        height: auto;
        animation: float 3s ease-in-out infinite;
      }

      .loading-text {
        margin-top: 1.5rem;
        color: #001c4a;
        font-family: "Manrope", system-ui, sans-serif;
        font-weight: 600;
        font-size: 0.875rem;
        letter-spacing: 0.05em;
        animation: pulse-text 1.5s ease-in-out infinite;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px) scale(1);
          opacity: 0.8;
        }
        50% {
          transform: translateY(-15px) scale(1.05);
          opacity: 1;
        }
      }

      @keyframes pulse-text {
        0%,
        100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }

      .input-field {
        padding: 0.65rem 1rem;
        border-radius: 0.75rem;
        background: white;
        border: 1px solid rgba(116, 119, 129, 0.25);
        outline: none;
        font-size: 0.875rem;
      }
      .input-field:focus {
        border-color: #001c4a;
        box-shadow: 0 0 0 3px rgba(0, 28, 74, 0.14);
      }

      /* Table row clickable */
      .table-row-clickable {
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .table-row-clickable:hover {
        background: rgba(0, 28, 74, 0.04);
      }

      /* Detail panel styles */
      .slide-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: white;
        border-radius: 1.5rem 1.5rem 0 0;
        box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.15);
        z-index: 100;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        max-height: 85vh;
        overflow-y: auto;
        padding: 1.5rem;
        will-change: transform;
      }
      .slide-panel.open {
        transform: translateY(0);
      }
      .panel-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 99;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
      .panel-backdrop.show {
        opacity: 1;
        pointer-events: auto;
      }

      /* Prevent horizontal scroll on table */
      .table-container {
        overflow-x: visible;
      }
      table {
        table-layout: fixed;
        width: 100%;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface font-body antialiased">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-content">
        <img
          src="images/logo.png"
          alt="Rezident Homes Logo"
          class="loading-logo"
        />
      </div>
    </div>

    <div id="navbar-container"></div>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <div class="flex flex-col gap-4 mb-8">
          <div>
            <h1 class="font-headline text-3xl font-extrabold text-primary">
              Manage Users
            </h1>
            <p class="text-on-surface-variant mt-1">
              Click any row to view details and manage account.
            </p>
          </div>
          <div class="flex gap-2 items-center">
            <input
              type="text"
              id="searchInput"
              placeholder="Search by name, email, username..."
              class="input-field flex-1 md:flex-initial md:w-64"
            />
            <select
              id="roleFilter"
              class="input-field flex-1 md:flex-initial md:w-40 flex-shrink-0"
            >
              <option value="">All Roles</option>
              <option value="user">User</option>
              <option value="seller">Seller</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>

        <!-- Error -->
        <div
          id="errorMsg"
          class="hidden bg-red-50 text-red-700 p-4 rounded-xl mb-6"
        ></div>

        <!-- Users Table -->
        <div
          class="bg-white rounded-2xl shadow-sm border border-outline/10 overflow-hidden"
        >
          <div class="table-container">
            <table class="w-full text-left">
              <thead
                class="bg-surface-container-low border-b border-outline/10"
              >
                <tr>
                  <th
                    class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider"
                    style="width: 50%"
                  >
                    User
                  </th>
                  <th
                    class="px-6 py-4 text-xs font-bold text-on-surface-variant uppercase tracking-wider"
                    style="width: 50%"
                  >
                    Email
                  </th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr>
                  <td
                    colspan="2"
                    class="text-center py-8 text-on-surface-variant"
                  >
                    Loading users...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <!-- Pagination -->
          <div
            class="px-6 py-4 border-t border-outline/10 flex items-center justify-between flex-wrap gap-3"
          >
            <div class="text-sm text-on-surface-variant">
              Showing <span id="pageStart">0</span> -
              <span id="pageEnd">0</span> of <span id="totalCount">0</span>
            </div>
            <div class="flex gap-2">
              <button
                id="prevPage"
                class="px-4 py-2 border rounded-lg text-sm font-bold hover:bg-primary/5 disabled:opacity-50"
                disabled
              >
                Previous
              </button>
              <button
                id="nextPage"
                class="px-4 py-2 border rounded-lg text-sm font-bold hover:bg-primary/5 disabled:opacity-50"
                disabled
              >
                Next
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Detail Slide Panel & Backdrop -->
    <div id="panelBackdrop" class="panel-backdrop"></div>
    <div id="detailPanel" class="slide-panel">
      <div class="flex items-center justify-between mb-6">
        <h2
          id="panelTitle"
          class="font-headline text-xl font-bold text-primary truncate pr-4"
        >
          User Details
        </h2>
        <button
          id="closePanelBtn"
          class="p-2 rounded-full hover:bg-gray-100 transition"
        >
          <i data-lucide="x" class="lucide"></i>
        </button>
      </div>
      <div id="panelContent" class="space-y-5">
        <!-- dynamically filled -->
      </div>
    </div>

    <script>
      lucide.createIcons();
    </script>

    <script type="module">
      import { renderAdminNavbar } from "./js/adminNavbar.js";
      import {
        getStoredToken,
        getStoredUser,
        clearAuthData,
      } from "./js/tokenStorage.js";
      import {
        getUsers,
        updateUser,
        deleteUser,
      } from "./slices/userService.js";

      // Admin check
      const token = getStoredToken();
      const currentUser = getStoredUser();
      if (!token || !currentUser || currentUser.role !== "admin") {
        alert("Admin access required");
        window.location.href = "login.html";
      }

      // Insert navbar
      document
        .getElementById("navbar-container")
        .appendChild(renderAdminNavbar("users"));

      // Loading overlay
      const loadingOverlay = document.getElementById("loadingOverlay");

      // State
      let users = [];
      let total = 0;
      let currentPage = 1;
      const limit = 10;
      let search = "";
      let roleFilter = "";

      const tableBody = document.getElementById("usersTableBody");
      const errorMsgDiv = document.getElementById("errorMsg");
      const prevBtn = document.getElementById("prevPage");
      const nextBtn = document.getElementById("nextPage");
      const pageStartSpan = document.getElementById("pageStart");
      const pageEndSpan = document.getElementById("pageEnd");
      const totalCountSpan = document.getElementById("totalCount");
      const searchInput = document.getElementById("searchInput");
      const roleFilterSelect = document.getElementById("roleFilter");

      // Panel elements
      const detailPanel = document.getElementById("detailPanel");
      const panelBackdrop = document.getElementById("panelBackdrop");
      const panelTitle = document.getElementById("panelTitle");
      const panelContent = document.getElementById("panelContent");
      const closePanelBtn = document.getElementById("closePanelBtn");

      function closePanel() {
        detailPanel.classList.remove("open");
        panelBackdrop.classList.remove("show");
      }

      closePanelBtn.addEventListener("click", closePanel);
      panelBackdrop.addEventListener("click", closePanel);

      function showError(msg) {
        errorMsgDiv.textContent = msg;
        errorMsgDiv.classList.remove("hidden");
        setTimeout(() => errorMsgDiv.classList.add("hidden"), 5000);
      }

      async function fetchUsers() {
        try {
          const params = {
            page: currentPage,
            limit,
            search,
            role: roleFilter,
          };
          const data = await getUsers(params);
          users = data.users;
          total = data.total;
          renderTable();
          updatePagination();
        } catch (err) {
          console.error(err);
          showError("Failed to load users: " + err.message);
          tableBody.innerHTML = `<tr><td colspan="2" class="text-center py-8 text-red-600">Error loading users</td></tr>`;
        } finally {
          setTimeout(() => {
            loadingOverlay.classList.add("hidden");
          }, 500);
        }
      }

      function truncateEmail(email) {
        if (!email) return "—";
        if (email.length <= 25) return email;
        return email.substring(0, 22) + "...";
      }

      function openDetailPanel(user) {
        panelTitle.textContent = user.name || "User Details";

        const verifiedBadge = user.isVerified
          ? '<span class="inline-block px-2 py-0.5 rounded text-xs font-bold bg-green-100 text-green-700">✓ Verified</span>'
          : '<span class="inline-block px-2 py-0.5 rounded text-xs font-bold bg-red-100 text-red-700">✗ Not Verified</span>';

        panelContent.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
            <div><span class="text-on-surface-variant font-medium">Full Name:</span> <span class="font-semibold">${escapeHtml(user.name)}</span></div>
            <div><span class="text-on-surface-variant font-medium">Username:</span> <span class="font-semibold">@${escapeHtml(user.username)}</span></div>
            <div class="md:col-span-2"><span class="text-on-surface-variant font-medium">Email:</span> <span class="font-semibold">${escapeHtml(user.email)}</span></div>
            <div><span class="text-on-surface-variant font-medium">Phone:</span> ${user.phone || "—"}</div>
            <div><span class="text-on-surface-variant font-medium">Role:</span> <span class="capitalize font-semibold">${user.role}</span></div>
            <div><span class="text-on-surface-variant font-medium">Verification:</span> ${verifiedBadge}</div>
            <div><span class="text-on-surface-variant font-medium">User ID:</span> <span class="text-xs text-on-surface-variant break-all">${user._id}</span></div>
            <div><span class="text-on-surface-variant font-medium">Joined:</span> ${formatDate(user.createdAt)}</div>
          </div>
          <div class="flex flex-wrap gap-3 pt-4 border-t mt-4">
            <select id="panelRoleSelect" class="input-field flex-1 min-w-[160px]">
              <option value="user" ${user.role === "user" ? "selected" : ""}>User</option>
              <option value="seller" ${user.role === "seller" ? "selected" : ""}>Seller</option>
              <option value="admin" ${user.role === "admin" ? "selected" : ""}>Admin</option>
            </select>
            <button id="panelUpdateBtn" class="bg-tertiary-container text-primary px-5 py-2 rounded-xl font-bold text-sm hover:brightness-95 transition">Update Role</button>
            <button id="panelDeleteBtn" class="bg-red-100 text-red-700 px-5 py-2 rounded-xl font-bold text-sm hover:bg-red-200 transition">Delete Account</button>
          </div>
        `;

        // Attach panel button listeners
        document
          .getElementById("panelUpdateBtn")
          .addEventListener("click", async () => {
            const newRole = document.getElementById("panelRoleSelect").value;
            await handleRoleUpdate(user._id, newRole);
          });
        document
          .getElementById("panelDeleteBtn")
          .addEventListener("click", () => {
            handleDelete(user._id);
          });

        detailPanel.classList.add("open");
        panelBackdrop.classList.add("show");
        lucide.createIcons();
      }

      async function handleRoleUpdate(userId, newRole) {
        if (newRole === currentUser.role && userId === currentUser._id) {
          showError(
            "You cannot change your own role via this panel (to avoid lockout).",
          );
          return;
        }
        try {
          loadingOverlay.classList.remove("hidden");
          await updateUser(userId, { role: newRole });
          showError("Role updated successfully");
          closePanel();
          fetchUsers();
        } catch (err) {
          showError(err.message);
        } finally {
          setTimeout(() => {
            loadingOverlay.classList.add("hidden");
          }, 500);
        }
      }

      async function handleDelete(userId) {
        if (userId === currentUser._id) {
          showError("You cannot delete your own account.");
          return;
        }
        if (
          confirm(
            "Are you sure you want to delete this user? This action cannot be undone.",
          )
        ) {
          try {
            loadingOverlay.classList.remove("hidden");
            await deleteUser(userId);
            showError("User deleted successfully");
            closePanel();
            fetchUsers();
          } catch (err) {
            showError(err.message);
          } finally {
            setTimeout(() => {
              loadingOverlay.classList.add("hidden");
            }, 500);
          }
        }
      }

      function formatDate(dateString) {
        if (!dateString) return "N/A";
        return new Date(dateString).toLocaleDateString();
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      function renderTable() {
        if (!users.length) {
          tableBody.innerHTML = `<tr><td colspan="2" class="text-center py-8 text-on-surface-variant">No users found</td></tr>`;
          return;
        }

        tableBody.innerHTML = users
          .map(
            (user) => `
          <tr class="border-b border-outline/10 table-row-clickable" data-user-id="${user._id}">
            <td class="px-6 py-4">
              <div class="font-bold text-primary truncate">${escapeHtml(user.name)}</div>
              <div class="text-xs text-on-surface-variant truncate">@${escapeHtml(user.username)}</div>
            </td>
            <td class="px-6 py-4 text-sm">
              <span class="truncate block" title="${escapeHtml(user.email)}">${escapeHtml(truncateEmail(user.email))}</span>
            </td>
          </tr>
        `,
          )
          .join("");

        // Attach click listeners to rows
        document.querySelectorAll(".table-row-clickable").forEach((row) => {
          row.addEventListener("click", (e) => {
            const userId = row.dataset.userId;
            const user = users.find((u) => u._id === userId);
            if (user) openDetailPanel(user);
          });
        });
      }

      function updatePagination() {
        const totalPages = Math.ceil(total / limit);
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages || total === 0;
        const start = total === 0 ? 0 : (currentPage - 1) * limit + 1;
        const end = Math.min(currentPage * limit, total);
        pageStartSpan.textContent = start;
        pageEndSpan.textContent = end;
        totalCountSpan.textContent = total;
      }

      // Event listeners
      searchInput.addEventListener("input", (e) => {
        search = e.target.value;
        currentPage = 1;
        loadingOverlay.classList.remove("hidden");
        fetchUsers();
      });
      roleFilterSelect.addEventListener("change", (e) => {
        roleFilter = e.target.value;
        currentPage = 1;
        loadingOverlay.classList.remove("hidden");
        fetchUsers();
      });
      prevBtn.addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage--;
          loadingOverlay.classList.remove("hidden");
          fetchUsers();
        }
      });
      nextBtn.addEventListener("click", () => {
        currentPage++;
        loadingOverlay.classList.remove("hidden");
        fetchUsers();
      });

      // Initial fetch
      fetchUsers();
      lucide.createIcons();
    </script>
  </body>
</html>
