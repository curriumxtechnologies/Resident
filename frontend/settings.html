<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Settings | Rezident Homes</title>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="images/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="images/android-chrome-512x512.png"
    />
    <link rel="manifest" href="images/site.webmanifest" />
    <meta name="theme-color" content="#0D316D" />

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#001c4a",
              "primary-container": "#0d316d",
              tertiary: "#6e5d00",
              "tertiary-container": "#c5aa23",
              "tertiary-fixed": "#ffe260",
              surface: "#f9f9fc",
              "surface-container-low": "#f3f3f6",
              "on-surface": "#1a1c1e",
              "on-surface-variant": "#444650",
              outline: "#747781",
            },
            fontFamily: {
              headline: ["Manrope", "system-ui", "sans-serif"],
              body: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <link rel="icon" href="images/favicon.ico" />

    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }

      .lucide {
        width: 1.2rem;
        height: 1.2rem;
        stroke-width: 1.8;
      }

      .input-field {
        width: 100%;
        padding: 0.85rem 1rem;
        border-radius: 0.75rem;
        background: white;
        border: 1px solid rgba(116, 119, 129, 0.25);
        outline: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: 0.2s ease;
      }

      .input-field:focus {
        border-color: #001c4a;
        box-shadow: 0 0 0 3px rgba(0, 28, 74, 0.14);
      }

      .hidden-section {
        display: none;
      }
    </style>
  </head>

  <body class="bg-surface text-on-surface font-body antialiased">
    <header
      class="sticky top-0 w-full z-50 bg-white/90 backdrop-blur-xl shadow-sm border-b border-outline/10"
    >
      <div class="max-w-7xl mx-auto px-5 md:px-8">
        <div class="flex items-center justify-between h-16 lg:h-20">
          <a href="home.html">
            <img
              src="images/logo.png"
              alt="Rezident Homes Logo"
              class="h-9 lg:h-11 w-auto object-contain"
            />
          </a>

          <div class="flex items-center gap-3">
            <span class="hidden md:inline-block text-sm font-bold text-primary">
              Joshua Sorochi
            </span>

            <a
              href="profile.html"
              class="w-10 h-10 lg:w-11 lg:h-11 rounded-full bg-primary text-white flex items-center justify-center font-bold shadow-sm"
              aria-label="Profile"
            >
              JS
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="px-5 md:px-8 py-10 lg:py-14">
      <div class="max-w-7xl mx-auto">
        <div class="mb-8">
          <h1
            class="font-headline text-3xl md:text-4xl font-extrabold text-primary"
          >
            Account Settings
          </h1>
          <p class="text-sm text-on-surface-variant mt-2">
            Manage your login, privacy, notifications, and account security.
          </p>
        </div>

        <section class="grid lg:grid-cols-3 gap-8">
          <aside class="lg:col-span-1">
            <div
              class="bg-white rounded-2xl shadow-sm border border-outline/10 p-4 lg:sticky lg:top-24"
            >
              <a
                href="#security"
                class="flex items-center gap-3 p-3 rounded-xl text-primary font-bold hover:bg-primary/5"
              >
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                Security
              </a>
              <a
                href="#account"
                class="flex items-center gap-3 p-3 rounded-xl text-red-600 font-bold hover:bg-red-50"
              >
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                Delete Account
              </a>
            </div>
          </aside>

          <div class="lg:col-span-2 space-y-8">
            <!-- Security Section -->
            <section
              id="security"
              class="bg-white rounded-2xl shadow-sm border border-outline/10 p-6"
            >
              <div class="flex items-start justify-between mb-6">
                <div>
                  <h2
                    class="font-headline text-2xl font-extrabold text-primary"
                  >
                    Security
                  </h2>
                  <p class="text-sm text-on-surface-variant mt-1">
                    Update your password and protect your account.
                  </p>
                </div>
                <button
                  id="editSecurityBtn"
                  class="p-2 rounded-full hover:bg-gray-100 transition text-primary"
                  aria-label="Edit security settings"
                >
                  <i data-lucide="pencil" class="w-5 h-5"></i>
                </button>
              </div>

              <!-- Security form (hidden by default) -->
              <div id="securityFormContainer" class="hidden-section">
                <form class="space-y-5">
                  <div>
                    <label class="block text-sm font-bold text-primary mb-2">
                      Current Password
                    </label>
                    <input
                      type="password"
                      class="input-field"
                      placeholder="Enter current password"
                    />
                  </div>

                  <div class="grid sm:grid-cols-2 gap-5">
                    <div>
                      <label class="block text-sm font-bold text-primary mb-2">
                        New Password
                      </label>
                      <input
                        type="password"
                        class="input-field"
                        placeholder="Enter new password"
                      />
                    </div>

                    <div>
                      <label class="block text-sm font-bold text-primary mb-2">
                        Confirm New Password
                      </label>
                      <input
                        type="password"
                        class="input-field"
                        placeholder="Confirm new password"
                      />
                    </div>
                  </div>

                  <div class="flex items-center gap-3 pt-2">
                    <button
                      type="submit"
                      class="bg-primary text-white px-5 py-3 rounded-xl font-bold text-sm hover:bg-primary-container transition flex items-center justify-center gap-2"
                    >
                      Update Password
                      <i data-lucide="check-circle" class="w-4 h-4"></i>
                    </button>
                    <button
                      type="button"
                      id="cancelSecurityBtn"
                      class="text-sm font-medium text-on-surface-variant hover:text-on-surface transition px-3 py-2"
                    >
                      Cancel
                    </button>
                  </div>
                </form>
              </div>
            </section>

            <!-- Delete Account Section -->
            <section
              id="account"
              class="bg-white rounded-2xl shadow-sm border border-red-100 p-6"
            >
              <div class="flex items-start gap-4">
                <div
                  class="w-12 h-12 rounded-full bg-red-50 text-red-600 flex items-center justify-center shrink-0"
                >
                  <i data-lucide="triangle-alert"></i>
                </div>

                <div class="flex-1">
                  <div class="flex items-start justify-between">
                    <div>
                      <h2
                        class="font-headline text-2xl font-extrabold text-red-600"
                      >
                        Delete Account
                      </h2>
                      <p class="text-sm text-on-surface-variant mt-1">
                        This will remove your profile, saved homes, uploaded
                        properties, and account history.
                      </p>
                    </div>
                  </div>

                  <!-- Delete confirmation area (hidden by default) -->
                  <div id="deleteConfirmContainer" class="hidden-section mt-5">
                    <div>
                      <label class="block text-sm font-bold text-primary mb-2">
                        Type DELETE MY ACCOUNT to confirm
                      </label>
                      <input
                        type="text"
                        class="input-field"
                        placeholder="DELETE MY ACCOUNT"
                      />
                    </div>

                    <div class="flex items-center gap-3 mt-5">
                      <button
                        class="bg-red-600 text-white px-5 py-3 rounded-xl font-bold text-sm hover:bg-red-700 transition flex items-center justify-center gap-2"
                      >
                        Delete My Account
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                      <button
                        type="button"
                        id="cancelDeleteBtn"
                        class="text-sm font-medium text-on-surface-variant hover:text-on-surface transition px-3 py-2"
                      >
                        Cancel
                      </button>
                    </div>
                  </div>

                  <!-- Initial delete button (visible by default) -->
                  <button
                    id="showDeleteBtn"
                    class="mt-5 bg-red-600 text-white px-5 py-3 rounded-xl font-bold text-sm hover:bg-red-700 transition flex items-center justify-center gap-2"
                  >
                    Delete Account
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>
            </section>
          </div>
        </section>
      </div>
    </main>

    <script>
      (function () {
        // Wait for Lucide icons to be available
        function initWhenReady() {
          if (window.lucide) {
            lucide.createIcons();
            setupInteractions();
          } else {
            setTimeout(initWhenReady, 20);
          }
        }

        function setupInteractions() {
          // Security section elements
          const editSecurityBtn = document.getElementById("editSecurityBtn");
          const cancelSecurityBtn =
            document.getElementById("cancelSecurityBtn");
          const securityFormContainer = document.getElementById(
            "securityFormContainer",
          );
          const securityDefaultMessage = document.getElementById(
            "securityDefaultMessage",
          );

          // Delete account elements
          const showDeleteBtn = document.getElementById("showDeleteBtn");
          const cancelDeleteBtn = document.getElementById("cancelDeleteBtn");
          const deleteConfirmContainer = document.getElementById(
            "deleteConfirmContainer",
          );

          // --- Security Edit Logic ---
          if (
            editSecurityBtn &&
            securityFormContainer &&
            securityDefaultMessage &&
            cancelSecurityBtn
          ) {
            editSecurityBtn.addEventListener("click", function (e) {
              e.preventDefault();
              // Show form, hide default message
              securityFormContainer.style.display = "block";
              securityDefaultMessage.style.display = "none";
              // Optionally hide the edit button itself while editing
              editSecurityBtn.style.display = "none";
            });

            cancelSecurityBtn.addEventListener("click", function () {
              // Hide form, show default message, bring back edit button
              securityFormContainer.style.display = "none";
              securityDefaultMessage.style.display = "block";
              editSecurityBtn.style.display = "inline-flex";
            });
          }

          // --- Delete Account Logic ---
          if (showDeleteBtn && deleteConfirmContainer && cancelDeleteBtn) {
            showDeleteBtn.addEventListener("click", function (e) {
              e.preventDefault();
              // Hide the initial delete button, show confirmation area
              showDeleteBtn.style.display = "none";
              deleteConfirmContainer.style.display = "block";
            });

            cancelDeleteBtn.addEventListener("click", function () {
              // Hide confirmation, show initial delete button again
              deleteConfirmContainer.style.display = "none";
              showDeleteBtn.style.display = "flex";
            });
          }

          // Ensure edit icon is visible as flex (inline-flex for button)
          if (editSecurityBtn) {
            editSecurityBtn.style.display = "inline-flex";
          }
        }

        // Start checking
        initWhenReady();
      })();
    </script>
  </body>
</html>
